### Split Query (EF Core 5+)

Büyük include'larda kartezyen patlamayı önler.

\`\`\`csharp
var orders = context.Orders
    .Include(o => o.LineItems)
    .Include(o => o.Payments)
    .AsSplitQuery()    // Tek büyük JOIN yerine birden fazla sorgu
    .ToList();
\`\`\`

<details open>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- AsSplitQuery: ayrı ayrı sorgular
SELECT [o].* FROM [Orders] AS [o];
SELECT [l].* FROM [OrderLineItems] AS [l] WHERE [l].[OrderId] IN (...);
SELECT [p].* FROM [Payments] AS [p] WHERE [p].[OrderId] IN (...);
\`\`\`

</details>
<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- AsSplitQuery: ayrı ayrı sorgular
SELECT o.* FROM orders AS o;
SELECT l.* FROM order_line_items AS l WHERE l.order_id = ANY(@orderIds);
SELECT p.* FROM payments AS p WHERE p.order_id = ANY(@orderIds);
\`\`\`

</details>

> ⚠️ **\`IN (...)\` parametre limiti:** EF Core, ilk sorgudan dönen **tüm PK değerlerini** \`IN\` listesine koyar.
> - SQL Server: max **2.100 parametre** → ~2.100 order'dan fazlası varsa EF otomatik olarak geçici tablo veya alt sorgu kullanır (EF Core 8+)
> - PostgreSQL: max **65.535 parametre** — daha rahat ama yine de dikkat
> - **1M kayıt** gibi büyük veri setlerinde: \`AsSplitQuery()\` yerine **pagination** (\`Skip/Take\`) + \`Include\` veya **Projection** (\`Select\`) kullan
> - En güvenli yaklaşım: Filtresiz tüm tabloyu çekmek yerine \`WHERE\` ile daralt, sonra \`AsSplitQuery()\` uygula

**Single Query vs Split Query — Trade-off:**

| Kriter | Single Query (varsayılan) | Split Query |
|--------|---------------------------|-------------|
| Ağ roundtrip | 1 | N (include sayısı kadar) |
| Kartezyen patlama | ✅ Olabilir (satır tekrarı) | ❌ Olmaz |
| Veri tutarlılığı | ✅ Tek transaction snapshot | ⚠️ Sorgular arası veri değişebilir |
| Küçük veri seti | ✅ Daha hızlı | 🟡 Gereksiz overhead |
| Büyük/derin include | ❌ Bellek patlar | ✅ Çok daha verimli |

\`\`\`csharp
// Global olarak tüm sorguları split yapma (dikkatli kullan)
options.UseSqlServer(conn, o => o.UseQuerySplittingBehavior(
    QuerySplittingBehavior.SplitQuery));

// Tek sorgu için split'i kapat
var data = context.Orders
    .Include(o => o.Items)
    .AsSingleQuery()    // Global split açıksa, bunu tek sorgu yap
    .ToList();
\`\`\`

### Hangi stratejiyi ne zaman kullan?

| Durum | Strateji |
|-------|----------|
| İlişkili veriyi **kesinlikle** kullanacaksın | Eager Loading (\`Include\`) |
| Belki kullanacaksın, koşula bağlı | Explicit Loading |
| Web API, DTO dönüyorsun | Projection (\`Select\`) — en iyi! |
| Büyük include kartezyen patlıyor | \`AsSplitQuery()\` |
| **Kullanma** | Lazy Loading (N+1 riski!) |

\`\`\`csharp
// ✅ En iyi yol: Projection (sadece ihtiyacın olan alanları çek)
var result = context.Products
    .Where(p => p.IsActive)
    .Select(p => new ProductDto
    {
        Id = p.Id,
        Name = p.Name,
        CategoryName = p.Category.Name  // EF otomatik JOIN yapar
    })
    .ToList();
\`\`\`

<details open>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Projection: Include yazmana gerek yok, EF navigation'ı otomatik JOIN'a çevirir
SELECT [p].[Id], [p].[Name], [c].[Name] AS [CategoryName]
FROM [Products] AS [p]
INNER JOIN [Categories] AS [c] ON [p].[CategoryId] = [c].[Id]
WHERE [p].[IsActive] = CAST(1 AS bit);
-- ✅ Sadece 3 sütun çekilir (tüm tablo değil)
\`\`\`

</details>
<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Projection: Include yazmana gerek yok, EF navigation'ı otomatik JOIN'a çevirir
SELECT p.id, p.name, c.name AS category_name
FROM products AS p
INNER JOIN categories AS c ON p.category_id = c.id
WHERE p.is_active = TRUE;
-- ✅ Sadece 3 sütun çekilir (tüm tablo değil)
\`\`\`

</details>

> 💡 **JOIN üretimi için DB'de FK constraint olması şart mı?**
>
> **Hayır.** EF Core SQL üretirken sadece **kendi modelindeki konfigürasyona** bakar (navigation property + Fluent API). DB'deki fiziksel FK constraint sorgu üretimini etkilemez.
>
> | Senaryo | JOIN üretilir mi? | Açıklama |
> |---|:---:|---|
> | DB'de FK ✅ + EF config ✅ | ✅ | Standart kullanım |
> | DB'de FK ❌ + EF config ✅ | ✅ | Legacy DB, FK'sız çalışır |
> | DB'de FK ✅ + EF config ❌ | ❌ | Navigation yoksa derlenmez |
> | İkisinde de yok | ❌ | \`p.Category\` diye bir property yok |
>
> DB'deki FK constraint'in görevi: **veri bütünlüğü** (orphan kayıt engelleme).  
> EF'teki config'in görevi: **sorgu üretimi** (JOIN, Include, navigation).  
> İkisi birbirinden bağımsız çalışır.

### N+1 Problemini Tespit Etme

N+1, production'da en sık karşılaşılan performans sorunudur. Tespit etmenin en kolay yolu EF Core'un log'unu açmak:

\`\`\`csharp
// Program.cs veya DbContext'te
optionsBuilder.LogTo(Console.WriteLine, LogLevel.Information);

// Sonra Output penceresinde SQL satırlarını say:
// 1 sorgu = normal
// 101 sorgu (1 ana + 100 tekrar eden) = N+1 problemi!
\`\`\`

> **Araç önerisi:** MiniProfiler — her sayfanın üstünde kaç SQL çalıştığını gösterir. Geliştirme sırasında paha biçilmez.

## 11. Change Tracking & Performance 🟡

EF Core, DB'den çektiğin her entity'nin o anki değerlerini bir **kopya** olarak saklar. \`SaveChanges()\` dediğinde eski ve yeni değerleri karşılaştırır, sadece değişen alanlar için UPDATE üretir. Bu mekanizmayı anlamak gereksiz sorguları önlemenin ve performansı artırmanın temelidir.

#### Nasıl Çalışır?

\`\`\`csharp
var product = context.Products.First(p => p.Id == 1);
// EF: "Price=100 olarak kaydettim"

product.Price = 150;
await context.SaveChangesAsync();
// EF: "Price 100'den 150'ye değişmiş, Name aynı kalmış"
// → UPDATE Products SET Price = 150 WHERE Id = 1
// Sadece Price güncellenir! Name SQL'e dahil olmaz.
\`\`\`

> Bu sayede EF Core gereksiz sütun güncellemesi yapmaz — hem ağ trafiği azalır hem de DB'deki index'ler gereksiz yere yeniden yazılmaz.

---

### Entity States (Durumlar)

| State | Anlamı | SaveChanges'ta |
|-------|--------|----------------|
| \`Added\` | Yeni eklendi, DB'de yok | INSERT |
| \`Modified\` | Var, değişti | UPDATE |
| \`Deleted\` | Silinecek | DELETE |
| \`Unchanged\` | Var, değişmedi | Hiçbir şey |
| \`Detached\` | EF izlemiyor | Hiçbir şey |

// EF Core otomatik olarak DetectChanges çağırır:
// - SaveChanges / SaveChangesAsync
// - context.Entry(entity)
// - ChangeTracker.Entries()

// Manuel çağrı (nadiren gerekir)
context.ChangeTracker.DetectChanges();

// Performans: Büyük batch'lerde DetectChanges'ı devre dışı bırakma
context.ChangeTracker.AutoDetectChangesEnabled = false;
try
{
    for (int i = 0; i < 10000; i++)
        context.Products.Add(products[i]);
    
    context.ChangeTracker.DetectChanges();  // Tek seferde çağır
    await context.SaveChangesAsync();
}
finally
{
    context.ChangeTracker.AutoDetectChangesEnabled = true;
}

#### AsNoTracking vs AsNoTrackingWithIdentityResolution

**Problem:** \`AsNoTracking()\` ile aynı entity birden fazla satırda gelirse, her biri **ayrı C# nesnesi** olur:

\`\`\`csharp
// ❌ AsNoTracking — aynı Category, farklı instance'lar
var orders = context.Orders
    .AsNoTracking()
    .Include(o => o.Customer)
    .ToList();

// Order #1 → Customer { Id=5, Name="Ali" }   ← instance A (0x1A2B)
// Order #2 → Customer { Id=5, Name="Ali" }   ← instance B (0x3C4D)  FARKLI obje!
// Order #3 → Customer { Id=5, Name="Ali" }   ← instance C (0x5E6F)  YİNE FARKLI!

Console.WriteLine(orders[0].Customer == orders[1].Customer);  // FALSE
// Bellek: 3 ayrı Customer nesnesi (aynı veri, 3x bellek)
\`\`\`

\`\`\`csharp
// ✅ AsNoTrackingWithIdentityResolution — aynı PK = aynı instance
var orders = context.Orders
    .AsNoTrackingWithIdentityResolution()
    .Include(o => o.Customer)
    .ToList();

// Order #1 → Customer { Id=5, Name="Ali" }   ← instance A (0x1A2B)
// Order #2 → ↗ aynı instance A'yı referans eder
// Order #3 → ↗ aynı instance A'yı referans eder

Console.WriteLine(orders[0].Customer == orders[1].Customer);  // TRUE ✅
// Bellek: Sadece 1 Customer nesnesi (3 order aynı referansı paylaşır)
\`\`\`

**Ne zaman hangisini kullan?**

| Senaryo | Method | Neden |
|---------|--------|-------|
| Düz liste, Include yok | \`AsNoTracking()\` | En hızlı, identity resolution gereksiz |
| Include var, aynı entity çok tekrar ediyor | \`AsNoTrackingWithIdentityResolution()\` | Bellek tasarrufu + tutarlı referanslar |
| Veriyi güncelleyeceksin | Hiçbiri (normal tracking) | SaveChanges çalışsın |
| Raporlama / dashboard | \`AsNoTrackingWithIdentityResolution()\` | Büyük veri, tekrarlı join'ler |

    .Where(p => p.Stock == 0)

    .Where(p => p.IsDeleted && p.DeletedAt < DateTime.UtcNow.AddDays(-30))
    .ExecuteDeleteAsync();

// ✅ 5. Uzun yaşayan context'te bellek temizliği

> ⚠️ **Change Tracking Limitleri:**
>
> | Limit / Pratik Sınır | Değer | Ne Olur? |
> |---|:---:|---|
> | Tracked entity sayısı (ideal) | **< 1.000** | Performans iyi |
> | Tracked entity sayısı (max pratik) | **< 10.000** | \`DetectChanges()\` yavaşlar (~100ms+) |
> | 10.000+ tracked entity | ⚠️ | SaveChanges süresi katlanır, bellek şişer |
> | 100.000+ tracked entity | ❌ | OutOfMemory riski, dakikalarca SaveChanges |
>
> 💡 **Kurallar:**
> - Read-only sorgularda **her zaman** \`AsNoTracking()\` kullan → %40-50 daha hızlı
> - Background job / batch işlemlerde her 500-1000 kayıtta \`context.ChangeTracker.Clear()\` çağır
> - Raporlama sorgularında \`AsNoTrackingWithIdentityResolution()\` → tracking yok ama aynı entity **tek instance** olarak paylaşılır (bellek tasarrufu)
> - Tek bir \`SaveChanges()\` çağrısında max **10.000** değişiklik gönder (parametre limiti!)
>
> ⚠️ **SQL Parametre Limiti (SaveChanges'ı etkiler):**
>
> | Provider | Max parametre/sorgu | Sonuç |
> |---|:---:|---|
> | **PostgreSQL** | **65.535** | Aşılırsa EF otomatik batch'ler (sorun yok) |
> | **SQL Server** | **2.100** | Aşılırsa EF otomatik batch'ler |
> | **SQLite** | **999** | Çok düşük — küçük batch'ler oluşur |
>
> EF Core parametre limitini aşınca otomatik batch'lere böler — crash olmaz ama çok sayıda roundtrip olabilir. \`MaxBatchSize\` ile kontrol et.

**❌ / ✅ Change Tracking Sık Yapılan Hatalar:**

\`\`\`csharp
// ❌ YANLIŞ: Her kayıt için ayrı SaveChanges — N roundtrip
foreach (var product in products)
{
    product.Price *= 1.1m;
    await context.SaveChangesAsync(); // 💀 1000 ürün = 1000 roundtrip!
}

// ✅ DOĞRU: Tüm değişiklikleri yap, sonra tek SaveChanges
foreach (var product in products)
    product.Price *= 1.1m;
await context.SaveChangesAsync(); // ✅ 1 batch (veya birkaç batch)

// ✅✅ EN İYİ: ExecuteUpdate — entity yükleme bile yok
await context.Products.ExecuteUpdateAsync(
    s => s.SetProperty(p => p.Price, p => p.Price * 1.1m)); // ✅ Tek UPDATE SQL

        foreach (var batch in GetBatches())
        {
            _context.AddRange(batch); // Tracker sonsuz büyür!
            await _context.SaveChangesAsync();
        }
    }
}

{

    {

            using var scope = _scopeFactory.CreateScope();
            var context = scope.ServiceProvider.GetRequiredService<AppDbContext>();

> 💡 **Navigation property varsa Join yazma!** EF Core \`Include\` veya \`Select(p => p.Category.Name)\` ile otomatik JOIN üretir. Manuel \`Join()\` sadece navigation olmayan senaryolar için.

**Nasıl çalışır?**

EF Core senin \`Join()\` çağrını alıp SQL'e çevirir:
- 1. parametre (inner sequence) → hangi tabloyla join yapılacak
- 2. parametre (outer key) → sol tablonun eşleşme sütunu → \`ON\` koşulunun sol tarafı
- 3. parametre (inner key) → sağ tablonun eşleşme sütunu → \`ON\` koşulunun sağ tarafı
- 4. parametre (result selector) → \`SELECT\` listesi

> ⚠️ Birden fazla sütunla eşleşme yapacaksan anonymous type kullan: \`.Join(ctx.OrderItems, o => new { o.Id, o.Year }, oi => new { oi.OrderId, oi.Year }, ...)\`

**📋 Ne Zaman Inner Join Kullanmalısın?**

| Senaryo | Inner Join? | Daha İyi Alternatif |
|---------|:-----------:|:-------------------:|
| Navigation property var | ❌ | \`Include()\` veya \`Select(x => x.Nav.Prop)\` |
| FK var ama navigation yok | ✅ | — |
| Cross-database join | ✅ | Raw SQL da düşün |
| Rapor sorgusu (flat DTO) | ✅ | Projection \`Select()\` + Join |
| Sadece ilişkili kayıtlar lazım | ❌ | \`.Where(p => p.Category != null)\` |

**❌ / ✅ Sık Yapılan Hata:**

    .LeftJoin(

**EF Core'da Left Join nasıl yazılır?**

EF Core 9 öncesinde Left Join yazmak karmaşıktı (\`GroupJoin + SelectMany + DefaultIfEmpty\`). EF Core 10 ile artık tek satırda yazabilirsin:

\`\`\`csharp
// EF Core 10 — temiz syntax
var result = await context.Products
    .LeftJoin(
        context.Reviews,
        p => p.Id,
        r => r.ProductId,
        (product, review) => new { product.Name, review.Comment })
    .ToListAsync();
\`\`\`

> Left Join'de sağ taraf \`null\` gelebilir! DTO'daki property'yi nullable yap veya \`COALESCE\` / \`??\` kullan.

**📋 Ne Zaman Left Join Kullanmalısın?**

| Senaryo | Left Join? | Açıklama |
|---------|:----------:|:--------:|
| "Tüm ürünler + varsa yorumu" | ✅ | Klasik left join senaryosu |
| "Siparişi olmayan müşteriler" | ✅ | \`WHERE right_side IS NULL\` pattern |
| "Her kullanıcı + son login" | ✅ | Left join + ROW_NUMBER veya lateral |
| "Sadece eşleşen kayıtlar" | ❌ | Inner Join kullan |
| Optional 1:1 relation (FK nullable) | ✅ | EF Core navigation ile otomatik |

**❌ / ✅ Sık Yapılan Hata:**

\`\`\`csharp
// ❌ YANLIŞ: GroupJoin sonucu düzleştirmeden kullanma
var wrong = await context.Products
    .GroupJoin(context.Reviews, p => p.Id, r => r.ProductId, (p, reviews) => new { p, reviews })
    .ToListAsync(); // N+1 riski! reviews her ürün için ayrı sorgu olabilir

// ✅ DOĞRU: SelectMany + DefaultIfEmpty ile düzleştir (veya LeftJoin kullan)
var correct = await context.Products
    .GroupJoin(context.Reviews, p => p.Id, r => r.ProductId, (p, reviews) => new { p, reviews })
    .SelectMany(x => x.reviews.DefaultIfEmpty(), (x, review) => new
    {
        Product = x.p.Name,
        Review = review != null ? review.Comment : "Yorum yok"
    })
    .ToListAsync();
\`\`\`

**🔬 Right Join Ne Zaman Gerekir?**

Right Join, mantıksal olarak Left Join'in ayna görüntüsüdür. Çoğu senaryoda tabloların sırasını değiştirip Left Join kullanabilirsin. Ancak şu durumlarda Right Join tercih edilir:
- Mevcut bir sorgu pipeline'ını bozmadan "diğer tarafı da dahil et" istediğinde
- Raw SQL raporlarında okunabilirlik açısından "ana tablo sağda" daha doğal geldiğinde

> ⚠️ **Uyarı:** Right Join, EF Core 9 öncesinde desteklenmiyordu. Eski projelerde Left Join + tablo sırası değişikliği kullan.

**📋 Ne Zaman Right Join Kullanmalısın?**

| Senaryo | Right Join? | Açıklama |
|---------|:-----------:|:--------:|
| "Hiç satılmamış ürünler dahil tüm ürünler" | ✅ | Products sağ tablo, sold=null olanlar |
| "Tüm kategoriler + varsa ürün sayısı" | Bağlam | Left Join de aynı işi yapar |
| "Pipeline'da tablo sırası değiştirilmemeli" | ✅ | Mevcut query yapısını koruma |
| Genel kullanım | ❌ | Left Join daha yaygın ve okunur |

var left = context.Students
    .LeftJoin(context.Departments,
        s => s.DepartmentId, d => d.Id,
        (s, d) => new { Student = s.Name, Department = (string?)d.Name });

    .RightJoin(context.Departments,

<summary><b>💾 SQL Server</b></summary>

\`\`\`sql

SELECT CASE WHEN EXISTS (
    SELECT 1 FROM [Products] WHERE [Price] > 100000) THEN 1 ELSE 0 END;

-- All
SELECT CASE WHEN NOT EXISTS (
    SELECT 1 FROM [Products] WHERE [IsActive] = 0) THEN 1 ELSE 0 END;

-- Contains → IN

WHERE [CategoryId] IN (1, 3, 5);
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Any
SELECT EXISTS (
    SELECT 1 FROM products WHERE price > 100000);

-- All

    SELECT 1 FROM products WHERE is_active = FALSE);

-- Contains → IN (veya = ANY)
SELECT * FROM products
WHERE category_id = ANY(ARRAY[1, 3, 5]);
\`\`\`

</details>

> 🆕 **EF Core 10 (GA) — Parameterized Collection iyileştirmesi:**
> \`\`\`csharp
> int[] ids = [1, 2, 3];
> var products = context.Products.Where(p => ids.Contains(p.Id)).ToListAsync();
> \`\`\`
> | EF Sürümü | Üretilen SQL | Avantaj/Dezavantaj |
> |---|---|---|
> | EF Core ≤7 | \`WHERE Id IN (1, 2, 3)\` | ❌ Her farklı liste = farklı SQL = plan cache şişer |
> | EF Core 8-9 | \`WHERE Id IN (SELECT value FROM OPENJSON(@ids))\` | ✅ Tek plan ama ❌ cardinality bilgisi yok |
> | **EF Core 10** | \`WHERE Id IN (@p1, @p2, @p3)\` | ✅ Tek plan + ✅ cardinality bilgisi var |
>
> EF 10 ayrıca "padding" yapar (8 elemanlı liste → 10 parametre gönderir) böylece farklı boyutlardaki listeler de aynı plan'ı kullanır.
> \`\`\`csharp
> // Strateji kontrolü (EF Core 10):
> options.UseSqlServer(conn, o => o.UseParameterizedCollectionMode(ParameterTranslationMode.Constant));
> // Veya sorgu bazlı:
> var result = context.Products.Where(p => EF.Constant(ids).Contains(p.Id)).ToListAsync();
> \`\`\`

**📋 Set Operasyonları: Ne Zaman Hangisini Kullan?**

| İhtiyaç | Operatör | EF Core Metodu | Dikkat |
|---------|:--------:|:--------------:|:------:|
| İki sorguyu birleştir (tekrarsız) | UNION | \`.Union()\` | Sort + distinct → pahalı |
| İki sorguyu birleştir (tekrarlı) | UNION ALL | \`.Concat()\` | En hızlı birleştirme |
| A'da olup B'de olmayan | EXCEPT | \`.Except()\` | NOT IN'den daha verimli |
| Her ikisinde de olan | INTERSECT | \`.Intersect()\` | AND + subquery ile aynı sonuç |
| Tekrarlı satırları kaldır | DISTINCT | \`.Distinct()\` | Tüm sütunlar karşılaştırılır |

**❌ / ✅ Set Operasyonlarında Sık Hatalar:**

\`\`\`csharp
// ❌ YANLIŞ: Farklı kolon sayısı/tipiyle Union (compile error)
var wrong = context.Products.Select(p => new { p.Name, p.Price })
    .Union(context.Categories.Select(c => new { c.Name })); // kolon uyumsuz!

// ✅ DOĞRU: Aynı shape (aynı tip ve sayıda property)
var correct = context.Products.Select(p => new { p.Name })
    .Union(context.Categories.Select(c => new { c.Name }))
    .ToListAsync();
\`\`\`

\`\`\`csharp
// ❌ YANLIŞ: "Arşivlenmiş ürünleri çıkar" — client-side filter ile
var products = await context.Products.ToListAsync();
var archived = await context.ArchivedProducts.Select(a => a.Name).ToListAsync();
var result = products.Where(p => !archived.Contains(p.Name)).ToList(); // 💀 Tüm veri bellekte

// ✅ DOĞRU: EXCEPT ile DB'de çöz
var result = await context.Products.Select(p => p.Name)
    .Except(context.ArchivedProducts.Select(a => a.Name))
    .ToListAsync(); // ✅ Tek SQL, DB'de çözülür
\`\`\`

> **Performans İpucu:** \`Union()\` implicit DISTINCT yapar. Tekrar umurunda değilse \`Concat()\` (UNION ALL) kullan — sort maliyetinden kurtulursun.

### ⚠️ Client Evaluation — Dikkat!

\`\`\`csharp
// ❌ Client'ta çalışır (SQL'e çevrilemez — tüm tablo çekilir!)
var result = context.Products
    .Where(p => MyCustomMethod(p.Name))   // ← EF bunu SQL'e çeviremez
    .ToList();

// ❌ EF Core 3.0+ bu durumda HATA FIRLATTIR (eski sürümler sessizce client'ta çalıştırırdı)
// InvalidOperationException: ... could not be translated

// ✅ Çözüm 1: Önce SQL'de filtrele, sonra client'ta işle
var result = context.Products
    .Where(p => p.IsActive)          // SQL'de çalışır
    .AsEnumerable()                  // Buradan sonrası client
    .Where(p => MyCustomMethod(p.Name))
    .ToList();

// ✅ Çözüm 2: EF fonksiyonlarıyla yeniden yaz
var result = context.Products
    .Where(p => EF.Functions.Like(p.Name, "%phone%"))
    .ToList();
\`\`\`

> 💡 **Kural:** \`Where()\`, \`OrderBy()\`, \`Select()\` içinde yazdığın her ifade SQL'e çevrilebilir olmalı.  
> Çevrilemezse → ya \`AsEnumerable()\` sonrası yap, ya da EF.Functions kullan.

## 13. Projection & DTO Mapping 🟡

Veritabanından sadece ihtiyacın olan sütunları çeker — tüm entity'yi yüklemek yerine. \`Include()\` tüm sütunları getirir, \`Select()\` sadece belirttiklerini. Özellikle liste sayfaları ve API response'larında gereksiz veri transferini önler.

---

### Neden Projection?

\`\`\`csharp
// ❌ Kötü: Tüm sütunları çek, sonra DTO'ya maple
var products = await context.Products
    .Include(p => p.Category)
    .ToListAsync();
var dtos = products.Select(p => new ProductDto { ... });
// Problem: Tüm sütunlar çekilir + tracking overhead

// ✅ İyi: Direkt projection — sadece gereken sütunlar
var dtos = await context.Products
    .Select(p => new ProductDto
    {
        Id = p.Id,
        Name = p.Name,
        CategoryName = p.Category.Name
    })
    .ToListAsync();
\`\`\`

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- ❌ Kötü yaklaşım: her şeyi çeker
SELECT [p].*, [c].* FROM [Products] AS [p]
INNER JOIN [Categories] AS [c] ON [p].[CategoryId] = [c].[Id];

-- ✅ İyi yaklaşım: sadece 3 sütun
SELECT [p].[Id], [p].[Name], [c].[Name] AS [CategoryName]
FROM [Products] AS [p]
INNER JOIN [Categories] AS [c] ON [p].[CategoryId] = [c].[Id];
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- ❌ Kötü yaklaşım: her şeyi çeker
SELECT p.*, c.* FROM products AS p
INNER JOIN categories AS c ON p.category_id = c.id;

-- ✅ İyi yaklaşım: sadece 3 sütun
SELECT p.id, p.name, c.name AS category_name
FROM products AS p
INNER JOIN categories AS c ON p.category_id = c.id;
\`\`\`

</details>

### Nested (İç İçe) Projection

\`\`\`csharp
var orders = await context.Orders
    .Select(o => new OrderDetailDto
    {
        OrderId = o.Id,
        CustomerName = o.Customer.Name,
        TotalAmount = o.LineItems.Sum(li => li.Quantity * li.UnitPrice),
        Items = o.LineItems.Select(li => new OrderItemDto
        {
            ProductName = li.Product.Name,
            Quantity = li.Quantity,
            LineTotal = li.Quantity * li.UnitPrice
        }).ToList(),
        ItemCount = o.LineItems.Count()
    })
    .ToListAsync();
\`\`\`

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
SELECT [o].[Id] AS [OrderId],
       [c].[Name] AS [CustomerName],
       (SELECT SUM([li].[Quantity] * [li].[UnitPrice]) FROM [OrderLineItems] AS [li]
        WHERE [li].[OrderId] = [o].[Id]) AS [TotalAmount],
       (SELECT COUNT(*) FROM [OrderLineItems] AS [li0]
        WHERE [li0].[OrderId] = [o].[Id]) AS [ItemCount],
       [li1].[ProductName], [li1].[Quantity], [li1].[Quantity] * [li1].[UnitPrice] AS [LineTotal]
FROM [Orders] AS [o]
INNER JOIN [Customers] AS [c] ON [o].[CustomerId] = [c].[Id]
LEFT JOIN (
    SELECT [li].[OrderId], [p].[Name] AS [ProductName], [li].[Quantity], [li].[UnitPrice]
    FROM [OrderLineItems] AS [li]
    INNER JOIN [Products] AS [p] ON [li].[ProductId] = [p].[Id]
) AS [li1] ON [li1].[OrderId] = [o].[Id]
ORDER BY [o].[Id];
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
SELECT o.id AS order_id,
       c.name AS customer_name,
       (SELECT SUM(li.quantity * li.unit_price) FROM order_line_items AS li
        WHERE li.order_id = o.id) AS total_amount,
       (SELECT COUNT(*) FROM order_line_items AS li0
        WHERE li0.order_id = o.id) AS item_count,
       li1.product_name, li1.quantity, li1.quantity * li1.unit_price AS line_total
FROM orders AS o
INNER JOIN customers AS c ON o.customer_id = c.id
LEFT JOIN (
    SELECT li.order_id, p.name AS product_name, li.quantity, li.unit_price
    FROM order_line_items AS li
    INNER JOIN products AS p ON li.product_id = p.id
) AS li1 ON li1.order_id = o.id
ORDER BY o.id;
\`\`\`

</details>

### Projection vs Include — Karar Tablosu

| Senaryo | Tercih | Neden |
|---|---|---|
| API'ye DTO dönüyorsun | **Projection** | Sadece gereken sütunlar |
| Entity üzerinde güncelleme yapacaksın | **Include** | Change tracking gerekli |
| Rapor / Dashboard | **Projection** | Aggregate + minimal veri |
| Admin panel (CRUD) | **Include** | Entity'yi komple ihtiyacın var |
| Performans kritik (liste sorguları) | **Projection** | Network + bellek tasarrufu |

public class CustomerConfiguration : IEntityTypeConfiguration<Customer>
{

public class OrderLineItem
{
    public string ProductName { get; set; }
    public int    Quantity    { get; set; }
    public decimal UnitPrice  { get; set; }
}

public class Order
{
    public int    Id        { get; set; }
    public string Reference { get; set; }
    public ICollection<OrderLineItem> LineItems { get; set; }
}

public class OrderConfiguration : IEntityTypeConfiguration<Order>
{
    public void Configure(EntityTypeBuilder<Order> builder)
    {
        builder.ToTable("Orders");
        builder.HasKey(o => o.Id);

        builder.OwnsMany(o => o.LineItems, item =>
        {
            item.ToTable("OrderLineItems");          // OwnsMany ayrı tablo zorunlu
            item.WithOwner().HasForeignKey("OrderId");
            item.Property(i => i.ProductName).IsRequired().HasMaxLength(200);
            item.Property(i => i.Quantity)   .IsRequired();
            item.Property(i => i.UnitPrice)  .HasPrecision(18, 2);
        });
    }
}

### Ne zaman Owned Entity, ne zaman ayrı tablo?

| Durum | Karar |
| --- | --- |
| Nesne her zaman sahibiyle birlikte sorgulanıyor | Owned Entity ✅ |
| Nesnenin geçmişi tutulacak (eski siparişin adresi değişmemeli) | Ayrı tablo ✅ |
| Aynı nesneyi birden fazla entity paylaşabilir | Ayrı tablo ✅ |
| Nesne tek başına listelenmeyecek | Owned Entity ✅ |

## 15. Complex Types — EF Core 8+ 🟠

Owned Entity'nin modern alternatifi. Kimliği (Id) olmayan, birden fazla entity'de tekrar kullanabileceğin değer nesneleri tanımlar. Para birimi, koordinat, renk gibi yapılar için. Owned Entity'den farkı: aynı tip birden fazla yerde kullanılabilir, tablo başına değil tip başına tanımlanır.

---

### Gerçek Senaryo: Ürün fiyatı — para birimi ile birlikte

\`decimal Price\` yazmak yetmez — hangi para birimi? \`Money\` tipini hem \`Product\` hem \`Order\` hem başka entityler kullanabilir.

\`\`\`csharp
// --- Tipler ---

public record Money(decimal Amount, string Currency);   // record → immutable

public class Product
{
    public int    Id        { get; set; }
    public string Name      { get; set; }
    public Money  Price     { get; set; }   // satış fiyatı
    public Money  CostPrice { get; set; }   // maliyet fiyatı
}

public class Order
{
    public int   Id    { get; set; }
    public Money Total { get; set; }   // aynı Money tipi burada da kullanılıyor
}

// --- Config ---

public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.ToTable("Products");
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Name).IsRequired().HasMaxLength(200);

        builder.ComplexProperty(p => p.Price, price =>
        {
            price.Property(m => m.Amount)  .HasColumnName("Price_Amount")  .HasPrecision(18, 2);
            price.Property(m => m.Currency).HasColumnName("Price_Currency").HasMaxLength(3);
        });

        builder.ComplexProperty(p => p.CostPrice, cost =>
        {
            cost.Property(m => m.Amount)  .HasColumnName("Cost_Amount")  .HasPrecision(18, 2);
            cost.Property(m => m.Currency).HasColumnName("Cost_Currency").HasMaxLength(3);
        });
    }
}

### Owned Entity ile Complex Type farkı

|  | Owned Entity | Complex Type (EF8+) |
| --- | --- | --- |
| Ayrı tabloya taşınabilir mi? | ✅ \`ToTable(...)\` | ❌ |
| JSON'a map edilebilir mi? | ✅ \`ToJson()\` | ✅ EF Core 10+ 🆕 |
| Koleksiyon olabilir mi? | ✅ \`OwnsMany\` | ❌ (JSON içinde ✅ EF10) |
| Struct kullanılabilir mi? | ❌ | ✅ EF Core 10+ 🆕 |
| Optional olabilir mi? | ✅ | ✅ EF Core 10+ 🆕 |
| ExecuteUpdate desteği | ❌ | ✅ EF Core 10+ 🆕 |
| Semantik | Kimliksiz entity gibi davranır | Gerçek value object |
| Ne zaman tercih et | Legacy, koleksiyon / ayrı tablo gerekiyorsa | **Yeni projelerde her zaman tercih et** (EF10 ile tam destek) |

> 🆕 **EF Core 10 ile Complex Types artık tavsiye edilen yaklaşım:**
> - JSON mapping (\`b.ComplexProperty(c => c.Address, c => c.ToJson())\`)
> - Struct desteği (identity olmayan value object'ler için doğal)
> - Optional complex types (\`Address?\`)
> - \`ExecuteUpdateAsync\` ile bulk güncelleme
> - Owned entity'lerdeki "aynı referans atama" sorunu yok (value semantics)

## 16. Kalıtım (Inheritance) — TPH / TPT / TPC 🟠

Ortak bir base class'tan türeyen entity'leri veritabanında nasıl saklayacağını belirler. Üç strateji var: TPH (tek tablo, en hızlı), TPT (her tip ayrı tablo, normalize), TPC (her somut tip ayrı tablo, birleşik sorgu yok). Seçim performans ve veri bütünlüğü dengesine bağlı.

---

// --- Entity'ler ---

public abstract class Payment               // soyut taban
{
    public int      Id      { get; set; }
    public decimal  Amount  { get; set; }
    public DateTime PaidAt  { get; set; }
    public int      OrderId { get; set; }
}

public class CreditCardPayment : Payment
{
    public string Last4Digits { get; set; }  // sadece kredi kartında
    public string CardHolder  { get; set; }
}

public class BankTransferPayment : Payment
{
    public string Iban       { get; set; }   // sadece havalede
    public string SenderName { get; set; }
}

public class CashOnDeliveryPayment : Payment
{
    public string CourierName { get; set; }  // sadece kapıda ödemede
}

// --- Config ---

public class PaymentConfiguration : IEntityTypeConfiguration<Payment>
{
    public void Configure(EntityTypeBuilder<Payment> builder)
    {
        builder.ToTable("Payments");         // tek tablo — TPH varsayılan
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Amount).HasPrecision(18, 2);

        builder.HasDiscriminator<string>("PaymentType")
               .HasValue<CreditCardPayment>    ("credit_card")
               .HasValue<BankTransferPayment>  ("bank_transfer")
               .HasValue<CashOnDeliveryPayment>("cash_on_delivery");
    }
}

### Karşılaştırma Tablosu

| Durum | Seçim |
| --- | --- |
| Tipler arasındaki fark az, sorgular genelde tüm hiyerarşiyi kapsıyor | **TPH** |
| DB normalize olsun, null dolu sütun istemiyorum | **TPT** |
| Her tip yüksek hacimli, join maliyeti kabul edilemez | **TPC** |
| Derived type'ları çoğunlukla ayrı ayrı sorguluyorum | **TPC** |

| Strateji | Tablo sayısı | Join | Null sütun | Performans |
| --- | --- | --- | --- | --- |
| **TPH** | 1 | Yok | Çok | En hızlı |
| **TPT** | N | FK join | Yok | Yavaş |
| **TPC** | N (concrete) | Yok | Yok | Hızlı |

> 🐘 **PostgreSQL'de Inheritance:**
> - PostgreSQL'in kendi **TABLE INHERITANCE** özelliği var (\`INHERITS\` keyword) ama EF Core bunu **kullanmaz**
> - EF Core TPH/TPT/TPC stratejileri PostgreSQL'de aynı şekilde çalışır (standart tablolar)
> - TPH'da discriminator: \`VARCHAR\` (SQL Server'daki \`NVARCHAR\` yerine)
> - TPC'de sequence paylaşımı: PostgreSQL native sequence ile sorunsuz çalışır
> - **Table Partitioning** (PostgreSQL 10+): Büyük tablolarda \`PARTITION BY RANGE/LIST/HASH\` ile fiziksel bölümleme yapılabilir — EF bunu bilmez ama DBA tarafında uygulanır

\`\`\`sql
-- PostgreSQL native partitioning (DBA seviyesinde):
CREATE TABLE notifications (
    id         INT GENERATED ALWAYS AS IDENTITY,
    user_id    TEXT NOT NULL,
    message    TEXT NOT NULL,
    type       TEXT NOT NULL,        -- 'email', 'sms', 'push'
    sent_at    TIMESTAMPTZ NOT NULL
) PARTITION BY LIST (type);

CREATE TABLE notifications_email PARTITION OF notifications FOR VALUES IN ('email');
CREATE TABLE notifications_sms   PARTITION OF notifications FOR VALUES IN ('sms');

## 17. Value Converters 🟠

C# tarafında zengin tipler (enum, DateOnly, custom class) kullanırken bunların veritabanında hangi formatta saklanacağını belirler. Örneğin enum'ı string olarak saklamak, ya da \`Money\` nesnesini decimal sütuna dönüştürmek. EF Core okuma/yazma sırasında otomatik çevirir.

#### Kullanım

\`\`\`csharp
// Enum → string
builder.Property(p => p.Status)
       .HasConversion<string>();

// Enum → int (varsayılan)
builder.Property(p => p.Status)
       .HasConversion<int>();

// Özel lambda dönüşümü
builder.Property(p => p.Tags)
       .HasConversion(
           v => string.Join(',', v),
           v => v.Split(',', StringSplitOptions.RemoveEmptyEntries).ToList()
       );

// ValueConverter sınıfı
var converter = new ValueConverter<Money, decimal>(
    money  => money.Amount,
    amount => new Money(amount, "TRY")
);

builder.Property(p => p.Price).HasConversion(converter);

// DateTimeOffset → long (Unix timestamp)
builder.Property(p => p.CreatedAt)
       .HasConversion(
           d => d.ToUnixTimeSeconds(),
           l => DateTimeOffset.FromUnixTimeSeconds(l)
       );

// Yerleşik built-in converters (EF Core 6+)
builder.Property(p => p.Flags)
       .HasConversion<EnumToStringConverter<MyEnum>>();
\`\`\`

**📌 Enum → String dönüşümü DB'de nasıl görünür:**

\`\`\`csharp
public enum OrderStatus { Pending, Confirmed, Shipped, Delivered, Cancelled }
\`\`\`

| Id | Reference | Status (C# int) | Status (string conversion) |
|----|-----------|-----------------|---------------------------|
| 1 | ORD-001 | 0 | "Pending" |
| 2 | ORD-002 | 2 | "Shipped" |
| 3 | ORD-003 | 4 | "Cancelled" |

### Global Converter Convention — Tüm Enum'ları String Yap

\`\`\`csharp
// DbContext.ConfigureConventions() ile tek seferde:
protected override void ConfigureConventions(ModelConfigurationBuilder configurationBuilder)
{
    // Tüm enum property'ler string olarak saklanır
    configurationBuilder.Properties<OrderStatus>().HaveConversion<string>();
    configurationBuilder.Properties<PaymentType>().HaveConversion<string>();
    
    // Veya genel: tüm enum'lar string
    // (Custom convention ile — bkz. Bölüm 42)
}
\`\`\`

### Yaygın Converter Senaryoları

| C# Tipi | DB Tipi | Converter | Kullanım |
|---------|---------|-----------|----------|
| \`Enum\` | \`NVARCHAR\` | \`HasConversion<string>()\` | Okunabilirlik |
| \`Enum\` | \`INT\` | Varsayılan | Performans |
| \`bool\` | \`CHAR(1)\` | \`'Y'/'N'\` lambda | Legacy DB uyumu |
| \`DateOnly\` | \`DATE\` | EF Core 8+ built-in | .NET 6+ tipi |
| \`TimeOnly\` | \`TIME\` | EF Core 8+ built-in | .NET 6+ tipi |
| \`List<T>\` | \`NVARCHAR(MAX)\` | JSON serialize | EF Core 7 öncesi |
| \`Money\` (VO) | \`DECIMAL\` | Custom converter | DDD value object |
| \`Uri\` | \`NVARCHAR\` | \`.ToString()\` / \`new Uri()\` | URL saklama |
| \`CultureInfo\` | \`NVARCHAR\` | \`.Name\` / \`new CultureInfo()\` | Dil bilgisi |

### Custom ValueConverter Sınıfı (Reusable)

\`\`\`csharp
// Tekrar kullanılabilir converter
public class StronglyTypedIdConverter<TId> : ValueConverter<TId, int>
    where TId : struct
{
    public StronglyTypedIdConverter()
        : base(
            id => (int)(object)id,
            value => (TId)(object)value)
    { }
}

// Kullanım
builder.Property(p => p.Id).HasConversion<StronglyTypedIdConverter<ProductId>>();
\`\`\`

> ⚠️ **ValueComparer:** \`HasConversion\` ile referans tipi kullanılıyorsa, mutlaka \`ValueComparer\` da tanımlanmalıdır. Aksi halde change tracking düzgün çalışmaz.

### Value Comparer — Change Tracking ile İlişkisi

EF Core, bir property'nin değişip değişmediğini **Value Comparer** ile anlar.  
Primitive tipler (int, string) için sorun yok — ama **koleksiyon, JSON, custom class** içeren property'lerde comparer tanımlanmazsa EF değişikliği **algılayamaz**.

**Problem:**

\`\`\`csharp
var product = await context.Products.FindAsync(1);
product.Tags.Add("yeni-tag");       // ← Listeye eleman eklendi
await context.SaveChangesAsync();   // ❌ EF bunu FARKETMEZ! Referans aynı kaldı.
\`\`\`

**Çözüm: Converter + Comparer birlikte tanımla:**

\`\`\`csharp
builder.Property(p => p.Tags)
    .HasConversion(
        v => JsonSerializer.Serialize(v, (JsonSerializerOptions?)null),
        v => JsonSerializer.Deserialize<List<string>>(v, (JsonSerializerOptions?)null)!)
    .HasColumnType("nvarchar(max)")
    .Metadata.SetValueComparer(new ValueComparer<List<string>>(
        (c1, c2) => c1!.SequenceEqual(c2!),              // Eşitlik: içerik bazlı
        c => c.Aggregate(0, (a, v) => HashCode.Combine(a, v.GetHashCode())),  // Hash
        c => c.ToList()));                                // Snapshot (deep copy)
\`\`\`

**Custom class (Value Object) için:**

\`\`\`csharp
public record Money(decimal Amount, string Currency);

builder.Property(p => p.Price)
    .HasConversion(
        m => JsonSerializer.Serialize(m, (JsonSerializerOptions?)null),
        s => JsonSerializer.Deserialize<Money>(s, (JsonSerializerOptions?)null)!)
    .Metadata.SetValueComparer(new ValueComparer<Money>(
        (m1, m2) => m1!.Amount == m2!.Amount && m1.Currency == m2.Currency,
        m => HashCode.Combine(m.Amount, m.Currency),
        m => m with { }));  // record → deep copy
\`\`\`

**Ne zaman ValueComparer gerekir?**

| Property Tipi | Gerekli mi? | Neden |
|---------------|:-----------:|-------|
| \`int\`, \`string\`, \`decimal\` | ❌ | Primitive — değer karşılaştırma zaten çalışır |
| \`DateTime\`, \`Guid\` | ❌ | Struct — değer bazlı |
| \`List<string>\`, \`List<int>\` | ✅ | Referans tipi (EF Core 8+ PrimitiveCollection ise otomatik) |
| \`Dictionary<string, object>\` | ✅ | Referans tipi |
| Custom class (Address, Money) | ✅ | Referans tipi (Owned Entity ise EF halleder) |

> 💡 **EF Core 8+:** \`PrimitiveCollection\` kullanıldığında ValueComparer otomatik atanır — manual tanımlamaya gerek kalmaz.

<details>
<summary><b>🐘 PostgreSQL Value Converter Farkları</b></summary>

> 🐘 **PostgreSQL Value Converter Farkları:**
> - **Native enum desteği:** PostgreSQL \`CREATE TYPE ... AS ENUM\` destekler — Value Converter gerekmez!
> - **Native array:** \`List<string>\` → \`text[]\` (converter gereksiz, PG native halleder)
> - **Interval:** \`TimeSpan\` → \`INTERVAL\` (SQL Server'da sınırlı destek)
> - **inet/cidr:** IP adresleri için native tip (converter gerektirmez)

\`\`\`csharp
// PostgreSQL native enum (Value Converter'a GEREK YOK!):
public enum OrderStatus { Pending, Shipped, Delivered, Cancelled }

// Npgsql'de enum mapping:
// 1. DbContext'e enum'ı kaydet:
protected override void OnModelCreating(ModelBuilder modelBuilder)
{
    modelBuilder.HasPostgresEnum<OrderStatus>();  // CREATE TYPE order_status AS ENUM(...)
}

// 2. Property doğrudan enum tipinde kalır:
builder.Property(o => o.Status)
       .HasColumnType("order_status");  // Native PG enum, string'e çevirmeye gerek yok!

// Avantaj: DB seviyesinde type safety + daha az disk alanı + index destekli
\`\`\`

\`\`\`sql
-- PostgreSQL'de:
CREATE TYPE order_status AS ENUM ('pending', 'shipped', 'delivered', 'cancelled');

CREATE TABLE orders (
    id     INT GENERATED ALWAYS AS IDENTITY,
    status order_status NOT NULL DEFAULT 'pending',  -- Native enum!
    CONSTRAINT pk_orders PRIMARY KEY (id)
);

-- WHERE ile doğrudan kullanılabilir:
SELECT * FROM orders WHERE status = 'shipped';
-- Geçersiz değer → DB hata verir (type safety)
INSERT INTO orders (status) VALUES ('invalid'); -- ERROR!
\`\`\`

</details>

💡 **Enum karşılaştırma:**
| Yaklaşım | SQL Server | PostgreSQL | Avantaj |
|----------|-----------|-----------|---------|
| \`HasConversion<string>()\` | ✅ NVARCHAR | ✅ TEXT | Provider bağımsız |
| \`HasConversion<int>()\` | ✅ INT | ✅ INT | Performanslı |
| Native PG enum | ❌ | ✅ \`CREATE TYPE AS ENUM\` | Type-safe, küçük, hızlı |

// Shadow property tanımlama
builder.Property<DateTime>("CreatedAt");

builder.HasOne<User>()
       .WithMany()
       .HasForeignKey("UserId");
// ☝️ Entity class'ında UserId property'si yok — EF bunu shadow olarak yönetir.
//    DB'de FK sütunu oluşur, JOIN/Include çalışır — ama C# class temiz kalır.

// SaveChanges override ile otomatik set
public override Task<int> SaveChangesAsync(CancellationToken ct = default)
{
    foreach (var entry in ChangeTracker.Entries<BaseEntity>())
    {
        if (entry.State == EntityState.Added)
            entry.Property("CreatedAt").CurrentValue = DateTime.UtcNow;
        if (entry.State is EntityState.Added or EntityState.Modified)
            entry.Property("UpdatedAt").CurrentValue = DateTime.UtcNow;
    }
    return base.SaveChangesAsync(ct);
}

## 19. Global Query Filters 🟠

Model düzeyinde tanımlanan, o entity'ye yapılan tüm sorgulara otomatik eklenen WHERE koşulları. Soft delete (\`IsDeleted\`), multi-tenancy (\`TenantId\`) gibi her sorguda tekrar tekrar yazılması gereken filtreleri tek noktada tanımlarsın.

#### Tanımlama

\`\`\`csharp
// Soft delete filtresi
builder.HasQueryFilter(p => !p.IsDeleted);

// Multi-tenant filtresi (DbContext'e inject edilen tenantId ile)
builder.HasQueryFilter(p => p.TenantId == _tenantId);

// Filtreli sorguyu devre dışı bırakma
var allProducts = context.Products.IgnoreQueryFilters().ToList();
\`\`\`

**📌 Soft Delete filtresi nasıl çalışır:**

\`\`\`csharp
// Normal sorgu
context.Products.Where(p => p.Price > 100).ToList();
\`\`\`

FROM [Products] AS [p]
WHERE [p].[Price] > 100.0 
  AND [p].[IsDeleted] = CAST(0 AS bit);    -- ← Otomatik eklendi!
\`\`\`

### Birden Fazla Filter Kombinasyonu

\`\`\`csharp
// ⚠️ EF Core 9 ve öncesi: Tek bir entity'ye sadece BİR HasQueryFilter atanabilir.
// Birden fazla koşul AND ile birleştirilir:
builder.HasQueryFilter(p => !p.IsDeleted && p.TenantId == _tenantId);

// ❌ İkinci HasQueryFilter ilkini EZİP yazar (override) — EF9 ve öncesi:
builder.HasQueryFilter(p => !p.IsDeleted);
builder.HasQueryFilter(p => p.TenantId == _tenantId);  // ← Sadece bu geçerli!
\`\`\`

### Named Query Filters — EF Core 10+ 🆕

EF Core 10 ile artık birden fazla **isimli** filter tanımlanabilir ve seçici olarak devre dışı bırakılabilir:

\`\`\`csharp
// 🆕 EF Core 10 (GA — .NET 10): İsimli query filter'lar
modelBuilder.Entity<Product>()
    .HasQueryFilter("SoftDelete", p => !p.IsDeleted)
    .HasQueryFilter("Tenant", p => p.TenantId == _tenantId);

// Sorguda sadece belirli filter'ları devre dışı bırakma:
var allProducts = await context.Products
    .IgnoreQueryFilters(["SoftDelete"])   // Sadece soft-delete kaldırıldı, Tenant hâlâ aktif
    .ToListAsync();

// Tüm filter'ları kaldırma (eski davranış):
var everything = await context.Products
    .IgnoreQueryFilters()   // Hepsi devre dışı
    .ToListAsync();

SELECT * FROM [Products] WHERE [TenantId] = @tenantId;  -- IsDeleted filtresi YOK

-- IgnoreQueryFilters() ile:

### İlişkili Entity'lerde Filter Davranışı

\`\`\`csharp
// Category → HasQueryFilter(c => !c.IsDeleted)
// Product → HasQueryFilter(p => !p.IsDeleted)

// Include ile: her iki filter DA uygulanır
var categories = context.Categories
    .Include(c => c.Products)
    .ToList();
\`\`\`

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- EF her iki tabloya da filter uygular:
SELECT [c].*, [p].*
FROM [Categories] AS [c]
LEFT JOIN [Products] AS [p] ON [p].[CategoryId] = [c].[Id] AND [p].[IsDeleted] = 0
WHERE [c].[IsDeleted] = 0;
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- EF her iki tabloya da filter uygular:
SELECT c.*, p.*
FROM categories AS c
LEFT JOIN products AS p ON p.category_id = c.id AND p.is_deleted = FALSE
WHERE c.is_deleted = FALSE;
\`\`\`

</details>

> ⚠️ **Required navigation + filter = silent data loss!**  
> Eğer \`Product.CategoryId\` required ise ve Category soft-deleted ise → Product join'da kaybolur.  
> Çözüm: İlişkiyi optional yap veya \`IgnoreQueryFilters()\` kullan.

## 20. Sequence & Default Values 🟠

Sequence, veritabanı seviyesinde sıralı numara üreten bir nesne. Identity'den farkı: INSERT öncesinde numara alabilirsin (sipariş numarası gibi). Default value ise sütuna değer verilmezse otomatik atanacak değer.

#### Sequence Tanımlama

\`\`\`csharp
// Sequence tanımlama
modelBuilder.HasSequence<int>("OrderNumbers", schema: "shared")
            .StartsAt(1000)
            .IncrementsBy(1);

// Sequence kullanma
builder.Property(o => o.OrderNo)
       .HasDefaultValueSql("NEXT VALUE FOR shared.OrderNumbers");

// Hi-Lo pattern (toplu insert performansı)
builder.Property(p => p.Id).UseHiLo("ProductHiLo");

// Global Hi-Lo
modelBuilder.UseHiLo();

// Computed default
builder.Property(p => p.Slug)
       .HasComputedColumnSql("LOWER(REPLACE([Name], ' ', '-'))", stored: true);
\`\`\`

**📌 Sequence SQL:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
CREATE SEQUENCE [shared].[OrderNumbers]
    AS INT
    START WITH 1000
    INCREMENT BY 1;

-- Kullanımda:
SELECT NEXT VALUE FOR [shared].[OrderNumbers];  -- → 1000, 1001, 1002...
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
CREATE SEQUENCE shared.order_numbers
    AS INT
    START WITH 1000
    INCREMENT BY 1;

-- Kullanımda:
SELECT nextval('shared.order_numbers');  -- → 1000, 1001, 1002...

-- Default olarak atama:
ALTER TABLE orders ALTER COLUMN order_no SET DEFAULT nextval('shared.order_numbers');
\`\`\`

</details>

### Hi-Lo pattern — nasıl çalışır

\`\`\`
Uygulama başlangıcı:
  DB'den blok al: 1-10 (Hi=10, Lo=1)
  
Insert 1: Id = 1  (DB'ye gitmeden)
Insert 2: Id = 2  (DB'ye gitmeden)
...
Insert 10: Id = 10 (blok bitti)

Yeni blok al: 11-20 (Hi=20, Lo=11)
Insert 11: Id = 11
...
\`\`\`

### Sequence & Default Values — Provider farkları

<details>
<summary>💾 SQL Server</summary>

\`\`\`csharp
// Sequence kullanma
builder.Property(o => o.OrderNo)
       .HasDefaultValueSql("NEXT VALUE FOR shared.OrderNumbers");

// Hi-Lo pattern
builder.Property(p => p.Id).UseHiLo("ProductHiLo");

// Computed column (stored)
builder.Property(p => p.Slug)
       .HasComputedColumnSql("LOWER(REPLACE([Name], ' ', '-'))", stored: true);
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`csharp
// Sequence kullanma
builder.Property(o => o.OrderNo)
       .HasDefaultValueSql("nextval('shared.order_numbers')");  // PG syntax

// Hi-Lo pattern (aynı API, PG sequence kullanır)
builder.Property(p => p.Id).UseHiLo("product_hilo");

// Computed column (stored)
builder.Property(p => p.Slug)
       .HasComputedColumnSql("LOWER(REPLACE(name, ' ', '-'))", stored: true);
       // PG: GENERATED ALWAYS AS (lower(replace(name, ' ', '-'))) STORED
\`\`\`

> 💡 **PostgreSQL notları:**
> - \`NEXT VALUE FOR\` → \`nextval('sequence_name')\`
> - Hi-Lo tam desteklenir
> - \`UseSerialColumn()\` legacy SERIAL; modern projelerde \`UseIdentityColumn()\` tercih et
> - Computed column: \`AS ... PERSISTED\` yok → \`GENERATED ALWAYS AS (...) STORED\`

</details>

## 21. Concurrency Tokens 🟠

Aynı kaydı iki kullanıcı aynı anda güncellemeye çalıştığında veri kaybını önleyen mekanizma. EF Core "optimistic concurrency" kullanır — kayıt okunduğundaki versiyonu saklar, UPDATE sırasında versiyon değişmişse hata fırlatır. Böylece "son yazan kazanır" yerine "çakışma tespit edilir, sen karar ver" mantığı çalışır.

### 21.1 Optimistic vs Pessimistic Concurrency

| Strateji | Açıklama | EF Core Desteği |
|----------|----------|-----------------|
| **Optimistic** | Çakışma olursa kaydetme anında yakala | ✅ Varsayılan |
| **Pessimistic** | Satırı kilitle, başkası okumasın | ❌ EF desteklemez (Raw SQL ile mümkün) |

EF Core **optimistic concurrency** kullanır: Okuma sırasında kilit almaz, yazma anında "bu kayıt okunduğundan beri değişmiş mi?" kontrolü yapar.

### 21.2 RowVersion (Timestamp) Token

\`\`\`csharp
public class Product
{
    public int Id { get; set; }
    public string Name { get; set; }
    public decimal Price { get; set; }
    public int Stock { get; set; }

    [Timestamp]                          // Data Annotation
    public byte[] RowVersion { get; set; }
}

// Fluent API (EntityTypeConfiguration)
public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.Property(p => p.RowVersion)
               .IsRowVersion();          // byte[] → SQL Server ROWVERSION
    }
}
\`\`\`

**📌 Üretilen SQL:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
CREATE TABLE [Products] (
    [Id]         INT            IDENTITY(1,1) NOT NULL,
    [Name]       NVARCHAR(200)  NOT NULL,
    [Price]      DECIMAL(18,2)  NOT NULL,
    [Stock]      INT            NOT NULL,
    [RowVersion] ROWVERSION     NOT NULL,   -- SQL Server her UPDATE'te otomatik artırır
    CONSTRAINT [PK_Products] PRIMARY KEY ([Id])
);
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
CREATE TABLE products (
    id         INTEGER GENERATED ALWAYS AS IDENTITY,
    name       VARCHAR(200)  NOT NULL,
    price      NUMERIC(18,2) NOT NULL,
    stock      INTEGER       NOT NULL,
    -- PostgreSQL'de ROWVERSION yok → xmin system column kullanılır
    -- xmin: her satırın oluşturulduğu/güncellendiği transaction ID'si (otomatik, gizli)
    CONSTRAINT pk_products PRIMARY KEY (id)
);

-- xmin'e erişim:
SELECT xmin, id, name, price FROM products;
-- EF Core: builder.UseXminAsConcurrencyToken();
\`\`\`

</details>

> 💡 \`ROWVERSION\` (eski adıyla \`TIMESTAMP\`) 8-byte binary değerdir. Her UPDATE'te SQL Server otomatik artırır — uygulama kodu bu değeri hiç set etmez.
> PostgreSQL'de ise \`xmin\` system column aynı rolü üstlenir (gizlidir, CREATE TABLE'da görünmez).

### 21.3 Property-Level Concurrency Token

\`\`\`csharp
public class BankAccount
{
    public int Id { get; set; }
    public string Owner { get; set; }
    public decimal Balance { get; set; }    // Bu alanı korumak istiyoruz
    public DateTime LastModified { get; set; }
}

public class BankAccountConfiguration : IEntityTypeConfiguration<BankAccount>
{
    public void Configure(EntityTypeBuilder<BankAccount> builder)
    {
        // Sadece Balance alanı concurrency token
        builder.Property(b => b.Balance)
               .IsConcurrencyToken();

        // Veya LastModified ile kontrol
        builder.Property(b => b.LastModified)
               .IsConcurrencyToken();
    }
}
\`\`\`

**📌 Üretilen UPDATE:**

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Balance concurrency token olduğunda:
UPDATE [BankAccounts]
SET [Balance] = @p0, [LastModified] = @p1
WHERE [Id] = @p2 AND [Balance] = @p3;
--                    ^^^^^^^^^^^^^^^^ orijinal değer eşleşmezse 0 satır!

SELECT @@ROWCOUNT;  -- 0 → DbUpdateConcurrencyException
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Balance concurrency token olduğunda:
UPDATE bank_accounts
SET balance = @p0, last_modified = @p1
WHERE id = @p2 AND balance = @p3;
--                  ^^^^^^^^^^^^^^^^ orijinal değer eşleşmezse 0 satır!

-- Etkilenen satır sayısı 0 ise → DbUpdateConcurrencyException
\`\`\`

</details>

> ⚠️ \`IsConcurrencyToken()\` kullanılırsa değer otomatik artmaz — uygulamanın kendisi yeni değer atamalı. \`IsRowVersion()\` ise SQL Server tarafından otomatik yönetilir.

### 21.4 SQL'de Tam Çalışma Mekanizması

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- EF'in SaveChanges() ile ürettiği sorgu (RowVersion):
UPDATE [Products]
SET [Name] = @p0, [Price] = @p1, [Stock] = @p2
WHERE [Id] = @p3 AND [RowVersion] = @p4;

SELECT [RowVersion]          -- Yeni RowVersion'ı geri al
FROM [Products]
WHERE @@ROWCOUNT = 1 AND [Id] = @p3;

-- @@ROWCOUNT = 0 ise → kimse etkilenmedi → DbUpdateConcurrencyException!
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- EF'in SaveChanges() ile ürettiği sorgu (xmin concurrency token):
UPDATE products
SET name = @p0, price = @p1, stock = @p2
WHERE id = @p3 AND xmin = @p4
RETURNING xmin;              -- Yeni xmin değerini geri al

-- Etkilenen satır 0 ise → DbUpdateConcurrencyException!
-- PostgreSQL'de xmin, her UPDATE'te otomatik değişen transaction ID'dir
\`\`\`

</details>

**📌 Zaman Çizelgesi Senaryosu:**

\`\`\`
Zaman   Kullanıcı A                       Kullanıcı B
─────   ──────────────────────────        ──────────────────────────
T1      Product oku (RowVersion=0x01)      
T2                                         Product oku (RowVersion=0x01)
T3      Price=100→120, SaveChanges()       
        WHERE RowVersion=0x01 → 1 satır ✅  
        (RowVersion artık 0x02)
T4                                         Price=100→150, SaveChanges()
                                           WHERE RowVersion=0x01 → 0 satır ❌
                                           → DbUpdateConcurrencyException!
\`\`\`

### 21.5 Conflict Resolution (Çakışma Çözümleme)

**📌 Strateji karşılaştırma:**

| Strateji | Ne zaman? | Veri kaybı riski |
|----------|-----------|------------------|
| Client Wins | Admin paneli, son güncelleme geçerli | Orta — önceki değişiklik ezilir |
| Database Wins | Okuma ağırlıklı, conflict nadir | Düşük — kullanıcıya bilgi verilir |
| Merge | Farklı alanlar güncelleniyorsa | En düşük — alan bazlı birleştirme |

// Strateji 1: Client Wins (Son yazan kazanır — force overwrite)
public async Task UpdateProductClientWins(int productId, decimal newPrice)
{
    var product = await _context.Products.FindAsync(productId);
    product.Price = newPrice;

    bool saved = false;
    while (!saved)
    {
        try
        {
            await _context.SaveChangesAsync();
            saved = true;
        }
        catch (DbUpdateConcurrencyException ex)
        {
            foreach (var entry in ex.Entries)
            {
                // DB'deki güncel değerleri al
                var dbValues = await entry.GetDatabaseValuesAsync();
                if (dbValues == null)
                    throw new InvalidOperationException("Kayıt silinmiş!");

                // Original values'ı DB'deki ile değiştir → bir sonraki WHERE geçer
                entry.OriginalValues.SetValues(dbValues);
            }
        }
    }
}

// Strateji 2: Database Wins (DB'deki değer korunur — discard changes)
public async Task UpdateProductDatabaseWins(int productId, decimal newPrice)
{
    var product = await _context.Products.FindAsync(productId);
    product.Price = newPrice;

    try
    {
        await _context.SaveChangesAsync();
    }
    catch (DbUpdateConcurrencyException ex)
    {
        foreach (var entry in ex.Entries)
        {
            // DB'deki değerleri hem Original hem Current'a yaz → değişiklik iptal
            await entry.ReloadAsync();
        }
        // İsterseniz kullanıcıya "Başkası güncelledi, tekrar deneyin" mesajı gösterin
    }
}

// Strateji 3: Merge (Alan bazlı birleştirme — en gelişmiş)
public async Task UpdateProductMerge(int productId, decimal newPrice, string newName)
{
    var product = await _context.Products.FindAsync(productId);
    product.Price = newPrice;
    product.Name = newName;

    try
    {
        await _context.SaveChangesAsync();
    }
    catch (DbUpdateConcurrencyException ex)
    {
        foreach (var entry in ex.Entries)
        {
            var proposedValues = entry.CurrentValues;       // Bizim yazmak istediğimiz
            var originalValues = entry.OriginalValues;      // İlk okuduğumuz
            var dbValues = await entry.GetDatabaseValuesAsync(); // DB'deki güncel

            foreach (var property in proposedValues.Properties)
            {
                var proposed = proposedValues[property];
                var original = originalValues[property];
                var database = dbValues[property];

                // Karar mantığı: Hangi değer geçerli?
                if (original != database && original == proposed)
                {
                    // Biz değiştirmedik ama DB'de değişmiş → DB'deki kalsın
                    proposedValues[property] = database;
                }
                // else: Biz değiştirdik → bizimki geçerli (proposedValues zaten set)
            }

            // Original'ı güncelle ki WHERE doğru çalışsın
            entry.OriginalValues.SetValues(dbValues);
        }

        await _context.SaveChangesAsync(); // Tekrar dene (merge edilmiş değerlerle)
    }
}

### 21.6 Retry Pattern (Tekrar Deneme)

\`\`\`csharp
public async Task<bool> UpdateWithRetry(int productId, decimal newPrice, int maxRetries = 3)
{
    for (int attempt = 0; attempt < maxRetries; attempt++)
    {
        try
        {
            // Her denemede TAZE veri oku (yeni DbContext veya reload)
            var product = await _context.Products.FindAsync(productId);
            if (product == null) return false;

            // Değişikliği uygula
            product.Price = newPrice;
            await _context.SaveChangesAsync();
            return true;
        }
        catch (DbUpdateConcurrencyException)
        {
            // Son deneme ise fırlat
            if (attempt == maxRetries - 1) throw;

            // Entry'leri detach et ve tekrar dene
            foreach (var entry in _context.ChangeTracker.Entries())
                entry.State = EntityState.Detached;
        }
    }
    return false;
}
\`\`\`

### 21.7 Disconnected Scenario (Web API)

Web API'de okuma ve güncelleme farklı request'lerde gerçekleşir. RowVersion değerini client'a gönderip geri alman gerekir.

\`\`\`csharp
// DTO
public class ProductUpdateDto
{
    public int Id { get; set; }
    public string Name { get; set; }
    public decimal Price { get; set; }
    public byte[] RowVersion { get; set; }  // Client bunu geri gönderir
}

// Controller
[HttpPut("{id}")]
public async Task<IActionResult> UpdateProduct(int id, ProductUpdateDto dto)
{
    var product = await _context.Products.FindAsync(id);
    if (product == null) return NotFound();

    // Değerleri güncelle
    product.Name = dto.Name;
    product.Price = dto.Price;

    // Client'ın bildiği RowVersion'ı OriginalValue olarak set et
    _context.Entry(product).Property(p => p.RowVersion)
            .OriginalValue = dto.RowVersion;

    try
    {
        await _context.SaveChangesAsync();
        return Ok(new { product.Id, product.RowVersion }); // Yeni RowVersion'ı döndür
    }
    catch (DbUpdateConcurrencyException)
    {
        return Conflict(new
        {
            Message = "Kayıt başka biri tarafından güncellenmiş.",
            CurrentRowVersion = (await _context.Products.FindAsync(id))?.RowVersion
        });
    }
}

← { id:1, name:"Laptop", price:100, rowVersion:"AAAAAA==" }

PUT /api/products/1
→ { id:1, name:"Laptop", price:120, rowVersion:"AAAAAA==" }

Başarılı: ← 200 { id:1, rowVersion:"AAAAAB==" }
Çakışma:  ← 409 { message:"Kayıt başka biri tarafından güncellenmiş." }

### 21.8 PostgreSQL & Diğer Provider'larda Concurrency

\`\`\`csharp
// PostgreSQL: xmin system column (satır sürümü)
public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        // PostgreSQL'de xmin kullanımı (Npgsql provider)
        builder.UseXminAsConcurrencyToken();

        // Property olarak tanımlamaya gerek yok — xmin gizli sütundur
    }
}

// SQLite: RowVersion yok — manuel GUID/DateTime token kullanılır
public class SqliteProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.Property(p => p.ConcurrencyStamp)
               .IsConcurrencyToken()
               .HasDefaultValueSql("hex(randomblob(8))");  // Benzersiz değer

        // SaveChanges override ile her güncellemede yeni stamp:
    }
}
\`\`\`

**📌 Provider karşılaştırma:**

| Provider | Yöntem | Otomatik? | Not |
|----------|--------|-----------|-----|
| SQL Server | \`ROWVERSION\` / \`TIMESTAMP\` | ✅ | 8-byte, her UPDATE'te artar |
| PostgreSQL | \`xmin\` system column | ✅ | \`UseXminAsConcurrencyToken()\` |
| SQLite | Manuel (GUID/DateTime) | ❌ | Uygulama yönetir |
| MySQL | Manuel (\`TIMESTAMP\` column) | ❌ | \`ON UPDATE CURRENT_TIMESTAMP\` |

### 21.9 Concurrency Token + Owned Types & İlişkiler

\`\`\`csharp
// Owned Type içinde concurrency token OLMAZ — parent entity'de tanımlanır
public class Order
{
    public int Id { get; set; }
    public Address ShippingAddress { get; set; }  // Owned
    public byte[] RowVersion { get; set; }        // Token burada!
}

// İlişkili entity'lerde: HER entity kendi token'ına sahip olmalı
public class OrderItem
{
    public int Id { get; set; }
    public int OrderId { get; set; }
    public decimal UnitPrice { get; set; }
    public byte[] RowVersion { get; set; }  // OrderItem'ın kendi token'ı
}
\`\`\`

> ⚠️ Navigation property üzerinden güncelleme yapılırsa (ör. \`order.Items[0].UnitPrice = 50\`), EF **ilgili entity'nin** RowVersion'ını kontrol eder — parent'ın değil.

### 21.10 Sık Yapılan Hatalar

| Hata | Sonuç | Çözüm |
|------|-------|-------|
| RowVersion'ı \`[NotMapped]\` yapmak | Concurrency kontrolü çalışmaz | Property'yi map'le |
| \`AsNoTracking()\` ile okuyup güncelleme | OriginalValues kaybolur | Tracked oku veya OriginalValue'yu manuel set et |
| RowVersion'ı DTO'da göndermemek | Disconnected'da kontrol çalışmaz | DTO'ya ekle, client geri göndersin |
| \`try/catch\` olmadan SaveChanges | Uygulama çöker | Her zaman exception handle et |
| Tek DbContext'te sonsuz retry | Stale entry'ler birikir | Her retry'da Detach veya yeni context |

## 22. Raw SQL & Transactions 🟠

EF Core'un LINQ çevirisi her senaryoya yetmez — karmaşık sorgular, performans-kritik SQL'ler veya stored procedure çağrıları için raw SQL kullanırsın. Birden fazla işlemi atomik yapmak (ya hepsi ya hiçbiri) için transaction'a sararsın.

---

### Raw SQL Sorguları

\`\`\`csharp
// Parametreli sorgu (SQL Injection korumalı!)
var minPrice = 1000m;
var products = context.Products
    .FromSqlInterpolated($"SELECT * FROM Products WHERE Price > {minPrice}")
    .ToList();

// Stored Procedure çağrısı
var categoryId = 1;
var products = context.Products
    .FromSqlRaw("EXEC GetProductsByCategory @CategoryId = {0}", categoryId)
    .ToList();

// Non-query (INSERT/UPDATE/DELETE)
var affected = context.Database
    .ExecuteSqlInterpolated($"UPDATE Products SET IsActive = 0 WHERE Stock = 0");
\`\`\`

> ⚠️ **GÜVENLİK:** Asla string concatenation kullanma!
> \`\`\`csharp
> // ❌ YANLIŞ — SQL Injection açığı!
> var sql = $"SELECT * FROM Products WHERE Name = '{userInput}'";
> 
> // ✅ DOĞRU — Parametreli
> context.Products.FromSqlInterpolated($"SELECT * FROM Products WHERE Name = {userInput}");
> \`\`\`
>
> 🆕 **EF Core 10:** Yeni bir **Roslyn analyzer** eklendi — \`FromSqlRaw\` içinde string concatenation yaparsanız derleme zamanında uyarı verir:
> \`\`\`csharp
> // ⚠️ EF10 Analyzer uyarısı: EF1002 - SQL injection risk
> var users = context.Users.FromSqlRaw("SELECT * FROM Users WHERE [" + fieldName + "] IS NULL");
> // Güvenli olduğundan eminseniz: #pragma warning disable EF1002
> \`\`\`

### FromSqlRaw vs FromSqlInterpolated

| Metot | Parametre Stili | Güvenlik | Ne Zaman Kullan |
|-------|-----------------|----------|-----------------|
| \`FromSqlInterpolated\` | \`$"... {variable}"\` | ✅ Otomatik parametre | **Varsayılan tercih** |
| \`FromSqlRaw\` | \`"... {0}", arg\` | ⚠️ Placeholder bazlı | Dinamik SQL, sp_executesql |
| \`ExecuteSqlInterpolated\` | \`$"... {variable}"\` | ✅ Otomatik parametre | Non-query (UPDATE/DELETE) |
| \`ExecuteSqlRaw\` | \`"... {0}", arg\` | ⚠️ Placeholder bazlı | Dinamik DDL |

> ⚠️ **ExecuteSqlRaw güvenlik notu:** \`FromSqlRaw\` ile aynı riskleri taşır. String concatenation ile değişken ekleme = SQL Injection. Her zaman \`{0}\` placeholder veya \`ExecuteSqlInterpolated\` tercih et.

\`\`\`csharp
// FromSqlInterpolated — $ ile yazılan her değişken parametre olur
var city = "İstanbul";
var orders = context.Orders
    .FromSqlInterpolated($"SELECT * FROM Orders WHERE City = {city}")
    .Where(o => o.IsActive)   // ← LINQ zincirlenebilir!
    .OrderBy(o => o.OrderDate)
    .ToListAsync();

// FromSqlRaw — pozisyonel placeholder
var orders = context.Orders
    .FromSqlRaw("SELECT * FROM Orders WHERE City = {0} AND Total > {1}", city, 1000)
    .ToListAsync();

// ⚠️ FromSqlRaw'da string interpolation KULLANMA:
// ❌ context.FromSqlRaw($"...WHERE Name = '{input}'")  ← SQL INJECTION!
\`\`\`

> 💡 **LINQ zincirleme:** \`FromSql*\` sonrasına \`.Where()\`, \`.OrderBy()\`, \`.Include()\` eklenebilir — EF bunları alt sorgu (subquery) olarak sarar.

### Unmapped Type Queries (EF Core 8+)

\`\`\`csharp
// SqlQuery<T> — DbSet'e bağlı olmayan sorgular (DTO, scalar, aggregate)
var stats = await context.Database
    .SqlQuery<CategoryStats>($"""
        SELECT c.Name AS CategoryName, COUNT(*) AS ProductCount, AVG(p.Price) AS AvgPrice
        FROM Categories c
        JOIN Products p ON p.CategoryId = c.Id
        GROUP BY c.Name
    """)
    .OrderByDescending(s => s.ProductCount)  // ← LINQ zincirlenebilir!
    .ToListAsync();

// Scalar değer
var count = await context.Database
    .SqlQuery<int>($"SELECT COUNT(*) AS [Value] FROM Products WHERE IsActive = 1")
    .SingleAsync();

// DTO tanımı (entity olmak zorunda değil, DbSet gerekmez)
public record CategoryStats(string CategoryName, int ProductCount, decimal AvgPrice);
\`\`\`

> ⚠️ **SqlQuery<T> kuralları:**
> - Sütun adları property adlarıyla eşleşmeli (AS ile alias ver)
> - Scalar sorgularda sütun adı \`Value\` olmalı
> - LINQ zincirleme desteklenir (subquery olarak sarılır)

### Transaction Yönetimi

\`\`\`csharp
// Basit — SaveChanges zaten transaction kullanır
context.Products.Add(product);
context.Orders.Add(order);
await context.SaveChangesAsync();  // Tek transaction'da ikisi de kaydedilir

// Manuel transaction (birden fazla SaveChanges gerekiyorsa)
using var transaction = await context.Database.BeginTransactionAsync();
try
{
    context.Accounts.Update(sender);
    await context.SaveChangesAsync();

    context.Accounts.Update(receiver);
    await context.SaveChangesAsync();

    await transaction.CommitAsync();
}
catch
{
    await transaction.RollbackAsync();
    throw;
}

## 23. Pagination Patterns 🟠

Liste sayfalarında veriyi parça parça getirmek için iki yaklaşım var: Offset (Skip/Take — basit, her yerde çalışır) ve Keyset/Cursor (performanslı, büyük veri setleri için). Yanlış yapılırsa milyonlarca satır belleğe çekilir veya derin sayfalarda sorgu yavaşlar.

### Offset-Based (Skip/Take)

\`\`\`csharp
// Basit pagination
public async Task<PagedResult<Product>> GetProductsAsync(int page, int pageSize)
{
    var query = context.Products
        .Where(p => p.IsActive)
        .OrderBy(p => p.Name);

    var totalCount = await query.CountAsync();

    var items = await query
        .Skip((page - 1) * pageSize)
        .Take(pageSize)
        .ToListAsync();

    return new PagedResult<Product>
    {
        Items = items,
        TotalCount = totalCount,
        Page = page,
        PageSize = pageSize,
        TotalPages = (int)Math.Ceiling(totalCount / (double)pageSize)
    };
}

// Sonuç modeli
public class PagedResult<T>
{
    public List<T> Items { get; set; } = [];
    public int TotalCount { get; set; }
    public int Page { get; set; }
    public int PageSize { get; set; }
    public int TotalPages { get; set; }
    public bool HasPrevious => Page > 1;
    public bool HasNext => Page < TotalPages;
}
\`\`\`

### SQL Çıktısı (Offset)

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Sayfa 5, 20 kayıt/sayfa
SELECT [p].[Id], [p].[Name], [p].[Price]
FROM [Products] AS [p]
WHERE [p].[IsActive] = 1
ORDER BY [p].[Name]
OFFSET 80 ROWS FETCH NEXT 20 ROWS ONLY;

-- Count sorgusu (ayrı çalışır)
SELECT COUNT(*)
FROM [Products] AS [p]
WHERE [p].[IsActive] = 1;
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Sayfa 5, 20 kayıt/sayfa
SELECT p.id, p.name, p.price
FROM products AS p
WHERE p.is_active = TRUE
ORDER BY p.name
LIMIT 20 OFFSET 80;

-- Count sorgusu (ayrı çalışır)
SELECT COUNT(*)
FROM products AS p
WHERE p.is_active = TRUE;
\`\`\`

</details>

> ⚠️ **Offset sorunu:** \`OFFSET 1000000\` → SQL Server 1M satır tarar ve atar! Büyük veri setlerinde yavaşlar.

### Keyset (Cursor) Pagination — Performans İçin

\`\`\`csharp
// ✅ Büyük veri setlerinde çok daha hızlı
public async Task<List<Product>> GetProductsAfterAsync(int lastId, int pageSize)
{
    return await context.Products
        .Where(p => p.IsActive && p.Id > lastId)
        .OrderBy(p => p.Id)
        .Take(pageSize)
        .ToListAsync();
}

// Composite cursor (birden fazla sütun)
public async Task<List<Product>> GetProductsAfterAsync(
    DateTime lastDate, int lastId, int pageSize)
{
    return await context.Products
        .Where(p => p.CreatedAt > lastDate ||
                    (p.CreatedAt == lastDate && p.Id > lastId))
        .OrderBy(p => p.CreatedAt)
        .ThenBy(p => p.Id)
        .Take(pageSize)
        .ToListAsync();
}
\`\`\`

### SQL Çıktısı (Keyset)

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- lastId = 5000 sonrasını getir
SELECT TOP(20) [p].[Id], [p].[Name], [p].[Price]
FROM [Products] AS [p]
WHERE [p].[IsActive] = 1 AND [p].[Id] > 5000
ORDER BY [p].[Id];
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- lastId = 5000 sonrasını getir
SELECT p.id, p.name, p.price
FROM products AS p
WHERE p.is_active = TRUE AND p.id > 5000
ORDER BY p.id
LIMIT 20;
\`\`\`

</details>

### Karşılaştırma

| Kriter | Offset (Skip/Take) | Keyset (Cursor) |
|--------|--------------------|--------------------|
| Sayfa numarası gösterme | ✅ Kolay | ❌ Zor |
| Büyük veri performansı | ❌ Yavaşlar | ✅ Sabit hız |
| Ortasına atlama | ✅ Mümkün | ❌ Sıralı ilerlemeli |
| Veri ekleme/silme tutarlılığı | ❌ Kayıp/tekrar olabilir | ✅ Tutarlı |
| Sonsuz scroll / API | 🟡 Kabul edilebilir | ✅ İdeal |

### ExecuteUpdate & ExecuteDelete (EF Core 7+)

\`\`\`csharp
// ✅ Toplu güncelleme — entity YÜKLENMEDEN direkt SQL
var affected = await context.Products
    .Where(p => p.CategoryId == 5 && !p.IsActive)
    .ExecuteUpdateAsync(s => s
        .SetProperty(p => p.IsActive, true)
        .SetProperty(p => p.UpdatedAt, DateTime.UtcNow));

// ✅ Toplu silme

    .Where(p => p.IsDeleted && p.DeletedAt < DateTime.UtcNow.AddYears(-1))
    .ExecuteDeleteAsync();

// ✅ Birden fazla property güncelleme

    .Where(p => p.Price < 100)
    .ExecuteUpdateAsync(s => s
        .SetProperty(p => p.Price, p => p.Price * 1.10m)    // %10 zam
        .SetProperty(p => p.UpdatedAt, DateTime.UtcNow));

### Performans Karşılaştırma

| Yöntem | 10.000 kayıt INSERT | 10.000 kayıt UPDATE |
|--------|:---:|:---:|
| \`foreach + SaveChanges\` her seferinde | ~30 sn | ~30 sn |
| \`AddRange + SaveChanges\` (batched) | ~3 sn | — |
| \`ExecuteUpdateAsync\` | — | ~100 ms |
| \`BulkInsertAsync\` (3rd party) | ~200 ms | ~300 ms |

> ⚠️ **ExecuteUpdate/Delete kısıtlamaları:**
> - Change Tracker'ı **bypass eder** — tracked entity'ler güncel kalmaz
> - Interceptor / SaveChanges override **çalışmaz** (audit, soft delete tetiklenmez)
> - Navigation/Include **kullanılamaz** (sadece tek tablo)
> - Sonrasında \`context.ChangeTracker.Clear()\` çağırmak iyi pratiktir

> ⚠️ **Bulk/Batch İşlem Limitleri:**
>
> | Limit | PostgreSQL | SQL Server | Açıklama |
> |-------|:---:|:---:|---|
> | Max parametre/sorgu | **65.535** | **2.100** | EF otomatik batch'ler |
> | Max INSERT/batch (EF varsayılan) | **42** (Npgsql) | **42** | \`MaxBatchSize\` ile değiştir |
> | Max transaction süresi (pratik) | **< 5 dakika** | **< 5 dakika** | Lock escalation, WAL şişmesi |

<details>
<summary><b>🐘 PostgreSQL Bulk Insert — COPY Komutu</b></summary>

> 💡 **Toplu insert performans rehberi (PostgreSQL):**
>
> | Kayıt Sayısı | Önerilen Yöntem | Neden |
> |---|---|---|
> | < 100 | \`AddRange + SaveChanges\` | EF batching yeterli |
> | 100 - 10.000 | \`SaveChanges\` + \`MaxBatchSize=100\` | Parametre limiti içinde |
> | 10.000 - 1M | \`COPY\` komutu (Npgsql) | Binary protocol, en hızlı |
> | > 1M | \`COPY\` + devre dışı index + transaction | Index rebuild sonradan |
>
> | Limit | Değer |
> |-------|:---:|
> | \`COPY\` satır limiti | **Sınır yok** (PG bulk import en hızlı yol) |
> | Max WAL boyutu (checkpoint arası) | \`max_wal_size\` (1 GB varsayılan) |

\`\`\`csharp
// PostgreSQL COPY — en hızlı bulk insert yöntemi:
using var writer = conn.BeginBinaryImport(
    "COPY products (name, price, created_at) FROM STDIN (FORMAT BINARY)");

foreach (var product in products)
{
    writer.StartRow();
    writer.Write(product.Name, NpgsqlDbType.Text);
    writer.Write(product.Price, NpgsqlDbType.Numeric);
    writer.Write(product.CreatedAt, NpgsqlDbType.TimestampTz);
}

await writer.CompleteAsync();
// 1M kayıt: ~3-5 saniye (SaveChanges ile 10+ dakika olurdu)
\`\`\`

> ⚠️ **Long-running transaction uyarısı:**
> - PostgreSQL'de uzun transaction WAL dosyalarını şişirir (disk dolabilir)
> - VACUUM çalışamaz → dead tuple birikir → tablo şişer (table bloat)
> - Kural: Batch işlemleri **500-5000 kayıt** bloklarına böl, her blokta COMMIT yap

</details>

## 27. Global Exception Handling & Retry 🟠

Veritabanı hataları kaçınılmaz: deadlock, timeout, constraint violation, connection drop. Bu hataları doğru yakalamak (hangi exception = hangi hata), kullanıcıya anlamlı mesaj vermek ve geçici hatalar için retry mekanizması kurmak production stabilitesi için şart.

---

### EF Core Exception Tipleri

| Exception | Sebep | Çözüm |
|-----------|-------|-------|
| \`DbUpdateException\` | INSERT/UPDATE/DELETE hatası | Inner exception'a bak |
| \`DbUpdateConcurrencyException\` | Concurrency conflict (row version) | Retry veya merge |
| \`RetryLimitExceededException\` | Retry politikası tükendi | Alert + fallback |
| \`SqlException\` (Number: 1205) | Deadlock | Otomatik retry |
| \`SqlException\` (Number: -2) | Timeout | Retry veya timeout artır |
| \`SqlException\` (Number: 2601/2627) | Unique constraint violation | Kullanıcıya bilgi ver |

---

### Constraint Violation Handling

\`\`\`csharp
try
{
    context.Products.Add(new Product { Sku = "EXISTING-SKU" });
    await context.SaveChangesAsync();
}
catch (DbUpdateException ex) when (ex.InnerException is SqlException sqlEx)
{
    switch (sqlEx.Number)
    {
        case 2601: // Unique index violation
        case 2627: // Unique constraint violation
            throw new BusinessException($"Bu SKU zaten mevcut: {sqlEx.Message}");

        case 547:  // FK constraint violation
            throw new BusinessException("İlişkili kayıt bulunamadı veya silinemez.");

        default:
            throw; // Bilinmeyen hata — yukarı fırlat
    }
}
\`\`\`

### Concurrency Exception Handling

\`\`\`csharp
async Task UpdateProductWithRetry(int productId, decimal newPrice, int maxRetries = 3)
{
    for (int attempt = 0; attempt < maxRetries; attempt++)
    {
        try
        {
            var product = await context.Products.FindAsync(productId);
            product!.Price = newPrice;
            await context.SaveChangesAsync();
            return; // Başarılı
        }
        catch (DbUpdateConcurrencyException ex)
        {
            var entry = ex.Entries.Single();
            
            // Strateji 1: "Database Wins" — DB'deki değeri al
            await entry.ReloadAsync();  // DB'den tekrar oku
            
            // Strateji 2: "Client Wins" — kendi değerini zorla yaz
            // entry.OriginalValues.SetValues(await entry.GetDatabaseValuesAsync());

            if (attempt == maxRetries - 1) throw;
        }
    }
}
\`\`\`

---

### Deadlock Retry

\`\`\`csharp
// Connection Resiliency ile otomatik deadlock retry
options.UseSqlServer(conn, o => o.EnableRetryOnFailure(
    maxRetryCount: 5,
    maxRetryDelay: TimeSpan.FromSeconds(30),
    errorNumbersToAdd: new[] { 1205 }));  // 1205 = Deadlock

// Manuel retry pattern (daha fazla kontrol)
public static class RetryHelper
{
    public static async Task<T> ExecuteWithRetryAsync<T>(
        Func<Task<T>> operation,
        int maxRetries = 3,
        int baseDelayMs = 100)
    {
        for (int i = 0; i < maxRetries; i++)
        {
            try { return await operation(); }
            catch (Exception ex) when (IsTransient(ex) && i < maxRetries - 1)
            {
                // Exponential backoff
                await Task.Delay(baseDelayMs * (int)Math.Pow(2, i));
            }
        }
        return await operation(); // Son deneme — hata fırlatabilir
    }

    private static bool IsTransient(Exception ex)
        => ex is DbUpdateException { InnerException: SqlException sql }
           && sql.Number is 1205 or -2 or 40613 or 40197;
}
\`\`\`

---

### Timeout Yönetimi

\`\`\`csharp
// Global command timeout (saniye)
options.UseSqlServer(conn, o => o.CommandTimeout(60));

// Tek sorgu için timeout

### Exception Türleri Karar Ağacı

\`\`\`
DbUpdateException yakalandı
├── InnerException is SqlException?
│   ├── Number 2601/2627 → Unique violation → Kullanıcıya "zaten var" mesajı
│   ├── Number 547 → FK violation → "İlişkili kayıt problemi"
│   ├── Number 1205 → Deadlock → Retry (otomatik veya manuel)
│   ├── Number -2 → Timeout → Retry veya timeout artır
│   └── Diğer → Log + generic hata
├── Is DbUpdateConcurrencyException?
│   └── Concurrency conflict → Reload + retry veya merge UI
└── Diğer → Log + throw

> ⚠️ **Kısıtlamalar:**
> - JSON sütununa **index konulamaz** (computed column + index ile çözülebilir)
> - Partial update yok — EF tüm JSON'u yeniden yazar (büyük JSON'da dikkat)
> - SQLite ve eski MySQL JSON columns **desteklemez**

<details>
<summary><b>🐘 PostgreSQL JSON Avantajları</b></summary>

> 🐘 **PostgreSQL JSON Avantajları:**
> - SQL Server \`NVARCHAR(MAX)\` + \`JSON_VALUE()\` kullanırken, PostgreSQL **native \`jsonb\`** tipi kullanır
> - \`jsonb\` binary formatta saklanır → parse overhead yok, sorgulama çok daha hızlı
> - \`jsonb\` üzerine **GIN index** konulabilir → JSON içinde arama index'li olur!
> - Ek operatörler: \`@>\` (contains), \`?\` (key exists), \`->\` (get field), \`->>\` (get text)
> - Partial update: \`jsonb_set()\` fonksiyonu ile tek alan güncellenebilir (EF bunu henüz kullanmaz ama Raw SQL ile mümkün)

\`\`\`csharp
// PostgreSQL JSON — EF aynı API ama üretilen SQL farklı:
builder.OwnsOne(o => o.ShippingAddress, addr => addr.ToJson());
// SQL Server: NVARCHAR(MAX) + JSON_VALUE/OPENJSON
// PostgreSQL:  jsonb + native operatörler
\`\`\`

\`\`\`sql
-- PostgreSQL'de oluşan tablo:
CREATE TABLE orders (
    id                INT GENERATED ALWAYS AS IDENTITY,
    shipping_address  JSONB NULL,     -- jsonb (binary JSON, indexlenebilir!)
    tags              JSONB NULL,
    CONSTRAINT pk_orders PRIMARY KEY (id)
);

-- GIN index ile JSON içinde hızlı arama:
CREATE INDEX ix_orders_shipping ON orders USING gin (shipping_address);

-- EF sorgusu: .Where(o => o.ShippingAddress.City == "İstanbul")
-- PostgreSQL çıktısı:
SELECT o.id, o.shipping_address, o.tags
FROM orders AS o
WHERE o.shipping_address->>'City' = 'İstanbul';  -- ->> operatörü (text olarak al)

-- JSON contains operatörü (GIN index kullanır):
SELECT * FROM orders
WHERE shipping_address @> '{"City": "İstanbul"}';  -- Çok hızlı!
\`\`\`

> 💡 **jsonb vs json:** PostgreSQL'de \`json\` (text) ve \`jsonb\` (binary) var. EF Core Npgsql **her zaman \`jsonb\`** kullanır — doğru tercih. \`jsonb\` index destekler, duplicate key'leri kaldırır, daha hızlıdır.

> ⚠️ **JSON Sütun Limitleri:**
>
> | Limit | PostgreSQL (\`jsonb\`) | SQL Server (\`NVARCHAR(MAX)\`) |
> |-------|:---:|:---:|
> | Max boyut | **1 GB** (TOAST ile) | **2 GB** |
> | Max iç içe derinlik (nesting) | **Sınır yok** (pratik: <100) | **128** level |
> | Max key sayısı/obje | **Sınır yok** | Sınır yok |
> | Index desteği | ✅ GIN index | ❌ (computed column ile) |
> | Partial update (tek alan güncelleme) | ✅ \`jsonb_set()\` ile (Raw SQL) | ❌ |
>
> 💡 **Pratik sınırlar:**
> - Tek satırdaki JSONB boyutu **< 100 KB** tutulmalı (TOAST overhead, sorgu yavaşlar)
> - Çok büyük JSON (>1 MB) → ayrı tabloya normalize et veya dosya storage kullan
> - EF Core her update'te **tüm JSON'u** yeniden yazar — 500 KB'lık JSON'da bile her update 500 KB yazar!
> - Deeply nested (>5 level) JSON → LINQ-to-SQL çevirisi karmaşıklaşır, performans düşer

</details>
