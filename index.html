### 3. Hashing (Tek Yönlü — Şifre Saklama)

\`\`\`csharp
// ⚠️ Hashing bir Value Converter DEĞİLDİR — çünkü geri çözülemez.
// Entity'de hash ve salt birlikte saklanır:
public class User
{
    public int Id { get; set; }
    public string Email { get; set; } = null!;
    public string PasswordHash { get; set; } = null!;  // Şifrenin hash'i
    public string PasswordSalt { get; set; } = null!;  // Tuz
}

// Hash oluşturma (kayıt sırasında)
public static (string hash, string salt) HashPassword(string password)
{
    var salt = RandomNumberGenerator.GetBytes(32);
    var hash = Rfc2898DeriveBytes.Pbkdf2(
        password,
        salt,
        iterations: 100_000,
        HashAlgorithmName.SHA256,
        outputLength: 32);

    return (Convert.ToBase64String(hash), Convert.ToBase64String(salt));
}

// Doğrulama (login sırasında)
public static bool VerifyPassword(string password, string storedHash, string storedSalt)
{
    var salt = Convert.FromBase64String(storedSalt);
    var hash = Rfc2898DeriveBytes.Pbkdf2(
        password, salt, 100_000, HashAlgorithmName.SHA256, 32);

    return CryptographicOperations.FixedTimeEquals(
        hash, Convert.FromBase64String(storedHash));
}
\`\`\`

\`\`\`csharp
// EF Configuration — sadece sütun boyutu ayarlanır
builder.Property(u => u.PasswordHash).HasMaxLength(88).IsRequired();   // Base64(32 byte)
builder.Property(u => u.PasswordSalt).HasMaxLength(88).IsRequired();
builder.Property(u => u.Email).HasMaxLength(256);
builder.HasIndex(u => u.Email).IsUnique();  // Login lookup için
\`\`\`

> ⚠️ **ASLA yapma:**  
> - MD5/SHA1 kullanma (zayıf)  
> - Salt'sız hash'leme (rainbow table saldırısı)  
> - Şifreyi plain-text saklama  
> ✅ **Kullan:** \`Pbkdf2\`, \`BCrypt\`, \`Argon2id\`

#### Hash'lenmiş Veriyi Güncelleme (Şifre Değiştirme)

Hash tek yönlüdür — eski hash'i "açıp" düzenleyemezsin. Güncelleme = eski şifreyi doğrula + yeni hash oluştur.

\`\`\`csharp
public async Task<bool> ChangePassword(int userId, string currentPassword, string newPassword)
{
    var user = await context.Users.FindAsync(userId);
    if (user == null) return false;

    // 1️⃣ Önce mevcut şifreyi doğrula (eski hash ile karşılaştır)
    if (!VerifyPassword(currentPassword, user.PasswordHash, user.PasswordSalt))
        return false;  // Eski şifre yanlış → reddet

    // 2️⃣ Yeni şifreyi hash'le (yeni salt ile)
    var (newHash, newSalt) = HashPassword(newPassword);

    // 3️⃣ Hash ve salt'ı güncelle
    user.PasswordHash = newHash;
    user.PasswordSalt = newSalt;

    await context.SaveChangesAsync();
    return true;
}
\`\`\`

<summary><b>💾 SQL Server</b></summary>

UPDATE [Users]
SET [PasswordHash] = @p0,   -- Yeni hash (tamamen farklı bir string)
    [PasswordSalt] = @p1    -- Yeni salt (her seferinde random)
WHERE [Id] = @p2;
\`\`\`

</details>

<details>

\`\`\`sql

**📌 Neden yeni salt?**  
Her şifre değişikliğinde yeni salt üretilir. Aynı şifre bile farklı hash üretir → rainbow table saldırısını önler.

\`\`\`
Aynı şifre "MyPass123":
  Salt_1 + "MyPass123" → Hash: "a8f4e2..."
  Salt_2 + "MyPass123" → Hash: "7c9b1d..."  ← Tamamen farklı!
\`\`\`

ALTER TABLE Customers ALTER COLUMN Email ADD MASKED WITH (FUNCTION = 'email()');

ALTER TABLE Customers ALTER COLUMN CreditCardNumber ADD MASKED WITH (FUNCTION = 'partial(0,"XXXX-XXXX-XXXX-",4)');

-- Yetkisiz kullanıcının gördüğü:
-- Email: aXXX@XXXX.com
-- Phone: ***-5678
-- CreditCard: XXXX-XXXX-XXXX-1234

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- PostgreSQL'de native dynamic masking yok, VIEW + RLS ile benzer sonuç:
CREATE VIEW customers_masked AS
SELECT id, name,
       LEFT(email, 1) || '***@' || SPLIT_PART(email, '@', 2) AS email,
       '***-' || RIGHT(phone, 4) AS phone,
       'XXXX-XXXX-XXXX-' || RIGHT(credit_card_number, 4) AS credit_card_number
FROM customers;

-- Row Level Security ile erişim kontrolü:
ALTER TABLE customers ENABLE ROW LEVEL SECURITY;
GRANT SELECT ON customers_masked TO app_user;
-- Admin kullanıcı orijinal tabloyu doğrudan görebilir
\`\`\`

### 5. Application-Level Masking (Projection ile)

\`\`\`csharp
// API response'da masking — DB'ye dokunmadan
var customers = await context.Customers
    .Select(c => new CustomerDto
    {
        Id = c.Id,
        Name = c.Name,
        Email = MaskEmail(c.Email),           // a***@gmail.com
        Phone = MaskPhone(c.Phone),           // ***-5678
        CardLast4 = c.CreditCardNumber[^4..]  // Sadece son 4 hane
    })
    .ToListAsync();

// Masking helper
static string MaskEmail(string email)
{
    var parts = email.Split('@');
    return $"{parts[0][0]}***@{parts[1]}";
}

### Hangi Stratejiyi Ne Zaman Kullan?

| Senaryo | Strateji | Neden |
|---|---|---|
| Şifre saklama | **Hash** (Pbkdf2/Argon2) | Geri çözülmemeli |
| TC Kimlik / Kart No (arama gerekli) | **Always Encrypted** (Deterministic) | DB seviyesi, EF'e şeffaf |
| TC Kimlik / Kart No (arama gereksiz) | **App Encryption** (Value Converter) | Basit, provider bağımsız |
| API response gizleme | **App Masking** (Projection) | DB'ye dokunmaz, esnek |
| Rapor/BI kullanıcısı kısıtlama | **Dynamic Data Masking** | DBA yönetir, kod gerektirmez |
| Log'larda hassas veri | **App Masking** | Serialize öncesi maskeleme |

## 41. Provider Uyumluluğu — SQL Server, PostgreSQL, Oracle, SQLite 📋

EF Core'un Fluent API'sinin %90'ı provider-agnostic çalışır. Ancak bazı özellikler (Temporal Tables, JSON sütun syntax'ı, index tipleri) provider'a özgüdür. Bu bölüm hangi özelliğin nerede çalıştığını ve provider değiştirirken nelere dikkat edileceğini gösterir.

### Ortak (Tüm Provider'larda Çalışan) API

\`\`\`csharp
// Bunlar HER YERDE çalışır — SQL Server, PostgreSQL, SQLite, Oracle, MySQL...
builder.HasKey(p => p.Id);
builder.HasIndex(p => p.Email).IsUnique();
builder.Property(p => p.Name).IsRequired().HasMaxLength(200);
builder.HasOne(p => p.Category).WithMany(c => c.Products).HasForeignKey(p => p.CategoryId);
builder.OwnsOne(p => p.Address);
builder.HasQueryFilter(p => !p.IsDeleted);
builder.ToTable("Products");
builder.HasData(...);
builder.Ignore(p => p.Computed);
\`\`\`

### Provider-Specific Farklılıklar

#### 🔶 PK Üretimi (Auto-Increment)

\`\`\`csharp
// Fluent API aynı — oluşan SQL farklı:
builder.Property(p => p.Id).ValueGeneratedOnAdd();
\`\`\`

| Provider | SQL Çıktısı |
|----------|-------------|
| SQL Server | \`INT IDENTITY(1,1)\` |
| PostgreSQL | \`INT GENERATED ALWAYS AS IDENTITY\` veya \`SERIAL\` |
| SQLite | \`INTEGER PRIMARY KEY AUTOINCREMENT\` |
| Oracle | \`NUMBER GENERATED ALWAYS AS IDENTITY\` |
| MySQL | \`INT AUTO_INCREMENT\` |

#### 🔶 String / Unicode Davranışı

| Provider | \`IsUnicode(true)\` | \`IsUnicode(false)\` | Varsayılan |
|----------|-------------------|--------------------|----|
| SQL Server | \`NVARCHAR\` | \`VARCHAR\` | NVARCHAR |
| PostgreSQL | \`TEXT\` (hep Unicode) | \`TEXT\` (fark yok) | TEXT |
| SQLite | \`TEXT\` (hep Unicode) | \`TEXT\` (fark yok) | TEXT |
| Oracle | \`NVARCHAR2\` | \`VARCHAR2\` | VARCHAR2 |
| MySQL | \`VARCHAR\` (charset'e bağlı) | \`VARCHAR\` | utf8mb4 ile |

#### 🔶 JSON Columns

\`\`\`csharp
// Fluent API aynı:
builder.OwnsOne(p => p.Metadata, m => m.ToJson());
\`\`\`

| Provider | Destek | SQL Tipi | LINQ-to-JSON |
|----------|--------|----------|-------------|
| SQL Server | ✅ EF Core 7+ | \`NVARCHAR(MAX)\` | ✅ Full |
| PostgreSQL (Npgsql) | ✅ EF Core 7+ | \`jsonb\` | ✅ Full + extra ops |
| SQLite | ❌ | — | — |
| Oracle | 🟡 21c+ kısıtlı | \`JSON\` | 🟡 Kısıtlı |
| MySQL (Pomelo) | ✅ 8.0+ | \`JSON\` | 🟡 Temel |

#### 🔶 Temporal Tables

| Provider | Native Destek | Alternatif |
|----------|:-------------:|-----------|
| SQL Server | ✅ \`IsTemporal()\` | — |
| PostgreSQL | ❌ | Trigger-based audit tablolar veya pgAudit eklentisi |
| SQLite | ❌ | Uygulama seviyesinde audit log |
| Oracle | ✅ Flashback | \`FLASHBACK TABLE\` (farklı API) |

#### 🔶 Sequences & HiLo

\`\`\`csharp

builder.Property(o => o.OrderNo).HasDefaultValueSql("NEXT VALUE FOR OrderNumbers");
\`\`\`

| Provider | Sequence | HiLo |
|----------|:--------:|:----:|
| SQL Server | ✅ | ✅ |
| PostgreSQL | ✅ | ✅ |
| SQLite | ❌ | ❌ |
| Oracle | ✅ | ✅ |
| MySQL | ❌ | ❌ |

#### 🔶 EF.Functions Farklılıkları

| Fonksiyon | SQL Server | PostgreSQL (Npgsql) | SQLite |
|-----------|-----------|---------------------|--------|
| \`Like\` | ✅ \`LIKE\` | ✅ \`LIKE\` / \`ILIKE\` | ✅ \`LIKE\` |
| \`DateDiffDay\` | ✅ \`DATEDIFF\` | ❌ (kullan: \`date - date\`) | ❌ |
| \`Contains\` (FTS) | ✅ \`CONTAINS\` | ❌ (kullan: \`EF.Functions.ToTsVector\`) | ❌ |
| \`Random\` | ✅ \`NEWID()\` | ✅ \`random()\` | ✅ \`random()\` |
| \`Collate\` | ✅ | ✅ | ✅ |
| \`ILike\` (case-insensitive) | ❌ | ✅ (Npgsql özel) | ❌ |
| \`JsonContains\` | ❌ | ✅ (Npgsql özel) | ❌ |

### PostgreSQL Özel — Npgsql Provider

\`\`\`csharp

    options.UseNpgsql(connectionString));

// PostgreSQL'e özgü özellikler

builder.Property(p => p.SearchVector).HasColumnType("tsvector"); // Full-text
builder.Property(p => p.Location).HasColumnType("point");        // Geometric
builder.HasIndex(p => p.Name).HasMethod("gin");                  // GIN index
builder.Property(p => p.Data).HasColumnType("jsonb");            // Binary JSON

    .Where(p => EF.Functions.ILike(p.Name, "%telefon%"))
    .ToListAsync();

### Provider Seçimi Pratik Rehber

| Senaryo | Önerilen Provider | Neden |
|---------|-------------------|-------|
| Enterprise / Kurumsal | SQL Server veya Oracle | Temporal tables, row-level security, lisans desteği |
| Startup / SaaS | PostgreSQL | Ücretsiz, JSON native, array, FTS güçlü |
| Embedded / Mobil | SQLite | Dosya tabanlı, sıfır kurulum |
| Legacy sistem | MySQL | Yaygın hosting desteği |
| Çoklu DB desteği gerekli | Fluent API + provider-agnostic kal | EF.Functions yerine LINQ kullan |

> 💡 **Altın kural:** Eğer birden fazla provider desteklenecekse, provider-specific API'lerden (EF.Functions.DateDiff, IsTemporal, HasMethod) kaçınılmalı ve saf Fluent API + LINQ ile kalınmalı.

## 42. Custom Conventions — EF Core 7+ 📋

Modeldeki tüm entity'lere otomatik uygulanan kurallar. "Her string en fazla 256 karakter olsun", "Her tabloda CreatedAt shadow property olsun", "Her FK'ya index koy" gibi DRY kurallar bir kere yazılır, tüm entity'lere uygulanır — her config'te tekrar yazmaya gerek kalmaz.

### IModelFinalizingConvention — Tüm String'lere MaxLength

\`\`\`csharp
public class MaxStringLengthConvention : IModelFinalizingConvention
{
    private readonly int _maxLength;

    public MaxStringLengthConvention(int maxLength = 256)
    {
        _maxLength = maxLength;
    }

    public void ProcessModelFinalizing(
        IConventionModelBuilder modelBuilder,
        IConventionContext<IConventionModelBuilder> context)
    {
        foreach (var entity in modelBuilder.Metadata.GetEntityTypes())
        {
            foreach (var property in entity.GetProperties()
                .Where(p => p.ClrType == typeof(string)))
            {
                // Sadece açıkça MaxLength belirtilmemiş olanları ayarla
                if (!property.GetMaxLength().HasValue)
                {
                    property.Builder.HasMaxLength(_maxLength);
                }
            }
        }
    }
}
\`\`\`

### Convention ile Otomatik Soft Delete Filter

\`\`\`csharp
public class SoftDeleteConvention : IModelFinalizingConvention
{
    public void ProcessModelFinalizing(
        IConventionModelBuilder modelBuilder,
        IConventionContext<IConventionModelBuilder> context)
    {
        foreach (var entity in modelBuilder.Metadata.GetEntityTypes())
        {
            var isDeletedProperty = entity.FindProperty("IsDeleted");
            if (isDeletedProperty is not null && isDeletedProperty.ClrType == typeof(bool))
            {
                var parameter = Expression.Parameter(entity.ClrType, "e");
                var prop = Expression.Property(parameter, "IsDeleted");
                var condition = Expression.Equal(prop, Expression.Constant(false));
                var lambda = Expression.Lambda(condition, parameter);

                entity.SetQueryFilter(lambda);
            }
        }
    }
}
\`\`\`

### Convention ile Otomatik Index (FK'lara)

\`\`\`csharp
public class ForeignKeyIndexConvention : IModelFinalizingConvention
{
    public void ProcessModelFinalizing(
        IConventionModelBuilder modelBuilder,
        IConventionContext<IConventionModelBuilder> context)
    {
        foreach (var entity in modelBuilder.Metadata.GetEntityTypes())
        {
            foreach (var fk in entity.GetForeignKeys())
            {
                // FK property'lerine index oluştur (yoksa)
                var properties = fk.Properties;
                var existingIndex = entity.FindIndex(properties);
                if (existingIndex is null)
                {
                    entity.AddIndex(properties);
                }
            }
        }
    }
}
\`\`\`

### Kayıt

\`\`\`csharp
protected override void ConfigureConventions(ModelConfigurationBuilder configurationBuilder)
{
    // Custom conventions
    configurationBuilder.Conventions.Add(_ => new MaxStringLengthConvention(256));
    configurationBuilder.Conventions.Add(_ => new SoftDeleteConvention());

    // Property type conventions (daha basit)
    configurationBuilder.Properties<string>().HaveMaxLength(256);
    configurationBuilder.Properties<decimal>().HavePrecision(18, 2);
    
    // Tüm DateTime'lar → datetime2
    configurationBuilder.Properties<DateTime>().HaveColumnType("datetime2");
}
\`\`\`

### ConfigureConventions vs OnModelCreating

| | \`ConfigureConventions\` | \`OnModelCreating\` |
|---|---|---|
| Çalışma sırası | Önce | Sonra (override eder) |
| Amaç | Genel kurallar | Entity-specific config |
| Öncelik | Düşük — explicit config kazanır | Yüksek — son söz |
| Kullanım | DRY global kurallar | Tek entity'e özel detay |

> 💡 \`ConfigureConventions\`'da belirlenen kural, \`IEntityTypeConfiguration\`'da override edilebilir. Yani önce genel kural yazılır, istisnalar entity config'de belirtilir.

## 43. Data Annotations Hızlı Referans 📋

Fluent API yerine attribute bazlı yapılandırma. Basit senaryolarda hızlıdır ama Fluent API kadar güçlü değildir (composite index, owned entity gibi şeyler attribute ile yapılamaz). İkisi birlikte kullanılabilir — Fluent API her zaman önceliklidir.

\`\`\`csharp
using System.ComponentModel.DataAnnotations;
using System.ComponentModel.DataAnnotations.Schema;

public class Product
{
    [Key]
    public int Id { get; set; }

    [Required]
    [MaxLength(200)]
    [Column("ProductName")]
    public string Name { get; set; }

    [Column(TypeName = "decimal(18,2)")]
    public decimal Price { get; set; }

    [StringLength(500, MinimumLength = 10)]
    public string Description { get; set; }

    [Range(0, 9999)]
    public int Stock { get; set; }

    [NotMapped]
    public string ComputedField => $"{Name} - {Price:C}";

    [Timestamp]
    public byte[] RowVersion { get; set; }

    [ConcurrencyCheck]
    public string Slug { get; set; }

    [ForeignKey("CategoryId")]
    public Category Category { get; set; }
    public int CategoryId { get; set; }

    [InverseProperty("Products")]
    public ICollection<Tag> Tags { get; set; }
}

[Table("Categories", Schema = "catalog")]
[Index(nameof(Code), IsUnique = true)]
public class Category
{
    [Key]
    [DatabaseGenerated(DatabaseGeneratedOption.Identity)]
    public int Id { get; set; }

    [Unicode(false)]
    [MaxLength(50)]
    public string Code { get; set; }
}
\`\`\`

### Data Annotation → Fluent API Eşleştirmesi

| Data Annotation | Fluent API Karşılığı |
| --- | --- |
| \`[Key]\` | \`.HasKey(p => p.Id)\` |
| \`[Required]\` | \`.Property(p => p.X).IsRequired()\` |
| \`[MaxLength(n)]\` | \`.HasMaxLength(n)\` |
| \`[StringLength(n)]\` | \`.HasMaxLength(n)\` |
| \`[Column("name")]\` | \`.HasColumnName("name")\` |
| \`[Column(TypeName="t")]\` | \`.HasColumnType("t")\` |
| \`[NotMapped]\` | \`.Ignore(p => p.X)\` |
| \`[Timestamp]\` | \`.IsRowVersion()\` |
| \`[ConcurrencyCheck]\` | \`.IsConcurrencyToken()\` |
| \`[Table("T", Schema="S")]\` | \`.ToTable("T", "S")\` |
| \`[Index(nameof(X))]\` | \`.HasIndex(p => p.X)\` |
| \`[Index(..., IsUnique=true)]\` | \`.HasIndex(p => p.X).IsUnique()\` |
| \`[ForeignKey("FkId")]\` | \`.HasForeignKey(p => p.FkId)\` |
| \`[InverseProperty("Nav")]\` | \`.WithMany(x => x.Nav)\` / \`.WithOne(...)\` |
| \`[Owned]\` | \`.OwnsOne(...)\` |
| \`[DatabaseGenerated(Identity)]\` | \`.ValueGeneratedOnAdd()\` |
| \`[DatabaseGenerated(Computed)]\` | \`.ValueGeneratedOnAddOrUpdate()\` |
| \`[DatabaseGenerated(None)]\` | \`.ValueGeneratedNever()\` |
| \`[Unicode(false)]\` | \`.IsUnicode(false)\` |
| \`[Precision(18,2)]\` | \`.HasPrecision(18, 2)\` |
| \`[Comment("...")]\` | \`.HasComment("...")\` |
| \`[DeleteBehavior(...)]\` | \`.OnDelete(DeleteBehavior.X)\` |

> 💡 **Fluent API vs Data Annotations?**
> - **Fluent API** daha güçlü (her şeyi yapabilir), clean architecture'da tercih edilir
> - **Data Annotations** hızlı prototip için uygun, validation ile ortak kullanılır
> - İkisi çakışırsa **Fluent API kazanır**

## 44. Conventions Özetleri 📋

EF Core, model oluşturulurken varsayılan kurallar (conventions) uygular: Id → PK, int → IDENTITY, navigation property → FK, DbSet adı → tablo adı. Bunları bilmek gereksiz konfigürasyon yazmaktan kurtarır.

### EF Core Varsayılan Davranışları

| Kural | Açıklama | Örnek |
| --- | --- | --- |
| \`Id\` veya \`{TypeName}Id\` | Otomatik PK | \`Product.Id\` veya \`Product.ProductId\` |
| \`int\`, \`long\` PK | IDENTITY (ValueGeneratedOnAdd) | \`int Id\` → \`IDENTITY(1,1)\` |
| \`Guid\` PK | Client-side GUID üretimi | \`Guid Id\` → newsequentialid() değil |
| Referans tipler (\`string\` hariç) | Nullable | \`Category? Category\` |
| \`string\` | NOT NULL (EF Core 6+ nullable ref types) | \`string Name\` → NOT NULL |
| \`int\`, \`bool\`, \`decimal\` vb. | NOT NULL | \`decimal Price\` → NOT NULL |
| \`int?\`, \`bool?\` vb. | Nullable | \`int? Stock\` → NULL |
| FK sütun adı | \`{NavigationName}{PK}\` | \`Category\` nav → \`CategoryId\` FK |
| İlişki cascade | Required → Cascade, Optional → ClientSetNull | Aşağıda detay |
| Index | FK → otomatik index oluşmaz (convention yok!) | Manuel eklemen gerek |
| Tablo adı | DbSet property adı | \`DbSet<Product> Products\` → \`[Products]\` |
| Schema | Varsayılan \`dbo\` (SQL Server) | \`public\` (PostgreSQL) |

### İsimlendirme Conventions

| Ne | Convention | Sonuç |
|---|---|---|
| Tablo adı | \`DbSet<T>\` property adı | \`Products\`, \`Categories\` |
| DbSet yoksa | Class adı | \`Product\` (tekil) |
| Join tablo (N-N) | \`{Entity1}{Entity2}\` (alfabetik) | \`ProductTag\` |
| Shadow FK | \`{Navigation}{PK}\` | \`CategoryId\` |
| Alternate Key | Convention yok | Manuel tanım gerek |

### FK & Cascade Delete Conventions

| İlişki Tipi | FK Nullable? | Delete Behavior | Sonuç |
|---|---|---|---|
| Required (1-N) | Hayır (\`int\`) | \`Cascade\` | Parent silinince child'lar da silinir |
| Optional (1-N) | Evet (\`int?\`) | \`ClientSetNull\` | Parent silinince FK = NULL |
| Required (1-1) | Hayır | \`Cascade\` | Parent silinince dependent silinir |
| N-N (skip nav) | — | \`Cascade\` | Join tablosu kaydı silinir |

\`\`\`csharp
// Cascade davranışı override etme
builder.HasOne(p => p.Category)
    .WithMany(c => c.Products)
    .OnDelete(DeleteBehavior.Restrict);  // FK varken parent silinemez

// Tüm ilişkilerde cascade'i kapatma (global)
foreach (var fk in modelBuilder.Model.GetEntityTypes()
    .SelectMany(t => t.GetForeignKeys())
    .Where(fk => !fk.IsOwnership && fk.DeleteBehavior == DeleteBehavior.Cascade))
{
    fk.DeleteBehavior = DeleteBehavior.Restrict;
}
\`\`\`

### Tip Mapping Conventions

| C# Tipi | SQL Server | PostgreSQL | SQLite |
|---|---|---|---|
| \`string\` | \`nvarchar(max)\` | \`text\` | \`TEXT\` |
| \`int\` | \`int\` | \`integer\` | \`INTEGER\` |
| \`long\` | \`bigint\` | \`bigint\` | \`INTEGER\` |
| \`decimal\` | \`decimal(18,2)\` | \`numeric\` | \`TEXT\` |
| \`bool\` | \`bit\` | \`boolean\` | \`INTEGER\` |
| \`DateTime\` | \`datetime2\` | \`timestamp with time zone\` | \`TEXT\` |
| \`Guid\` | \`uniqueidentifier\` | \`uuid\` | \`TEXT\` |
| \`byte[]\` | \`varbinary(max)\` | \`bytea\` | \`BLOB\` |
| \`enum\` | \`int\` (varsayılan) | \`integer\` | \`INTEGER\` |

### Convention Özelleştirme (EF Core 7+)

\`\`\`csharp
// Tüm string property'leri varsayılan olarak 200 karakter yap
protected override void ConfigureConventions(ModelConfigurationBuilder config)
{
    config.Properties<string>().HaveMaxLength(200);
    config.Properties<decimal>().HavePrecision(18, 2);

    // Enum'ları her yerde string olarak sakla
    config.Properties<Enum>().HaveConversion<string>();

    // DateOnly / TimeOnly desteği (SQL Server)
    config.Properties<DateOnly>().HaveColumnType("date");
    config.Properties<TimeOnly>().HaveColumnType("time");
}
\`\`\`

### Convention Öncelik Sırası (Düşükten Yükseğe)

\`\`\`
1. EF Core Built-in Conventions (en düşük)
2. ConfigureConventions() — global type config
3. Custom IConvention implementations (bkz. Bölüm 42)
4. Data Annotations
5. Fluent API (OnModelCreating) — EN YÜKSEK
\`\`\`

> 💡 Üst seviye her zaman alt seviyeyi ezer. \`[MaxLength(100)]\` annotation'ı, \`ConfigureConventions\`'daki \`HaveMaxLength(200)\` kuralını override eder. Fluent API ise hepsini ezer.

## 45. Hızlı Referans Tablosu 📋

En sık kullanılan Fluent API metodları ve SQL karşılıkları — hızlıca bakıp kopyalamak için.

| Metot | Kullanım | SQL Karşılığı |
| --- | --- | --- |
| \`ToTable("T")\` | Tablo adı | \`CREATE TABLE [T]\` |
| \`ToView("V")\` | View mapping | — (var olan view) |
| \`HasKey(...)\` | PK tanımla | \`PRIMARY KEY\` |
| \`HasAlternateKey(...)\` | Unique constraint | \`UNIQUE\` |
| \`HasIndex(...)\` | Index | \`CREATE INDEX\` |
| \`HasIndex(...).IsUnique()\` | Unique index | \`CREATE UNIQUE INDEX\` |
| \`HasIndex(...).HasFilter(...)\` | Filtered index | \`WHERE ...\` |
| \`Property(...).IsRequired()\` | NOT NULL | \`NOT NULL\` |
| \`Property(...).HasMaxLength(n)\` | Uzunluk | \`NVARCHAR(n)\` |
| \`Property(...).HasColumnType(...)\` | DB tipi | Belirtilen tip |
| \`Property(...).HasDefaultValue(...)\` | Sabit default | \`DEFAULT value\` |
| \`Property(...).HasDefaultValueSql(...)\` | SQL default | \`DEFAULT expr\` |
| \`Property(...).HasComputedColumnSql(...)\` | Computed column | \`AS (expr)\` |
| \`Property(...).IsRowVersion()\` | Concurrency (timestamp) | \`ROWVERSION\` |
| \`Property(...).IsConcurrencyToken()\` | Concurrency token | WHERE'de kontrol |
| \`Property(...).HasConversion<T>()\` | Value converter | — (uygulama katmanı) |
| \`HasOne(...).WithMany(...)\` | 1-N ilişki | \`FOREIGN KEY\` |
| \`HasOne(...).WithOne(...)\` | 1-1 ilişki | \`FOREIGN KEY + UNIQUE\` |
| \`HasMany(...).WithMany(...)\` | N-N ilişki | Join tablo |
| \`OwnsOne(...)\` | Owned entity (tekil) | Aynı tabloda sütunlar |
| \`OwnsMany(...)\` | Owned entity (koleksiyon) | Ayrı tablo |
| \`ComplexProperty(...)\` | Complex type (EF8+) | Aynı tabloda sütunlar |
| \`HasQueryFilter(...)\` | Global filtre | Otomatik WHERE |
| \`Ignore(...)\` | Property'yi dışla | Sütun oluşmaz |

| \`AsNoTracking()\` | Tracking kapat | — (performans) |
| \`ExecuteUpdateAsync()\` | Toplu güncelleme (EF7+) | Tek UPDATE |

| \`HasNoKey()\` | Keyless entity (View/SP) | Tablo oluşmaz |
| \`IsTemporal()\` | Temporal table | \`SYSTEM_VERSIONING = ON\` |
| \`TemporalAsOf(date)\` | Belirli andaki veri | \`FOR SYSTEM_TIME AS OF\` |

| \`UseSeeding(...)\` | Koşullu seed (EF9+) | Runtime seed |
| \`EF.Functions.Like(...)\` | LIKE sorgusu | \`LIKE pattern\` |

public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        // Tablo
        builder.ToTable("Products", "catalog", t =>
        {
            t.HasComment("Ürün ana tablosu");
        });

        // PK
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Id).ValueGeneratedOnAdd();

        // Özellikler
        builder.Property(p => p.Name)
               .IsRequired()
               .HasMaxLength(200)
               .HasColumnName("ProductName")
               .HasComment("Ürün adı");

        builder.Property(p => p.Price)
               .HasPrecision(18, 2)
               .HasComment("KDV dahil satış fiyatı");

        builder.Property(p => p.CreatedAt)
               .HasDefaultValueSql("GETUTCDATE()")
               .ValueGeneratedOnAdd();

        builder.Property(p => p.RowVersion).IsRowVersion();

        // Index'ler
        builder.HasIndex(p => p.Sku)
               .IsUnique()
               .HasDatabaseName("UX_Products_Sku");

        builder.HasIndex(p => new { p.CategoryId, p.IsActive })
               .HasDatabaseName("IX_Products_Category_Active");

        // İlişki
        builder.HasOne(p => p.Category)
               .WithMany(c => c.Products)
               .HasForeignKey(p => p.CategoryId)
               .OnDelete(DeleteBehavior.Restrict);

        // Owned entity
        builder.OwnsOne(p => p.Dimensions, dim =>
        {
            dim.Property(d => d.Width).HasColumnName("Dim_Width");
            dim.Property(d => d.Height).HasColumnName("Dim_Height");
            dim.Property(d => d.Depth).HasColumnName("Dim_Depth");
        });

        // JSON kolonu
        builder.OwnsMany(p => p.Tags, t => t.ToJson());

        // Global query filter
        builder.HasQueryFilter(p => !p.IsDeleted);

        // Ignore
        builder.Ignore(p => p.DisplayPrice);
    }
}

## 46. Compiled Models (EF Core 8+) 🔴

Büyük modellerde (200+ entity) uygulama başlangıç süresi saniyeler alabilir — EF Core her seferinde model'i reflection ile yeniden oluşturur. **Compiled Models** bu maliyeti build-time'a taşır ve startup'ı %80'e kadar hızlandırır.

### Ne Zaman Kullanmalısın?

| Senaryo | Compiled Model? | Neden |
|---------|:---------------:|-------|
| <50 entity | ❌ | Startup zaten <500ms |
| 50-200 entity | 🟡 Opsiyonel | 1-3s ise değerlendirilebilir |
| 200+ entity | ✅ | Startup 5-15s olabilir — ciddi fark yaratır |
| Serverless (Azure Functions) | ✅ | Cold start kritik |
| Unit test projesi | ❌ | Her test class'ında model değişebilir |

### Kullanım

\`\`\`bash
# 1. Compiled model oluştur (build sırasında veya CI'da)
dotnet ef dbcontext optimize --output-dir CompiledModels --namespace MyApp.CompiledModels

# Sonuç: CompiledModels/ klasöründe C# dosyaları oluşur
# Her entity için bir partial class + tüm metadata pre-computed
\`\`\`

\`\`\`csharp
// 2. DbContext'te compiled model'i kullan
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseSqlServer(connectionString)
           .UseModel(MyApp.CompiledModels.AppDbContextModel.Instance));  // Pre-built model
\`\`\`

### Kısıtlamalar ve Trade-off'lar

| Kısıt | Açıklama | EF Core Sürüm |
|-------|----------|:--------------:|
| Model değiştiğinde yeniden generate | Migration sonrası \`dotnet ef dbcontext optimize\` tekrar çalıştırılmalı | 6+ |
| Lazy-loading desteklenmez | Compiled model ile proxy oluşturulmaz (EF9'da kaldırılması planlanıyor) | 6-8 |
| Global query filter'da değişken | Runtime değişkenler (tenant ID) hâlâ çalışır | 6+ |
| CI/CD entegrasyonu | Build pipeline'a \`dbcontext optimize\` adımı eklenmeli | 6+ |
| NativeAOT desteği | Compiled models NativeAOT publish için zorunlu | 8+ |

> 💡 **CI'da otomatikleştirme:** Migration oluşturan pipeline adımından sonra \`dotnet ef dbcontext optimize\` çalıştırıp generated dosyaları commit edin. Böylece production'da her zaman güncel compiled model kullanılır.

\`\`\`csharp
// ❌ Compiled model OLMADAN startup (200 entity):
//    Model building: ~4200ms (her app start'ta)

// ✅ Compiled model İLE startup (200 entity):
//    Model loading: ~180ms (pre-computed, reflection yok)
\`\`\`

### 5. N+1 Tespit — Interceptor ile

\`\`\`csharp
// N+1 tespiti için EF Core Interceptor (production-safe, derlenebilir)
public class QueryCountInterceptor : DbCommandInterceptor
{
    private static readonly AsyncLocal<int> _queryCount = new();

    public static int CurrentRequestQueryCount => _queryCount.Value;
    public static void Reset() => _queryCount.Value = 0;

    public override InterceptionResult<DbDataReader> ReaderExecuting(
        DbCommand command, CommandEventData eventData, InterceptionResult<DbDataReader> result)
    {
        _queryCount.Value++;
        return result;
    }

    public override ValueTask<InterceptionResult<DbDataReader>> ReaderExecutingAsync(
        DbCommand command, CommandEventData eventData, InterceptionResult<DbDataReader> result,
        CancellationToken cancellationToken = default)
    {
        _queryCount.Value++;
        return ValueTask.FromResult(result);
    }
}

// Kayıt:
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseSqlServer(connectionString)
           .AddInterceptors(new QueryCountInterceptor()));

// Middleware ile tespit:
app.Use(async (context, next) =>
{
    QueryCountInterceptor.Reset();
    await next();
    
    var count = QueryCountInterceptor.CurrentRequestQueryCount;
    if (count > 10)
        Log.Warning("⚠️ N+1 şüphesi: {Path} → {Count} sorgu",
            context.Request.Path, count);

    // Header olarak da eklenebilir (dev ortamda)
    context.Response.Headers["X-EF-Query-Count"] = count.ToString();
});
\`\`\`

## 48. Yeniden Kullanılabilir IQueryable Metotlar — Subquery Tuzağı 🔴

Tekrarlayan sorgu mantığını DRY tutmak için \`IQueryable\` extension method'ları yazılır. Ama EF Core bu metotları birleştirirken **subquery** oluşturabilir — bu da gereksiz nested SELECT'lere, index kullanılmamasına ve ciddi performans kaybına yol açar.

### Problem: Subquery Olarak Sarmalama

\`\`\`csharp
// ❌ Yeniden kullanılabilir IQueryable metodu:
public static class ProductQueries
{
    public static IQueryable<Product> Active(this IQueryable<Product> query)
        => query.Where(p => p.IsActive && !p.IsDeleted);

    public static IQueryable<Product> InCategory(this IQueryable<Product> query, int categoryId)
        => query.Where(p => p.CategoryId == categoryId);

    public static IQueryable<Product> Expensive(this IQueryable<Product> query)
        => query.Where(p => p.Price > 1000);
}

// Kullanım — basit zincir (BU GENELLİKLE SORUNSUZ):
var products = await context.Products
    .Active()
    .InCategory(5)
    .Expensive()
    .ToListAsync();
\`\`\`

**Basit Where zincirleri** genellikle düzleştirilir (EF Core ifade ağacını birleştirir):

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- ✅ EF Core Where'leri birleştirir — subquery YOK:
SELECT [p].[Id], [p].[Name], [p].[Price]
FROM [Products] AS [p]
WHERE [p].[IsActive] = 1 AND [p].[IsDeleted] = 0
  AND [p].[CategoryId] = 5 AND [p].[Price] > 1000;
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- ✅ EF Core Where'leri birleştirir — subquery YOK:
SELECT p.id, p.name, p.price
FROM products AS p
WHERE p.is_active = TRUE AND p.is_deleted = FALSE
  AND p.category_id = 5 AND p.price > 1000;
\`\`\`

</details>

### 🚨 Ne Zaman Subquery Oluşur?

Sorun, **IQueryable değişkenini başka bir sorguda referans aldığında** veya **Select/projection içerdiğinde** ortaya çıkar:

\`\`\`csharp
// ❌ TEHLİKELİ — IQueryable değişkenini başka sorguda kullanmak:
var activeProducts = context.Products.Active();  // IQueryable değişken

var result = await context.Orders
    .Where(o => activeProducts.Any(p => p.Id == o.ProductId))  // ← Subquery!
    .ToListAsync();

// ❌ TEHLİKELİ — IQueryable'ı Join'de kullanmak:
var expensiveProducts = context.Products.Active().Expensive();

var orderDetails = await context.Orders
    .Join(expensiveProducts,                    // ← Subquery olabilir!
          o => o.ProductId,
          p => p.Id,
          (o, p) => new { o.Reference, p.Name, p.Price })
    .ToListAsync();

// ❌ EN TEHLİKELİ — Select/Projection içeren IQueryable:
public static IQueryable<ProductDto> AsDto(this IQueryable<Product> query)
    => query.Select(p => new ProductDto { Id = p.Id, Name = p.Name, Price = p.Price });

// Bu metot başka bir sorguda kullanılırsa → kesin subquery:
var dtos = context.Products.Active().AsDto();
var filtered = dtos.Where(d => d.Price > 500).ToListAsync();
// ↑ EF Core bunu şu şekle çevirir:
\`\`\`

<details>
<summary><b>💾 SQL Server — Subquery Problemi</b></summary>

\`\`\`sql
-- ❌ EF Core 7/8: Join'de IQueryable değişken → subquery:
SELECT [o].[Reference], [t].[Name], [t].[Price]
FROM [Orders] AS [o]
INNER JOIN (
    SELECT [p].[Id], [p].[Name], [p].[Price]
    FROM [Products] AS [p]
    WHERE [p].[IsActive] = 1 AND [p].[IsDeleted] = 0 AND [p].[Price] > 1000
) AS [t] ON [o].[ProductId] = [t].[Id];

-- ✅ İdeal SQL (subquery olmasaydı):
SELECT [o].[Reference], [p].[Name], [p].[Price]
FROM [Orders] AS [o]
INNER JOIN [Products] AS [p] ON [o].[ProductId] = [p].[Id]
WHERE [p].[IsActive] = 1 AND [p].[IsDeleted] = 0 AND [p].[Price] > 1000;
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL — Subquery Problemi</b></summary>

\`\`\`sql
-- ❌ EF Core 7/8: Join'de IQueryable değişken → subquery:
SELECT o.reference, t.name, t.price
FROM orders AS o
INNER JOIN (
    SELECT p.id, p.name, p.price
    FROM products AS p
    WHERE p.is_active = TRUE AND p.is_deleted = FALSE AND p.price > 1000
) AS t ON o.product_id = t.id;

-- ✅ İdeal SQL (subquery olmasaydı):
SELECT o.reference, p.name, p.price
FROM orders AS o
INNER JOIN products AS p ON o.product_id = p.id
WHERE p.is_active = TRUE AND p.is_deleted = FALSE AND p.price > 1000;
\`\`\`

</details>

### Performans Etkisi

| Senaryo | Subquery Var mı | Etki |
|---------|:---------------:|------|
| Basit Where zincirleme | ❌ | Sorun yok — EF düzleştirir |
| IQueryable değişken + \`Any()\` / \`Contains()\` | ✅ | Correlated subquery → her satır için çalışır |
| IQueryable değişken + \`Join()\` | ✅ (EF7/8) | Nested SELECT — optimizer'a bağlı |
| Select/Projection içeren IQueryable | ✅ | Kesin subquery sınırı — düzleşmez |
| Count/Sum/Avg içeren IQueryable | ✅ | Aggregate subquery |

> ⚠️ **SQL Server** genellikle basit subquery'leri optimizer'da düzleştirir (performance farkı küçük olabilir).  
> **PostgreSQL** planner'ı daha katı — subquery görünce index kullanmayı bırakabilir, **Seq Scan**'a düşebilir.

### EF Core 9 İyileştirmesi: Uncorrelated Subquery Inlining

EF Core 9 (Kasım 2024) önemli bir iyileştirme getirdi: **Uncorrelated (bağımsız) subquery'ler artık tek sorguya inline edilir**, iki ayrı round-trip yerine bir SQL'e birleştirilir.

\`\`\`csharp
// EF Core 8'de: dotnetPosts ayrı round-trip olarak çalışıyordu
var dotnetPosts = context.Posts.Where(p => p.Title.Contains(".NET"));

var results = await dotnetPosts
    .Where(p => p.Id > 2)
    .Select(p => new { Post = p, TotalCount = dotnetPosts.Count() })
    .Skip(2).Take(10)
    .ToArrayAsync();
\`\`\`

<details>
<summary><b>💾 EF Core 8 vs 9 — SQL Server</b></summary>

\`\`\`sql
-- ❌ EF Core 8: İKİ ayrı sorgu (iki round-trip!)
-- Sorgu 1:
SELECT COUNT(*) FROM [Posts] AS [p] WHERE [p].[Title] LIKE N'%.NET%';
-- Sorgu 2:
SELECT [p].[Id], [p].[Title], [p].[Content]
FROM [Posts] AS [p]
WHERE [p].[Title] LIKE N'%.NET%' AND [p].[Id] > 2
ORDER BY (SELECT 1)
OFFSET @__p_1 ROWS FETCH NEXT @__p_2 ROWS ONLY;

-- ✅ EF Core 9: TEK sorgu (inline subquery)
SELECT [p].[Id], [p].[Title], [p].[Content], (
    SELECT COUNT(*)
    FROM [Posts] AS [p0]
    WHERE [p0].[Title] LIKE N'%.NET%')
FROM [Posts] AS [p]
WHERE [p].[Title] LIKE N'%.NET%' AND [p].[Id] > 2
ORDER BY (SELECT 1)
OFFSET @__p_0 ROWS FETCH NEXT @__p_1 ROWS ONLY;
\`\`\`

</details>

> 💡 **Dikkat:** Bu iyileştirme sadece **uncorrelated** (dış sorguya bağımlı olmayan) IQueryable'lar için geçerli. Correlated subquery'ler (Any, All ile dış entity'ye referans) hâlâ subquery olarak kalır.

### ✅ Doğru Yaklaşım: Expression Tabanlı Yeniden Kullanım

Subquery tuzağından kaçınmanın en güvenli yolu: **IQueryable yerine Expression döndüren metotlar** kullanmak:

\`\`\`csharp
// ✅ DOĞRU — Expression tabanlı yeniden kullanılabilir filtreler:
public static class ProductFilters
{
    public static Expression<Func<Product, bool>> IsActive()
        => p => p.IsActive && !p.IsDeleted;

    public static Expression<Func<Product, bool>> IsExpensive(decimal threshold = 1000)
        => p => p.Price > threshold;

    public static Expression<Func<Product, bool>> InCategory(int categoryId)
        => p => p.CategoryId == categoryId;

    // Birden fazla koşulu birleştirmek için:
    public static Expression<Func<Product, bool>> ActiveAndExpensive(decimal threshold = 1000)
        => p => p.IsActive && !p.IsDeleted && p.Price > threshold;
}

// Kullanım:
var products = await context.Products
    .Where(ProductFilters.IsActive())
    .Where(ProductFilters.InCategory(5))
    .Where(ProductFilters.IsExpensive())
    .ToListAsync();
// → Tek düz WHERE clause, subquery YOK ✓

// Join'de kullanım — güvenli:
var orderDetails = await context.Orders
    .Join(context.Products.Where(ProductFilters.IsActive()),
          o => o.ProductId,
          p => p.Id,
          (o, p) => new { o.Reference, p.Name, p.Price })
    .ToListAsync();
// → EF Core expression'ı doğrudan JOIN ON clause'a ekler
\`\`\`

### Expression Birleştirme (LinqKit veya Manuel)

Birden fazla expression'ı AND/OR ile birleştirmek için:

\`\`\`csharp
// Seçenek 1: LinqKit (NuGet: LinqKit.Microsoft.EntityFrameworkCore)
using LinqKit;

var filter = PredicateBuilder.New<Product>(true);
filter = filter.And(ProductFilters.IsActive());
filter = filter.And(ProductFilters.IsExpensive(500));
if (categoryId.HasValue)
    filter = filter.And(ProductFilters.InCategory(categoryId.Value));

var products = await context.Products
    .AsExpandable()  // LinqKit gerekli
    .Where(filter)
    .ToListAsync();

// Seçenek 2: Manuel Expression birleştirme (bağımlılık yok)
public static Expression<Func<T, bool>> AndAlso<T>(
    this Expression<Func<T, bool>> left,
    Expression<Func<T, bool>> right)
{
    var param = left.Parameters[0];
    var body = Expression.AndAlso(
        left.Body,
        Expression.Invoke(right, param));
    return Expression.Lambda<Func<T, bool>>(body, param);
}

// Kullanım:
var combined = ProductFilters.IsActive().AndAlso(ProductFilters.IsExpensive(500));
var products = await context.Products.Where(combined).ToListAsync();
\`\`\`

> ⚠️ **Dikkat:** \`Expression.Invoke\` kullanan \`AndAlso\` helper'ı bazı provider'larda (özellikle eski Npgsql sürümleri) SQL'e çevrilemez. Production'da sorun yaşarsan **LinqKit** kullan — \`AsExpandable()\` + \`PredicateBuilder\` expression'ları düzleştirerek provider-safe hale getirir. Alternatif: \`ExpressionVisitor\` ile parameter rebinding yapan bir versiyon yaz.

### IQueryable Extension Method'lar Ne Zaman Güvenli?

| Pattern | Güvenli mi? | Neden |
|---------|:-----------:|-------|
| \`.Where()\` zincirleme | ✅ | EF expression tree'yi düzleştirir |
| \`.OrderBy()\` / \`.Take()\` / \`.Skip()\` | ✅ | Tek sorgu, subquery yok |
| \`.Include()\` / \`.ThenInclude()\` | ✅ | EF kendi mekanizmasıyla birleştirir |
| IQueryable değişken + \`.Any()\` / \`.All()\` | ⚠️ | Correlated subquery — kaçınılmaz ama bilinçli kullan |
| IQueryable değişken + \`Join()\` | ⚠️ | EF7/8 subquery, EF9+ inline (basit durumlarda) |
| \`.Select()\` / projection içeren IQueryable | ❌ | Kesin subquery sınırı — Expression kullan |
| IQueryable + \`.Count()\` / \`.Sum()\` scalar | ⚠️ | EF9+ inline (uncorrelated), EF8 ayrı round-trip |

### Specification Pattern — Doğru Uygulama

Repository pattern ile sık kullanılan Specification pattern'ı da Expression tabanlı olmalıdır:

\`\`\`csharp
// ✅ Specification Pattern — Expression tabanlı
public abstract class Specification<T>
{
    public abstract Expression<Func<T, bool>> ToExpression();

    // IQueryable'a uygulama:
    public IQueryable<T> Apply(IQueryable<T> query)
        => query.Where(ToExpression());
}

public class ActiveProductSpec : Specification<Product>
{
    public override Expression<Func<Product, bool>> ToExpression()
        => p => p.IsActive && !p.IsDeleted;
}

public class ExpensiveInCategorySpec : Specification<Product>
{
    private readonly int _categoryId;
    private readonly decimal _minPrice;

    public ExpensiveInCategorySpec(int categoryId, decimal minPrice = 1000)
    {
        _categoryId = categoryId;
        _minPrice = minPrice;
    }

    public override Expression<Func<Product, bool>> ToExpression()
        => p => p.CategoryId == _categoryId && p.Price > _minPrice;
}

// Kullanım:
var spec = new ActiveProductSpec();
var products = await spec.Apply(context.Products)
    .OrderByDescending(p => p.Price)
    .Take(10)
    .ToListAsync();
// → Düz SQL, subquery YOK ✓
\`\`\`

### Özet: Karar Matrisi

| İhtiyaç | Yöntem | Risk |
|---------|--------|------|
| Tekrarlayan WHERE koşulu | \`Expression<Func<T, bool>>\` | ✅ Sıfır risk |
| Tekrarlayan Where + OrderBy zinciri | IQueryable extension (Where + OrderBy) | ✅ Düşük risk |
| Sorguyu başka sorguda kullanma | Expression | ✅ Sıfır risk |
| Join'de reusable filtre | Expression (Where içinde) | ✅ Sıfır risk |
| Pagination + filter combo | IQueryable extension | ✅ Düşük risk (Skip/Take sorun değil) |
| Count/Aggregate + ana sorgu | EF9+ inline / veya ayrı sorgu olarak kabul et | ⚠️ Versiyon bağımlı |
| Projection (Select → DTO) reuse | **Ayrı metot olarak bırak, birleştirme** | ❌ Subquery kaçınılmaz |

> 🚨 **Altın Kural:** "IQueryable extension method yazdığımda, bu metot başka bir sorguda referans alınacak mı?" sorusunu sor. Cevap evet ise → **Expression kullan**. Cevap hayır ise (sadece zincir sonunda ToList/First çağrılacaksa) → IQueryable güvenli.

### 4. Container Hazır Olana Kadar Bekleme (Startup Resilience)

Container başlatıldıktan sonra DB hemen bağlantı kabul etmeyebilir. Retry pattern ile bekle:

\`\`\`csharp
// Program.cs — Migration uygularken retry:
using var scope = app.Services.CreateScope();
var db = scope.ServiceProvider.GetRequiredService<AppDbContext>();

var retryCount = 0;
const int maxRetries = 10;

while (retryCount < maxRetries)
{
    try
    {
        await db.Database.MigrateAsync();
        break;
    }
    catch (Exception ex) when (retryCount < maxRetries - 1)
    {
        retryCount++;
        Console.WriteLine($"DB bağlantısı bekleniyor... ({retryCount}/{maxRetries})");
        await Task.Delay(TimeSpan.FromSeconds(3));
    }
}
\`\`\`

### 9. Sık Karşılaşılan Sorunlar

| Problem | Neden | Çözüm |
|---------|-------|-------|
| SQL Server container hemen kapanıyor | Zayıf SA password | En az 8 karakter, büyük+küçük+rakam+özel |
| "Connection refused" hatası | Container henüz hazır değil | Healthcheck + retry pattern kullan |
| Port çakışması (1433/5432 meşgul) | Host'ta başka DB çalışıyor | Port'u değiştir: \`-p 1434:1433\` |
| Permission denied (Linux volume) | UID mismatch | \`-e MSSQL_AGENT_ENABLED=false\` veya chown |
| PostgreSQL "role does not exist" | Yanlış kullanıcı adı | \`POSTGRES_USER\` env var'ı kontrol et |
| Migration timeout | DB henüz bağlantı kabul etmiyor | \`depends_on: condition: service_healthy\` |
| Veri kayboldu | Volume tanımlanmamış | Named volume veya bind mount ekle |
| Container içinden dışarı erişilemiyor | Network isolation | \`host.docker.internal\` kullan (host erişimi) |

            if (lang && hljs.getLanguage(lang)) {
                return hljs.highlight(code, { language: lang }).value;
            }
            return hljs.highlightAuto(code).value;
        },
        breaks: false,
        gfm: true
    });

    let currentProvider = 'sqlserver';

    function renderContent() {
        const content = document.getElementById('content');
        let html = marked.parse(MARKDOWN_CONTENT);
        content.innerHTML = html;
        
        convertDetailsToTabs();
        buildToc();
        enhanceBlockquotes();
        enhanceSvgAccessibility();
        styleSectionDividers();
        addCopyButtons();

        // Apply syntax highlighting
        document.querySelectorAll('pre code:not(.hljs)').forEach(el => {
            hljs.highlightElement(el);
        });

        // Setup scroll progress
        setupScrollProgress();
    }

    function convertDetailsToTabs() {
        const content = document.getElementById('content');
        // Find consecutive <details> elements that form provider pairs
        const allDetails = content.querySelectorAll('details');
        const processed = new Set();
        
        allDetails.forEach((detail, idx) => {
            if (processed.has(detail)) return;
            
            const summary = detail.querySelector('summary');
            if (!summary) return;
            
            const summaryText = summary.textContent.trim();
            const isSql = summaryText.includes('SQL Server');
            const isPg = summaryText.includes('PostgreSQL');
            
            if (!isSql && !isPg) return;
            
            // Find the paired detail
            let pair = null;
            let next = detail.nextElementSibling;
            // Skip whitespace text nodes
            while (next && next.nodeType === 3) next = next.nextSibling;
            
            if (next && next.tagName === 'DETAILS') {
                const nextSummary = next.querySelector('summary');
                if (nextSummary) {
                    const nextText = nextSummary.textContent.trim();
                    if ((isSql && nextText.includes('PostgreSQL')) || (isPg && nextText.includes('SQL Server'))) {
                        pair = next;
                    }
                }
            }
            
            if (!pair) {
                // Single details, just style it
                processed.add(detail);
                return;
            }
            
            processed.add(detail);
            processed.add(pair);
            
            // Determine order
            let sqlDetail = isSql ? detail : pair;
            let pgDetail = isSql ? pair : detail;
            
            // Get content (everything except summary)
            const sqlContent = getDetailsContent(sqlDetail);
            const pgContent = getDetailsContent(pgDetail);
            
            // Create tabbed panel
            const panel = document.createElement('div');
            panel.className = 'tabbed-panel';
            
            const panelId = 'tab-' + Math.random().toString(36).substr(2, 9);
            
            panel.innerHTML = `
                <div class="tab-header">
                    <button class="tab-btn ${currentProvider === 'sqlserver' ? 'active' : ''}" 
                            data-provider="sqlserver" data-panel="${panelId}"
                            onclick="switchTab(this, '${panelId}')">SQL Server</button>
                    <button class="tab-btn ${currentProvider === 'postgresql' ? 'active' : ''}" 
                            data-provider="postgresql" data-panel="${panelId}"
                            onclick="switchTab(this, '${panelId}')">PostgreSQL</button>
                </div>
                <div class="tab-content ${currentProvider === 'sqlserver' ? 'active' : ''}" 
                     data-provider="sqlserver" data-panel="${panelId}">${sqlContent}</div>
                <div class="tab-content ${currentProvider === 'postgresql' ? 'active' : ''}" 
                     data-provider="postgresql" data-panel="${panelId}">${pgContent}</div>


            `;
            
            // Replace in DOM
            detail.parentNode.insertBefore(panel, detail);
            detail.remove();
            pair.remove();
            
            // Highlight code in new panel
            panel.querySelectorAll('pre code:not(.hljs)').forEach(el => {
                hljs.highlightElement(el);
            });
        });
    }

    function getDetailsContent(detail) {
        const clone = detail.cloneNode(true);
        const summary = clone.querySelector('summary');
        if (summary) summary.remove();
        return clone.innerHTML;
    }

    function switchTab(btn, panelId) {
        const panel = btn.closest('.tabbed-panel');
        const provider = btn.dataset.provider;
        
        // Update buttons
        panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update content
        panel.querySelectorAll('.tab-content').forEach(c => {
            c.classList.toggle('active', c.dataset.provider === provider);
        });
    }

    function switchAll(provider) {
        currentProvider = provider;
        
        // Update global buttons
        document.getElementById('globalSql').className = provider === 'sqlserver' ? 'active-sql' : '';
        document.getElementById('globalPg').className = provider === 'postgresql' ? 'active-pg' : '';
        
        // Switch all tabs
        document.querySelectorAll('.tabbed-panel').forEach(panel => {
            panel.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.provider === provider);
            });
            panel.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.dataset.provider === provider);
            });
        });

        // Toggle details panels based on provider
        document.querySelectorAll('details').forEach(d => {
            const summary = d.querySelector('summary');
            if (!summary) return;
            const text = summary.textContent;
            if (text.includes('SQL Server')) {
                d.open = (provider === 'sqlserver');
            } else if (text.includes('PostgreSQL')) {
                d.open = (provider === 'postgresql');
            }
        });
    }

    function buildToc() {
        const headings = document.querySelectorAll('#content h2');
        const allH3 = document.querySelectorAll('#content h3');
        const tocLinks = document.getElementById('tocLinks');
        
        // Level definitions (in display order)
        const levels = [
            { key: 'basic', label: 'Temel', color: 'var(--green)', cls: 'level-basic' },
            { key: 'mid', label: 'Orta', color: 'var(--yellow)', cls: 'level-mid' },
            { key: 'advanced', label: 'İleri', color: 'var(--orange)', cls: 'level-advanced' },
            { key: 'expert', label: 'Uzman', color: 'var(--red)', cls: 'level-expert' },
            { key: 'ref', label: 'Referans', color: 'var(--accent)', cls: 'level-ref' }
        ];
        
        // First pass: collect all items into groups (document order within each group)
        const groups = { basic: [], mid: [], advanced: [], expert: [], ref: [], other: [] };
        const h2Array = Array.from(headings);
        const h3Array = Array.from(allH3);
        
        headings.forEach((h, i) => {
            const id = 'section-' + i;
            h.id = id;
            let text = h.textContent.replace(/^## /, '');
            
            if (text.trim() === 'İçindekiler') return;
            
            let levelKey = 'other';
            let levelClass = '';
            let levelLabel = '';
            if (text.includes('🟢')) { levelKey = 'basic'; levelClass = 'level-basic'; levelLabel = 'Temel'; }
            else if (text.includes('🟡')) { levelKey = 'mid'; levelClass = 'level-mid'; levelLabel = 'Orta'; }
            else if (text.includes('🟠')) { levelKey = 'advanced'; levelClass = 'level-advanced'; levelLabel = 'İleri'; }
            else if (text.includes('🔴')) { levelKey = 'expert'; levelClass = 'level-expert'; levelLabel = 'Uzman'; }
            else if (text.includes('📋')) { levelKey = 'ref'; levelClass = 'level-ref'; levelLabel = 'Ref'; }
            
            // Strip emojis and existing manual numbers
            text = text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{26A0}\u{2B55}\u{1F4CB}🔶]+\s*/gu, '').trim();
            text = text.replace(/^\d+\.\s*/, '');
            
            // Collect h3 sub-items
            const nextH2 = h2Array[i + 1];
            const subH3s = [];
            h3Array.forEach((h3) => {
                const isAfterCurrent = h.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_FOLLOWING;
                const isBeforeNext = !nextH2 || (nextH2.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_PRECEDING);
                if (isAfterCurrent && isBeforeNext) {
                    subH3s.push(h3);
                }
            });
            
            groups[levelKey].push({ id, text, levelClass, levelLabel, h, subH3s });
        });
        
        // Second pass: assign numbers in group order (TEMEL → ORTA → İLERİ → UZMAN → REFERANS)
        let autoNum = 0;
        const levelOrder = ['basic', 'mid', 'advanced', 'expert', 'ref'];
        const numberedGroups = {};
        
        levelOrder.forEach(key => {
            numberedGroups[key] = [];
            groups[key].forEach(item => {
                autoNum++;
                const sectionNum = autoNum;
                const numberedText = sectionNum + '. ' + item.text;
                
                // Update DOM heading
                item.h.innerHTML = numberedText + (item.levelLabel ? ` <span class="level-badge ${item.levelClass}">${item.levelLabel}</span>` : '');
                
                // Number sub-items (h3)
                const subItems = [];
                let subIndex = 1;
                item.subH3s.forEach(h3 => {
                    const subId = item.id + '-sub-' + subIndex;
                    h3.id = subId;
                    let h3Text = h3.textContent.replace(/^### /, '').trim();
                    
                    // Skip TOC-internal headings
                    if (h3Text.match(/^[🟢🟡🟠🔴📋]/u)) return;
                    
                    const displayNum = sectionNum + '.' + subIndex;
                    // Strip any existing number prefix
                    let cleanH3Text = h3Text.replace(/^\d+[\.\)]\s*/, '').replace(/^\d+\.\d+\s*/, '');
                    h3.innerHTML = displayNum + ' ' + cleanH3Text;
                    subItems.push({ id: subId, text: displayNum + ' ' + cleanH3Text });
                    subIndex++;
                });
                
                numberedGroups[key].push({ id: item.id, text: numberedText, subItems });
            });
        });
        
        // Build tree HTML
        let html = '';
        // Render "Giriş" and other ungrouped items first
        const introItems = groups.other.filter(item => item.text.includes('Giriş'));
        const trailingOther = groups.other.filter(item => !item.text.includes('Giriş'));
        introItems.forEach(item => {
            html += `<a href="#${item.id}" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;" style="padding-left:1rem;font-weight:600">${item.text}</a>`;
        });
        levels.forEach(level => {
            const items = numberedGroups[level.key];
            if (!items || items.length === 0) return;
            html += `<div class="toc-group">`;
            html += `<div class="toc-group-header" onclick="toggleTocGroup(this)">`;
            html += `<span class="toc-chevron">▾</span>`;
            html += `<span class="toc-dot" style="background:${level.color}"></span>`;
            html += `<span>${level.label}</span>`;
            html += `<span class="toc-count">${items.length}</span>`;
            html += `</div>`;
            html += `<div class="toc-group-items">`;
            items.forEach(item => {
                html += `<a href="#${item.id}" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;">${item.text}</a>`;
                if (item.subItems && item.subItems.length > 0) {
                    html += `<div class="toc-sub-container">`;
                    item.subItems.forEach(sub => {
                        html += `<a href="#${sub.id}" class="toc-sub-item" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;">${sub.text}</a>`;
                    });
                    html += `</div>`;
                }
            });
            html += `</div></div>`;
        });
        // Other (ungrouped, excluding intro items already rendered)
        if (trailingOther.length > 0) {
            trailingOther.forEach(item => {
                html += `<a href="#${item.id}" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;" style="padding-left:1rem">${item.text}</a>`;
                if (item.subH3s && item.subH3s.length > 0) {
                    html += `<div class="toc-sub-container">`;
                    item.subH3s.forEach((h3, idx) => {
                        const subId = item.id + '-sub-' + (idx + 1);
                        html += `<a href="#${subId}" class="toc-sub-item" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;">${h3.textContent}</a>`;
                    });
                    html += `</div>`;
                }
            });
        }
        
        tocLinks.innerHTML = html;
        
        // Intersection observer for active state
        const allObservedHeadings = document.querySelectorAll('#content h2, #content h3');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    document.querySelectorAll('#tocLinks a').forEach(a => {
                        const isActive = a.getAttribute('href') === '#' + id;
                        a.classList.toggle('active', isActive);
                        if (isActive) {
                            // Auto-expand group if active link is in a collapsed group
                            const groupItems = a.closest('.toc-group-items');
                            if (groupItems && groupItems.classList.contains('collapsed')) {
                                groupItems.classList.remove('collapsed');
                                groupItems.previousElementSibling.classList.remove('collapsed');
                            }
                            // Auto-expand section if active sub-item is in a collapsed section
                            const subContainer = a.closest('.toc-sub-container');
                            if (subContainer && subContainer.classList.contains('collapsed')) {
                                subContainer.classList.remove('collapsed');
                                subContainer.previousElementSibling.classList.remove('collapsed');
                            }
                        }
                    });
                }
            });
        }, { rootMargin: '-10% 0px -85% 0px' });
        
        allObservedHeadings.forEach(h => { if (h.id) observer.observe(h); });
    }

    function enhanceSvgAccessibility() {
        document.querySelectorAll('#content svg').forEach(svg => {
            svg.setAttribute('role', 'img');
            // Find nearest preceding heading via DOM traversal
            let label = 'Diyagram';
            let el = svg;
            while (el) {
                // Check previous siblings for headings
                let sibling = el.previousElementSibling;
                while (sibling) {
                    if (/^H[2-4]$/i.test(sibling.tagName)) {
                        label = sibling.textContent.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}]+/gu, '').trim() + ' diyagramı';
                        break;
                    }
                    sibling = sibling.previousElementSibling;
                }
                if (label !== 'Diyagram') break;
                el = el.parentElement;
                if (!el || el.id === 'content') break;
            }
            svg.setAttribute('aria-label', label);
            if (!svg.querySelector('title')) {
                const title = document.createElementNS('http://www.w3.org/2000/svg', 'title');
                title.textContent = label;
                svg.prepend(title);
            }
        });
    }

    function styleSectionDividers() {
        document.querySelectorAll('#content h1:not(:first-child)').forEach(h1 => {
            const text = h1.textContent;
            if (text.includes('🟢')) h1.classList.add('level-divider-basic');
            else if (text.includes('🟡')) h1.classList.add('level-divider-mid');
            else if (text.includes('🟠')) h1.classList.add('level-divider-advanced');
            else if (text.includes('🔴')) h1.classList.add('level-divider-expert');
            else if (text.includes('📋')) h1.classList.add('level-divider-ref');
        });
    }

    function enhanceBlockquotes() {
        document.querySelectorAll('blockquote').forEach(bq => {
            const text = bq.textContent;
            if (text.startsWith('💡')) {
                bq.classList.add('callout', 'callout-tip');
            } else if (text.startsWith('⚠️')) {
                bq.classList.add('callout', 'callout-warn');
            } else if (text.startsWith('❌') || text.startsWith('🚨')) {
                bq.classList.add('callout', 'callout-danger');
            } else if (text.startsWith('🐘')) {
                bq.classList.add('callout', 'callout-info');
            } else if (text.startsWith('📌')) {
                bq.classList.add('callout', 'callout-info');
            }
        });
    }

    function filterToc(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#tocLinks .toc-group').forEach(group => {
            const links = group.querySelectorAll('a');
            let anyVisible = false;
            links.forEach(a => {
                const match = a.textContent.toLowerCase().includes(q);
                a.style.display = match ? '' : 'none';
                if (match) anyVisible = true;
            });
            group.style.display = anyVisible ? '' : 'none';
            // Expand groups when searching
            if (q && anyVisible) {
                group.querySelector('.toc-group-header').classList.remove('collapsed');
                group.querySelector('.toc-group-items').classList.remove('collapsed');
            }
            // Show/hide sub-containers based on visible children
            group.querySelectorAll('.toc-sub-container').forEach(container => {
                const subLinks = container.querySelectorAll('a');
                let subVisible = false;
                subLinks.forEach(a => { if (a.style.display !== 'none') subVisible = true; });
                container.style.display = subVisible ? '' : 'none';
            });
        });
        // Also filter ungrouped links
        document.querySelectorAll('#tocLinks > a').forEach(a => {
            const match = a.textContent.toLowerCase().includes(q);
            a.style.display = match ? '' : 'none';
        });
        document.querySelectorAll('#tocLinks > .toc-sub-container').forEach(container => {
            const subLinks = container.querySelectorAll('a');
            let subVisible = false;
            subLinks.forEach(a => {
                const match = a.textContent.toLowerCase().includes(q);
                a.style.display = match ? '' : 'none';
                if (match) subVisible = true;
            });
            container.style.display = subVisible ? '' : 'none';
        });
    }

    function toggleTocGroup(header) {
        header.classList.toggle('collapsed');
        const items = header.nextElementSibling;
        items.classList.toggle('collapsed');
    }



    function closeSidebarMobile() {
        if (window.innerWidth <= 1024) {
            document.querySelector('.sidebar').classList.remove('open');
        }
    }

    function setupScrollProgress() {
        const progressBar = document.getElementById('scrollProgress');
        const backToTop = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? scrollTop / docHeight : 0;
            progressBar.style.transform = `scaleX(${progress})`;
            
            // Back to top button
            backToTop.classList.toggle('visible', scrollTop > 600);
        }, { passive: true });
    }

    // Sidebar resize
    (function() {
        const handle = document.getElementById('sidebarResizeHandle');
        const sidebar = document.getElementById('sidebar');
        const content = document.querySelector('.content');
        let isResizing = false;

        handle.addEventListener('mousedown', function(e) {
            isResizing = true;
            handle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            const newWidth = Math.min(Math.max(e.clientX, 200), 600);
            sidebar.style.width = newWidth + 'px';
            content.style.marginLeft = newWidth + 'px';
            content.style.width = 'calc(100% - ' + newWidth + 'px)';
        });

        document.addEventListener('mouseup', function() {
            if (isResizing) {
                isResizing = false;
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    })();

    // ═══ Copy Button ═══
    function addCopyButtons() {
        document.querySelectorAll('#content pre').forEach(pre => {
            if (pre.closest('.code-wrapper')) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = 'Kopyala';
            btn.addEventListener('click', () => {
                const code = pre.querySelector('code');
                const text = code ? code.textContent : pre.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    btn.textContent = '✓ Kopyalandı';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000);
                });
            });
            wrapper.appendChild(btn);
        });
    }

    // ═══ Theme Toggle ═══
    function toggleTheme() {
        const html = document.documentElement;
        const btn = document.getElementById('themeToggle');
        const isDark = html.getAttribute('data-theme') !== 'light';
        html.setAttribute('data-theme', isDark ? 'light' : 'dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('ef-theme', isDark ? 'light' : 'dark');

    // Restore saved theme
    (function() {
        const saved = localStorage.getItem('ef-theme');
        if (saved === 'light') {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('themeToggle').textContent = '☀️';
        }

    // ═══ Enhanced Search (headings + content) ═══
    let searchIndex = [];
    function buildSearchIndex() {
        const sections = document.querySelectorAll('#content h1, #content h2, #content h3');
        searchIndex = [];
        sections.forEach((heading, i) => {
            let textContent = '';
            let el = heading.nextElementSibling;
            const nextHeading = sections[i + 1];
            while (el && el !== nextHeading) {
                textContent += ' ' + el.textContent;
                el = el.nextElementSibling;
            }
            searchIndex.push({
                id: heading.id,
                title: heading.textContent.replace(/Temel|Orta|İleri|Uzman|Ref/g, '').trim(),
                content: textContent.substring(0, 2000).toLowerCase(),
                heading: heading
            });
        });
    }

    let searchTimeout = null;
    function handleSearch(query) {
        clearTimeout(searchTimeout);
        const q = query.trim().toLowerCase();
        const panel = document.getElementById('searchResults');
        
        // Also filter TOC (existing behavior)
        filterToc(query);
        
        if (q.length < 2) {
            panel.classList.remove('open');
            panel.innerHTML = '';
            return;
        }
        
        searchTimeout = setTimeout(() => {
            const results = [];
            const terms = q.split(/\s+/);
            
            searchIndex.forEach(item => {
                const titleLower = item.title.toLowerCase();
                const matchesTitle = terms.every(t => titleLower.includes(t));
                const matchesContent = terms.every(t => item.content.includes(t));
                
                if (matchesTitle || matchesContent) {
                    let snippet = '';
                    if (matchesContent && !matchesTitle) {
                        const idx = item.content.indexOf(terms[0]);
                        const start = Math.max(0, idx - 30);
                        const end = Math.min(item.content.length, idx + 60);
                        snippet = '...' + item.content.substring(start, end) + '...';
                        terms.forEach(t => {
                            snippet = snippet.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '<mark>$&</mark>');
                        });
                    }
                    results.push({ ...item, snippet, isTitle: matchesTitle });
                }
            });
            
            results.sort((a, b) => (b.isTitle ? 1 : 0) - (a.isTitle ? 1 : 0));
            
            if (results.length === 0) {
                panel.innerHTML = '<div class="search-info">Sonuç bulunamadı</div>';
            } else {
                panel.innerHTML = `<div class="search-info">${results.length} sonuç</div>` +
                    results.slice(0, 15).map(r => 
                        `<a href="#${r.id}" class="search-result-item" onclick="navigateToId(this.getAttribute('href').slice(1)); return false;">
                            <span class="result-section">${r.title}</span>
                            ${r.snippet ? `<span class="result-snippet">${r.snippet}</span>` : ''}
                        </a>`
                    ).join('');
            }
            panel.classList.add('open');
        }, 200);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // "/" focuses search (unless typing in input)
        if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
            e.preventDefault();
            const searchInput = document.getElementById('tocSearch');
            searchInput.focus();
            document.querySelector('.sidebar').classList.add('open');
        }
        // Escape closes search/results and blurs
        if (e.key === 'Escape') {
            const searchInput = document.getElementById('tocSearch');
            const panel = document.getElementById('searchResults');
            if (document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
                panel.classList.remove('open');
                panel.innerHTML = '';
                filterToc('');
            } else {
                document.querySelector('.sidebar').classList.remove('open');
            }
        }
    });

    // Lazy rendering — defer off-screen sections
    function lazyRenderSections() {
        const content = document.getElementById('content');
        const sections = [];
        let currentSection = null;
        
        Array.from(content.children).forEach(child => {
            if (child.tagName === 'H2' || (child.tagName === 'H1' && child !== content.firstElementChild)) {
                if (currentSection) sections.push(currentSection);
                currentSection = { heading: child, elements: [child] };
            } else if (currentSection) {
                currentSection.elements.push(child);
            }
        });
        if (currentSection) sections.push(currentSection);
        
        // Keep first 3 sections visible, lazy-load rest
        sections.slice(3).forEach(section => {
            const placeholder = document.createElement('div');
            placeholder.className = 'section-lazy-placeholder';
            placeholder.style.minHeight = '200px';
            placeholder.dataset.loaded = 'false';
            
            // Store elements
            const fragment = document.createDocumentFragment();
            section.elements.forEach(el => fragment.appendChild(el));
            placeholder._fragment = fragment;
            placeholder._elements = section.elements;
            
            // Insert placeholder where heading was
            const firstEl = section.elements[0];
            if (firstEl && firstEl.parentNode) {
                // Elements already moved to fragment, insert placeholder
                content.insertBefore(placeholder, content.children[Array.from(content.children).indexOf(firstEl)] || null);
            } else {
                content.appendChild(placeholder);
            }
        });
        
        // IntersectionObserver for lazy loading
        const lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.target.dataset.loaded === 'false') {
                    entry.target.dataset.loaded = 'true';
                    const placeholder = entry.target;
                    if (placeholder._fragment) {
                        placeholder.parentNode.insertBefore(placeholder._fragment, placeholder);
                        placeholder.remove();
                    }
                    lazyObserver.unobserve(entry.target);
                }
            });
        }, { rootMargin: '500px 0px' });
        
        document.querySelectorAll('.section-lazy-placeholder').forEach(p => lazyObserver.observe(p));
    }

    // Enhance active TOC: scroll active link into view & center it
    function enhanceActiveTocScroll() {
        const tocContainer = document.getElementById('tocLinks');
        const sidebar = document.querySelector('.sidebar');
        const mutObs = new MutationObserver(() => {
            const activeLink = tocContainer.querySelector('a.active');
            if (activeLink) {
                const rect = activeLink.getBoundingClientRect();
                const sidebarRect = sidebar.getBoundingClientRect();
                if (rect.top < sidebarRect.top || rect.bottom > sidebarRect.bottom) {
                    activeLink.scrollIntoView({ block: 'center', behavior: 'smooth' });
                }
            }
        });
        mutObs.observe(tocContainer, { subtree: true, attributes: true, attributeFilter: ['class'] });
    }

    // --- Navigation Fix: expand lazy placeholders when navigating ---
    function expandAllLazy() {
        document.querySelectorAll('.section-lazy-placeholder').forEach(placeholder => {
            if (placeholder._fragment && placeholder.dataset.loaded === 'false') {
                placeholder.dataset.loaded = 'true';
                placeholder.parentNode.insertBefore(placeholder._fragment, placeholder);
                placeholder.remove();
            }
        });
    }

    function navigateToId(id) {
        closeSidebarMobile();
        let target = document.getElementById(id);
        if (!target) {
            // Target is inside a lazy placeholder - expand all and retry
            expandAllLazy();
            target = document.getElementById(id);
        }
        if (target) {
            history.pushState(null, '', '#' + id);
            target.scrollIntoView({ behavior: 'smooth', block: 'start' });
            // Re-apply syntax highlighting to newly expanded content
            document.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
        }
    }

    function handleInitialHash() {
        const hash = location.hash.slice(1);
        if (hash) {
            let target = document.getElementById(hash);
            if (!target) {
                expandAllLazy();
                target = document.getElementById(hash);
            }
            if (target) {
                setTimeout(() => target.scrollIntoView({ block: 'start' }), 50);
                document.querySelectorAll('pre code:not(.hljs)').forEach(el => hljs.highlightElement(el));
            }
        }
    }

    window.addEventListener('hashchange', () => {
        const hash = location.hash.slice(1);
        if (hash) navigateToId(hash);
    });

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        renderContent();
        setTimeout(() => {
            buildSearchIndex();
            lazyRenderSections();
            enhanceActiveTocScroll();
            handleInitialHash();
        }, 100);
    });
    </script>
</body>
</html>
