public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        // Tablo
        builder.ToTable("Products", "catalog", t =>
        {
            t.HasComment("Ürün ana tablosu");
        });

        // PK
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Id).ValueGeneratedOnAdd();

        // Özellikler
        builder.Property(p => p.Name)
               .IsRequired()
               .HasMaxLength(200)
               .HasColumnName("ProductName")
               .HasComment("Ürün adı");

        builder.Property(p => p.Price)
               .HasPrecision(18, 2)
               .HasComment("KDV dahil satış fiyatı");

        builder.Property(p => p.CreatedAt)
               .HasDefaultValueSql("GETUTCDATE()")
               .ValueGeneratedOnAdd();

        builder.Property(p => p.RowVersion).IsRowVersion();

        // Index'ler
        builder.HasIndex(p => p.Sku)
               .IsUnique()
               .HasDatabaseName("UX_Products_Sku");

        builder.HasIndex(p => new { p.CategoryId, p.IsActive })
               .HasDatabaseName("IX_Products_Category_Active");

        // İlişki
        builder.HasOne(p => p.Category)
               .WithMany(c => c.Products)
               .HasForeignKey(p => p.CategoryId)
               .OnDelete(DeleteBehavior.Restrict);

        // Owned entity
        builder.OwnsOne(p => p.Dimensions, dim =>
        {
            dim.Property(d => d.Width).HasColumnName("Dim_Width");
            dim.Property(d => d.Height).HasColumnName("Dim_Height");
            dim.Property(d => d.Depth).HasColumnName("Dim_Depth");
        });

        // JSON kolonu
        builder.OwnsMany(p => p.Tags, t => t.ToJson());

        // Global query filter
        builder.HasQueryFilter(p => !p.IsDeleted);

        // Ignore
        builder.Ignore(p => p.DisplayPrice);
    }
}

        convertDetailsToTabs();
        buildToc();
        enhanceBlockquotes();
        styleSectionDividers();
        addCopyButtons();

        // Apply syntax highlighting
        document.querySelectorAll('pre code:not(.hljs)').forEach(el => {
            hljs.highlightElement(el);
        });

        // Setup scroll progress
        setupScrollProgress();
    }

    function convertDetailsToTabs() {
        const content = document.getElementById('content');
        // Find consecutive <details> elements that form provider pairs
        const allDetails = content.querySelectorAll('details');
        const processed = new Set();
        
        allDetails.forEach((detail, idx) => {
            if (processed.has(detail)) return;
            
            const summary = detail.querySelector('summary');
            if (!summary) return;
            
            const summaryText = summary.textContent.trim();
            const isSql = summaryText.includes('SQL Server');
            const isPg = summaryText.includes('PostgreSQL');
            
            if (!isSql && !isPg) return;
            
            // Find the paired detail
            let pair = null;
            let next = detail.nextElementSibling;
            // Skip whitespace text nodes
            while (next && next.nodeType === 3) next = next.nextSibling;
            
            if (next && next.tagName === 'DETAILS') {
                const nextSummary = next.querySelector('summary');
                if (nextSummary) {
                    const nextText = nextSummary.textContent.trim();
                    if ((isSql && nextText.includes('PostgreSQL')) || (isPg && nextText.includes('SQL Server'))) {
                        pair = next;
                    }
                }
            }
            
            if (!pair) {
                // Single details, just style it
                processed.add(detail);
                return;
            }
            
            processed.add(detail);
            processed.add(pair);
            
            // Determine order
            let sqlDetail = isSql ? detail : pair;
            let pgDetail = isSql ? pair : detail;
            
            // Get content (everything except summary)
            const sqlContent = getDetailsContent(sqlDetail);
            const pgContent = getDetailsContent(pgDetail);
            
            // Create tabbed panel
            const panel = document.createElement('div');
            panel.className = 'tabbed-panel';
            
            const panelId = 'tab-' + Math.random().toString(36).substr(2, 9);
            
            panel.innerHTML = `
                <div class="tab-header">
                    <button class="tab-btn ${currentProvider === 'sqlserver' ? 'active' : ''}" 
                            data-provider="sqlserver" data-panel="${panelId}"
                            onclick="switchTab(this, '${panelId}')">SQL Server</button>
                    <button class="tab-btn ${currentProvider === 'postgresql' ? 'active' : ''}" 
                            data-provider="postgresql" data-panel="${panelId}"
                            onclick="switchTab(this, '${panelId}')">PostgreSQL</button>
                </div>
                <div class="tab-content ${currentProvider === 'sqlserver' ? 'active' : ''}" 
                     data-provider="sqlserver" data-panel="${panelId}">${sqlContent}</div>
                <div class="tab-content ${currentProvider === 'postgresql' ? 'active' : ''}" 
                     data-provider="postgresql" data-panel="${panelId}">${pgContent}</div>


            `;
            
            // Replace in DOM
            detail.parentNode.insertBefore(panel, detail);
            detail.remove();
            pair.remove();
            
            // Highlight code in new panel
            panel.querySelectorAll('pre code:not(.hljs)').forEach(el => {
                hljs.highlightElement(el);
            });
        });
    }

    function getDetailsContent(detail) {
        const clone = detail.cloneNode(true);
        const summary = clone.querySelector('summary');
        if (summary) summary.remove();
        return clone.innerHTML;
    }

    function switchTab(btn, panelId) {
        const panel = btn.closest('.tabbed-panel');
        const provider = btn.dataset.provider;
        
        // Update buttons
        panel.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        // Update content
        panel.querySelectorAll('.tab-content').forEach(c => {
            c.classList.toggle('active', c.dataset.provider === provider);
        });
    }

    function switchAll(provider) {
        currentProvider = provider;
        
        // Update global buttons
        document.getElementById('globalSql').className = provider === 'sqlserver' ? 'active-sql' : '';
        document.getElementById('globalPg').className = provider === 'postgresql' ? 'active-pg' : '';
        
        // Switch all tabs
        document.querySelectorAll('.tabbed-panel').forEach(panel => {
            panel.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.provider === provider);
            });
            panel.querySelectorAll('.tab-content').forEach(content => {
                content.classList.toggle('active', content.dataset.provider === provider);
            });
        });
    }

    function buildToc() {
        const headings = document.querySelectorAll('#content h2');
        const allH3 = document.querySelectorAll('#content h3');
        const tocLinks = document.getElementById('tocLinks');
        
        // Level definitions
        const levels = [
            { key: 'basic', label: 'Temel', color: 'var(--green)', cls: 'level-basic' },
            { key: 'mid', label: 'Orta', color: 'var(--yellow)', cls: 'level-mid' },
            { key: 'advanced', label: 'İleri', color: 'var(--orange)', cls: 'level-advanced' },
            { key: 'expert', label: 'Uzman', color: 'var(--red)', cls: 'level-expert' },
            { key: 'ref', label: 'Referans', color: 'var(--accent)', cls: 'level-ref' }
        ];
        
        // Collect items grouped by level
        const groups = { basic: [], mid: [], advanced: [], expert: [], ref: [], other: [] };
        
        // Build a map of h2 elements with their sub-h3 items
        const h2Array = Array.from(headings);
        const h3Array = Array.from(allH3);
        
        headings.forEach((h, i) => {
            const id = 'section-' + i;
            h.id = id;
            let text = h.textContent.replace(/^## /, '');
            
            if (text.trim() === 'İçindekiler') return;
            
            let levelKey = 'other';
            let levelClass = '';
            let levelLabel = '';
            if (text.includes('🟢')) { levelKey = 'basic'; levelClass = 'level-basic'; levelLabel = 'Temel'; }
            else if (text.includes('🟡')) { levelKey = 'mid'; levelClass = 'level-mid'; levelLabel = 'Orta'; }
            else if (text.includes('🟠')) { levelKey = 'advanced'; levelClass = 'level-advanced'; levelLabel = 'İleri'; }
            else if (text.includes('🔴')) { levelKey = 'expert'; levelClass = 'level-expert'; levelLabel = 'Uzman'; }
            else if (text.includes('📋')) { levelKey = 'ref'; levelClass = 'level-ref'; levelLabel = 'Ref'; }
            
            text = text.replace(/[\u{1F300}-\u{1F9FF}\u{2600}-\u{27BF}\u{26A0}\u{2B55}\u{1F4CB}🔶]+\s*/gu, '').trim();
            h.innerHTML = text + (levelLabel ? ` <span class="level-badge ${levelClass}">${levelLabel}</span>` : '');
            
            // Find h3 sub-items between this h2 and the next h2
            const nextH2 = h2Array[i + 1];
            const subItems = [];
            let subIndex = 1;
            
            // Extract the main section number from the h2 text (e.g. "7." from "7. İlişki...")
            const sectionNumMatch = text.match(/^(\d+)\./);
            const sectionNum = sectionNumMatch ? sectionNumMatch[1] : null;
            
            h3Array.forEach((h3, h3i) => {
                // Check if this h3 is between current h2 and next h2
                const isAfterCurrent = h.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_FOLLOWING;
                const isBeforeNext = !nextH2 || (nextH2.compareDocumentPosition(h3) & Node.DOCUMENT_POSITION_PRECEDING);
                
                if (isAfterCurrent && isBeforeNext) {
                    const subId = id + '-sub-' + subIndex;
                    h3.id = subId;
                    let h3Text = h3.textContent.replace(/^### /, '').trim();
                    
                    // Skip TOC-internal headings (like "🟢 Temel (Başlangıç)")
                    if (h3Text.match(/^[🟢🟡🟠🔴📋]/u)) return;
                    
                    // If the h3 already has a sub-number like "18.1", keep it
                    const existingSubNum = h3Text.match(/^(\d+\.\d+)\s/);
                    let displayNum = '';
                    if (existingSubNum) {
                        displayNum = existingSubNum[1];
                        // Don't add extra number, just use the existing text as-is
                        subItems.push({ id: subId, text: h3Text });
                    } else if (sectionNum) {
                        displayNum = sectionNum + '.' + subIndex;
                        // Strip leading "N. " or "N " prefix from h3 text if present
                        let cleanH3Text = h3Text.replace(/^\d+[\.\)]\s*/, '');
                        // Prepend the number to the h3 in the content
                        h3.innerHTML = displayNum + ' ' + h3.innerHTML.replace(/^\d+[\.\)]\s*/, '');
                        subItems.push({ id: subId, text: displayNum + ' ' + cleanH3Text });
                    } else {
                        subItems.push({ id: subId, text: h3Text });
                    }
                    subIndex++;
                }
            });
            
            groups[levelKey].push({ id, text, subItems });
        });
        
        // Build tree HTML
        let html = '';
        // Render "Giriş" and other ungrouped items that appear before numbered sections first
        const introItems = groups.other.filter(item => item.text.includes('Giriş'));
        const trailingOther = groups.other.filter(item => !item.text.includes('Giriş'));
        introItems.forEach(item => {
            html += `<a href="#${item.id}" onclick="closeSidebarMobile()" style="padding-left:1rem;font-weight:600">${item.text}</a>`;
        });
        levels.forEach(level => {
            const items = groups[level.key];
            if (items.length === 0) return;
            html += `<div class="toc-group">`;
            html += `<div class="toc-group-header" onclick="toggleTocGroup(this)">`;
            html += `<span class="toc-chevron">▾</span>`;
            html += `<span class="toc-dot" style="background:${level.color}"></span>`;
            html += `<span>${level.label}</span>`;
            html += `<span class="toc-count">${items.length}</span>`;
            html += `</div>`;
            html += `<div class="toc-group-items">`;
            items.forEach(item => {
                html += `<a href="#${item.id}" onclick="closeSidebarMobile()">${item.text}</a>`;
                if (item.subItems && item.subItems.length > 0) {
                    html += `<div class="toc-sub-container">`;
                    item.subItems.forEach(sub => {
                        html += `<a href="#${sub.id}" class="toc-sub-item" onclick="closeSidebarMobile()">${sub.text}</a>`;
                    });
                    html += `</div>`;
                }
            });
            html += `</div></div>`;
        });
        // Other (ungrouped, excluding intro items already rendered)
        if (trailingOther.length > 0) {
            trailingOther.forEach(item => {
                html += `<a href="#${item.id}" onclick="closeSidebarMobile()" style="padding-left:1rem">${item.text}</a>`;
                if (item.subItems && item.subItems.length > 0) {
                    html += `<div class="toc-sub-container">`;
                    item.subItems.forEach(sub => {
                        html += `<a href="#${sub.id}" class="toc-sub-item" onclick="closeSidebarMobile()">${sub.text}</a>`;
                    });
                    html += `</div>`;
                }
            });
        }
        
        tocLinks.innerHTML = html;
        
        // Intersection observer for active state
        const allObservedHeadings = document.querySelectorAll('#content h2, #content h3');
        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    const id = entry.target.id;
                    document.querySelectorAll('#tocLinks a').forEach(a => {
                        const isActive = a.getAttribute('href') === '#' + id;
                        a.classList.toggle('active', isActive);
                        if (isActive) {
                            // Auto-expand group if active link is in a collapsed group
                            const groupItems = a.closest('.toc-group-items');
                            if (groupItems && groupItems.classList.contains('collapsed')) {
                                groupItems.classList.remove('collapsed');
                                groupItems.previousElementSibling.classList.remove('collapsed');
                            }
                            // Auto-expand section if active sub-item is in a collapsed section
                            const subContainer = a.closest('.toc-sub-container');
                            if (subContainer && subContainer.classList.contains('collapsed')) {
                                subContainer.classList.remove('collapsed');
                                subContainer.previousElementSibling.classList.remove('collapsed');
                            }
                        }
                    });
                }
            });
        }, { rootMargin: '-10% 0px -85% 0px' });
        
        allObservedHeadings.forEach(h => { if (h.id) observer.observe(h); });
    }

    function styleSectionDividers() {
        document.querySelectorAll('#content h1:not(:first-child)').forEach(h1 => {
            const text = h1.textContent;
            if (text.includes('🟢')) h1.classList.add('level-divider-basic');
            else if (text.includes('🟡')) h1.classList.add('level-divider-mid');
            else if (text.includes('🟠')) h1.classList.add('level-divider-advanced');
            else if (text.includes('🔴')) h1.classList.add('level-divider-expert');
            else if (text.includes('📋')) h1.classList.add('level-divider-ref');
        });
    }

    function enhanceBlockquotes() {
        document.querySelectorAll('blockquote').forEach(bq => {
            const text = bq.textContent;
            if (text.startsWith('💡')) {
                bq.classList.add('callout', 'callout-tip');
            } else if (text.startsWith('⚠️')) {
                bq.classList.add('callout', 'callout-warn');
            } else if (text.startsWith('❌') || text.startsWith('🚨')) {
                bq.classList.add('callout', 'callout-danger');
            } else if (text.startsWith('🐘')) {
                bq.classList.add('callout', 'callout-info');
            } else if (text.startsWith('📌')) {
                bq.classList.add('callout', 'callout-info');
            }
        });
    }

    function filterToc(query) {
        const q = query.toLowerCase();
        document.querySelectorAll('#tocLinks .toc-group').forEach(group => {
            const links = group.querySelectorAll('a');
            let anyVisible = false;
            links.forEach(a => {
                const match = a.textContent.toLowerCase().includes(q);
                a.style.display = match ? '' : 'none';
                if (match) anyVisible = true;
            });
            group.style.display = anyVisible ? '' : 'none';
            // Expand groups when searching
            if (q && anyVisible) {
                group.querySelector('.toc-group-header').classList.remove('collapsed');
                group.querySelector('.toc-group-items').classList.remove('collapsed');
            }
            // Show/hide sub-containers based on visible children
            group.querySelectorAll('.toc-sub-container').forEach(container => {
                const subLinks = container.querySelectorAll('a');
                let subVisible = false;
                subLinks.forEach(a => { if (a.style.display !== 'none') subVisible = true; });
                container.style.display = subVisible ? '' : 'none';
            });
        });
        // Also filter ungrouped links
        document.querySelectorAll('#tocLinks > a').forEach(a => {
            const match = a.textContent.toLowerCase().includes(q);
            a.style.display = match ? '' : 'none';
        });
        document.querySelectorAll('#tocLinks > .toc-sub-container').forEach(container => {
            const subLinks = container.querySelectorAll('a');
            let subVisible = false;
            subLinks.forEach(a => {
                const match = a.textContent.toLowerCase().includes(q);
                a.style.display = match ? '' : 'none';
                if (match) subVisible = true;
            });
            container.style.display = subVisible ? '' : 'none';
        });
    }

    function toggleTocGroup(header) {
        header.classList.toggle('collapsed');
        const items = header.nextElementSibling;
        items.classList.toggle('collapsed');
    }



    function closeSidebarMobile() {
        if (window.innerWidth <= 1024) {
            document.querySelector('.sidebar').classList.remove('open');
        }
    }

    function setupScrollProgress() {
        const progressBar = document.getElementById('scrollProgress');
        const backToTop = document.getElementById('backToTop');
        
        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.documentElement.scrollHeight - window.innerHeight;
            const progress = docHeight > 0 ? scrollTop / docHeight : 0;
            progressBar.style.transform = `scaleX(${progress})`;
            
            // Back to top button
            backToTop.classList.toggle('visible', scrollTop > 600);
        }, { passive: true });
    }

    // Sidebar resize
    (function() {
        const handle = document.getElementById('sidebarResizeHandle');
        const sidebar = document.getElementById('sidebar');
        const content = document.querySelector('.content');
        let isResizing = false;

        handle.addEventListener('mousedown', function(e) {
            isResizing = true;
            handle.classList.add('active');
            document.body.style.cursor = 'col-resize';
            document.body.style.userSelect = 'none';
            e.preventDefault();
        });

        document.addEventListener('mousemove', function(e) {
            if (!isResizing) return;
            const newWidth = Math.min(Math.max(e.clientX, 200), 600);
            sidebar.style.width = newWidth + 'px';
            content.style.marginLeft = newWidth + 'px';
            content.style.width = 'calc(100% - ' + newWidth + 'px)';
        });

        document.addEventListener('mouseup', function() {
            if (isResizing) {
                isResizing = false;
                handle.classList.remove('active');
                document.body.style.cursor = '';
                document.body.style.userSelect = '';
            }
        });
    })();

    // ═══ Copy Button ═══
    function addCopyButtons() {
        document.querySelectorAll('#content pre').forEach(pre => {
            if (pre.closest('.code-wrapper')) return;
            const wrapper = document.createElement('div');
            wrapper.className = 'code-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);
            
            const btn = document.createElement('button');
            btn.className = 'copy-btn';
            btn.textContent = 'Kopyala';
            btn.addEventListener('click', () => {
                const code = pre.querySelector('code');
                const text = code ? code.textContent : pre.textContent;
                navigator.clipboard.writeText(text).then(() => {
                    btn.textContent = '✓ Kopyalandı';
                    btn.classList.add('copied');
                    setTimeout(() => { btn.textContent = 'Kopyala'; btn.classList.remove('copied'); }, 2000);
                });
            });
            wrapper.appendChild(btn);
        });
    }

    // ═══ Enhanced Search (headings + content) ═══
    let searchIndex = [];
    function buildSearchIndex() {
        const sections = document.querySelectorAll('#content h2, #content h3');
        searchIndex = [];
        sections.forEach((heading, i) => {
            let textContent = '';
            let el = heading.nextElementSibling;
            const nextHeading = sections[i + 1];
            while (el && el !== nextHeading) {
                textContent += ' ' + el.textContent;
                el = el.nextElementSibling;
            }
            searchIndex.push({
                id: heading.id,
                title: heading.textContent.replace(/Temel|Orta|İleri|Uzman|Ref/g, '').trim(),
                content: textContent.substring(0, 500).toLowerCase(),
                heading: heading
            });
        });
    }

    let searchTimeout = null;
    function handleSearch(query) {
        clearTimeout(searchTimeout);
        const q = query.trim().toLowerCase();
        const panel = document.getElementById('searchResults');
        
        // Also filter TOC (existing behavior)
        filterToc(query);
        
        if (q.length < 2) {
            panel.classList.remove('open');
            panel.innerHTML = '';
            return;
        }
        
        searchTimeout = setTimeout(() => {
            const results = [];
            const terms = q.split(/\s+/);
            
            searchIndex.forEach(item => {
                const titleLower = item.title.toLowerCase();
                const matchesTitle = terms.every(t => titleLower.includes(t));
                const matchesContent = terms.every(t => item.content.includes(t));
                
                if (matchesTitle || matchesContent) {
                    let snippet = '';
                    if (matchesContent && !matchesTitle) {
                        const idx = item.content.indexOf(terms[0]);
                        const start = Math.max(0, idx - 30);
                        const end = Math.min(item.content.length, idx + 60);
                        snippet = '...' + item.content.substring(start, end) + '...';
                        terms.forEach(t => {
                            snippet = snippet.replace(new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi'), '<mark>$&</mark>');
                        });
                    }
                    results.push({ ...item, snippet, isTitle: matchesTitle });
                }
            });
            
            results.sort((a, b) => (b.isTitle ? 1 : 0) - (a.isTitle ? 1 : 0));
            
            if (results.length === 0) {
                panel.innerHTML = '<div class="search-info">Sonuç bulunamadı</div>';
            } else {
                panel.innerHTML = `<div class="search-info">${results.length} sonuç</div>` +
                    results.slice(0, 15).map(r => 
                        `<a href="#${r.id}" class="search-result-item" onclick="closeSidebarMobile()">
                            <span class="result-section">${r.title}</span>
                            ${r.snippet ? `<span class="result-snippet">${r.snippet}</span>` : ''}
                        </a>`
                    ).join('');
            }
            panel.classList.add('open');
        }, 200);
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
        // "/" focuses search (unless typing in input)
        if (e.key === '/' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
            e.preventDefault();
            const searchInput = document.getElementById('tocSearch');
            searchInput.focus();
            document.querySelector('.sidebar').classList.add('open');
        }
        // Escape closes search/results and blurs
        if (e.key === 'Escape') {
            const searchInput = document.getElementById('tocSearch');
            const panel = document.getElementById('searchResults');
            if (document.activeElement === searchInput) {
                searchInput.value = '';
                searchInput.blur();
                panel.classList.remove('open');
                panel.innerHTML = '';
                filterToc('');
            } else {
                document.querySelector('.sidebar').classList.remove('open');
            }
        }
    });

    // Lazy rendering — defer off-screen sections
    function lazyRenderSections() {
        const content = document.getElementById('content');
        const sections = [];
        let currentSection = null;
        
        Array.from(content.children).forEach(child => {
            if (child.tagName === 'H2' || (child.tagName === 'H1' && child !== content.firstElementChild)) {
                if (currentSection) sections.push(currentSection);
                currentSection = { heading: child, elements: [child] };
            } else if (currentSection) {
                currentSection.elements.push(child);
            }
        });
        if (currentSection) sections.push(currentSection);
        
        // Keep first 3 sections visible, lazy-load rest
        sections.slice(3).forEach(section => {
            const placeholder = document.createElement('div');
            placeholder.className = 'section-lazy-placeholder';
            placeholder.style.minHeight = '200px';
            placeholder.dataset.loaded = 'false';
            
            // Store elements
            const fragment = document.createDocumentFragment();
            section.elements.forEach(el => fragment.appendChild(el));
            placeholder._fragment = fragment;
            placeholder._elements = section.elements;
            
            // Insert placeholder where heading was
            const firstEl = section.elements[0];
            if (firstEl && firstEl.parentNode) {
                // Elements already moved to fragment, insert placeholder
                content.insertBefore(placeholder, content.children[Array.from(content.children).indexOf(firstEl)] || null);
            } else {
                content.appendChild(placeholder);
            }
        });
        
        // IntersectionObserver for lazy loading
        const lazyObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting && entry.target.dataset.loaded === 'false') {
                    entry.target.dataset.loaded = 'true';
                    const placeholder = entry.target;
                    if (placeholder._fragment) {
                        placeholder.parentNode.insertBefore(placeholder._fragment, placeholder);
                        placeholder.remove();
                    }
                    lazyObserver.unobserve(entry.target);
                }
            });
        }, { rootMargin: '500px 0px' });
        
        document.querySelectorAll('.section-lazy-placeholder').forEach(p => lazyObserver.observe(p));
    }

    // Enhance active TOC: scroll active link into view
    function enhanceActiveTocScroll() {
        const tocContainer = document.getElementById('tocLinks');
        const mutObs = new MutationObserver(() => {
            const activeLink = tocContainer.querySelector('a.active');
            if (activeLink) {
                const rect = activeLink.getBoundingClientRect();
                const containerRect = tocContainer.getBoundingClientRect();
                if (rect.top < containerRect.top || rect.bottom > containerRect.bottom) {
                    activeLink.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
                }
            }
        });
        mutObs.observe(tocContainer, { subtree: true, attributes: true, attributeFilter: ['class'] });
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
        renderContent();
        setTimeout(() => {
            lazyRenderSections();
            buildSearchIndex();
