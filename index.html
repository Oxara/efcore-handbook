### 🆕 EF Core 10 (GA): ExecuteUpdate ile JSON Property Güncelleme

\`\`\`csharp
// JSON içindeki tek bir alanı toplu güncelleme (Complex Type olarak map edilmişse):
// Önkoşul: ComplexProperty + ToJson() kullanılmalı (Owned Entity ile çalışmaz!)
modelBuilder.Entity<Blog>().ComplexProperty(b => b.Details, bd => bd.ToJson());

// Toplu güncelleme — JSON içindeki Views alanını +1 artır
await context.Blogs.ExecuteUpdateAsync(s =>
    s.SetProperty(b => b.Details.Views, b => b.Details.Views + 1));
\`\`\`

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- SQL Server 2025 (native json tipi ile):
UPDATE [b]
SET [Details].modify('$.Views', JSON_VALUE([b].[Details], '$.Views' RETURNING int) + 1)
FROM [Blogs] AS [b];

-- SQL Server eski sürüm (nvarchar JSON):
UPDATE [b]
SET [Details] = JSON_MODIFY([b].[Details], '$.Views', JSON_VALUE([b].[Details], '$.Views') + 1)
FROM [Blogs] AS [b];
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- PostgreSQL: jsonb_set ile partial update

SET details = jsonb_set(details, '{Views}', ((details->>'Views')::int + 1)::text::jsonb)
;

## 29. Primitive Collections — EF Core 8+ 🔴

\`List<string>\`, \`int[]\`, \`List<DayOfWeek>\` gibi basit tip koleksiyonları artık ayrı tablo gerektirmeden JSON sütununa otomatik saklanır. Tags, roller, izin listeleri gibi basit diziler için ayrı ilişki tablosu açmak yerine bu özelliği kullan.

#### Kullanım

\`\`\`csharp
public class Post
{
    public int Id { get; set; }
    public string Title { get; set; }
    public string[] Tags { get; set; }         // JSON array olarak saklanır
    public List<int> LikedByUserIds { get; set; }
}

// Yapılandırma (genellikle convention yeterli)
builder.PrimitiveCollection(p => p.Tags)
       .HasMaxLength(1000);

// Sorgulama (LINQ → SQL çevrimi)
var tagged = context.Posts
    .Where(p => p.Tags.Contains("efcore"))
    .ToList();
\`\`\`

**📌 Tabloda nasıl görünür:**

| Id | Title | Tags | LikedByUserIds |
|----|-------|------|----------------|
| 1 | EF Core 8 Yenilikleri | \`["efcore","dotnet","csharp"]\` | \`[1,5,12,28]\` |
| 2 | React ile SPA | \`["react","frontend"]\` | \`[3,7]\` |

**📌 Contains sorgusu SQL'e nasıl çevrilir:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
-- .Where(p => p.Tags.Contains("efcore"))
SELECT [p].[Id], [p].[Title], [p].[Tags], [p].[LikedByUserIds]
FROM [Posts] AS [p]
WHERE N'efcore' IN (
    SELECT [t].[value] FROM OPENJSON([p].[Tags]) WITH ([value] NVARCHAR(MAX) '$') AS [t]
);
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
-- .Where(p => p.Tags.Contains("efcore"))
SELECT p.id, p.title, p.tags, p.liked_by_user_ids
FROM posts AS p
WHERE p.tags @> '["efcore"]';  -- jsonb contains operatörü (GIN index destekli)

-- Veya array tipinde saklanıyorsa:
-- WHERE 'efcore' = ANY(p.tags);  -- native array operatörü
\`\`\`

</details>

### Desteklenen LINQ Operasyonları

\`\`\`csharp
// Contains — dizide eleman var mı
context.Posts.Where(p => p.Tags.Contains("efcore"));

// Count — dizi uzunluğu
context.Posts.Where(p => p.LikedByUserIds.Count > 5);

// Any — koşullu kontrol
context.Posts.Where(p => p.Tags.Any(t => t.StartsWith("dot")));

// Indexer — belirli pozisyon (EF Core 8+)
context.Posts.OrderBy(p => p.Tags[0]);  // İlk tag'e göre sırala
\`\`\`

### EF Core 8 Öncesi — Manual JSON Conversion

\`\`\`csharp
// EF Core 7 ve öncesinde bu tip koleksiyonlar için manual converter gerekiyordu:
builder.Property(p => p.Tags)
    .HasConversion(
        v => JsonSerializer.Serialize(v, (JsonSerializerOptions?)null),
        v => JsonSerializer.Deserialize<string[]>(v, (JsonSerializerOptions?)null)!)
    .HasColumnType("nvarchar(max)");
// EF Core 8+ → bunlara gerek yok, PrimitiveCollection otomatik halleder
\`\`\`

### Primitive Collection vs JSON Column vs Ayrı Tablo

| Yöntem | Ne Zaman | LINQ Desteği | Performans |
|--------|----------|:------------:|:----------:|
| \`PrimitiveCollection\` (EF8+) | Basit liste (string, int) | ✅ Contains, Count, Any | 🟡 OPENJSON overhead |
| JSON Column (\`ToJson()\`) | Kompleks nested nesne | ✅ Full LINQ | 🟡 Parse overhead |
| Ayrı tablo (1-N ilişki) | Büyük veri, index gerekli | ✅ Full | ✅ En hızlı (index) |

<details>
<summary><b>🐘 PostgreSQL Native Array Desteği</b></summary>

> 🐘 **PostgreSQL Büyük Avantaj — Native Array Desteği:**
> - SQL Server'da \`PrimitiveCollection\` → \`NVARCHAR(MAX)\` + \`OPENJSON\` ile sorgulanır (yavaş)
> - PostgreSQL'de **native array tipi** vardır: \`text[]\`, \`int[]\`, \`uuid[]\` — JSON'a gerek yok!
> - Native array üzerine **GIN index** konulabilir → \`@>\` (contains) sorguları index kullanır
> - EF Core Npgsql, \`List<string>\` / \`string[]\` → otomatik \`text[]\` olarak map eder

\`\`\`csharp
// PostgreSQL — Native Array (JSON değil!)
public class Post
{
    public int Id { get; set; }
    public string Title { get; set; }
    public string[] Tags { get; set; }         // PG: text[] (native array)
    public List<int> LikedByUserIds { get; set; } // PG: integer[]
}

// Configuration (Npgsql otomatik yapar ama açık belirtilebilir):
builder.Property(p => p.Tags)
       .HasColumnType("text[]");

builder.Property(p => p.LikedByUserIds)
       .HasColumnType("integer[]");

// GIN index ile hızlı array arama:
builder.HasIndex(p => p.Tags).HasMethod("gin");
\`\`\`

\`\`\`sql
-- PostgreSQL'de oluşan tablo:
CREATE TABLE posts (
    id                INT GENERATED ALWAYS AS IDENTITY,
    title             TEXT NOT NULL,
    tags              TEXT[]    NULL,      -- Native array! JSON değil!
    liked_by_user_ids INTEGER[] NULL,
    CONSTRAINT pk_posts PRIMARY KEY (id)
);

-- GIN index:
CREATE INDEX ix_posts_tags ON posts USING gin (tags);

-- EF sorgusu: .Where(p => p.Tags.Contains("efcore"))
-- PostgreSQL çıktısı (OPENJSON yerine native operatör!):
SELECT p.id, p.title, p.tags, p.liked_by_user_ids
FROM posts AS p
WHERE p.tags @> ARRAY['efcore']::text[];  -- @> = contains, GIN index kullanır!

-- Diğer array operatörleri:
WHERE tags && ARRAY['efcore','dotnet']  -- overlap (herhangi biri var mı)
WHERE 'efcore' = ANY(tags)              -- ANY ile eleman kontrolü
WHERE array_length(liked_by_user_ids, 1) > 5  -- Count karşılığı
\`\`\`

> 💡 **Performans farkı:** SQL Server'da \`OPENJSON\` her sorgu için JSON parse eder. PostgreSQL'de native array operatörleri GIN index ile **O(1)** erişim sağlar — büyük veri setlerinde dramatik fark yaratır.

</details>

## 30. Interceptors 🔴

EF Core'un veritabanı işlemlerine (SaveChanges, komut çalıştırma, bağlantı açma) araya girme mekanizması. Audit logging, soft delete otomasyonu, slow query loglama, query manipulation gibi cross-cutting concern'leri merkezi bir noktada çözer — her repository'ye kod yazmak yerine.

### Interceptor Türleri

| Interceptor | Ne Zaman Çalışır | Kullanım Alanı |
|-------------|-------------------|----------------|
| \`SaveChangesInterceptor\` | SaveChanges öncesi/sonrası | Audit log, soft delete, timestamp |
| \`DbCommandInterceptor\` | SQL komutu çalışmadan önce/sonra | Query logging, slow query alert |
| \`DbConnectionInterceptor\` | Bağlantı açılma/kapanma | Connection telemetry |
| \`DbTransactionInterceptor\` | Transaction başlangıç/bitiş | Distributed tracing |

### SaveChangesInterceptor — Audit Log

\`\`\`csharp
// Entity'lere ortak interface
public interface IAuditable
{
    DateTime CreatedAt { get; set; }
    string CreatedBy { get; set; }
    DateTime? UpdatedAt { get; set; }
    string? UpdatedBy { get; set; }
}

// Interceptor implementasyonu
public class AuditInterceptor : SaveChangesInterceptor
{
    private readonly ICurrentUserService _currentUser;

    public AuditInterceptor(ICurrentUserService currentUser)
    {
        _currentUser = currentUser;
    }

    public override ValueTask<InterceptionResult<int>> SavingChangesAsync(
        DbContextEventData eventData,
        InterceptionResult<int> result,
        CancellationToken cancellationToken = default)
    {
        var context = eventData.Context!;
        var now = DateTime.UtcNow;
        var user = _currentUser.UserId;

        foreach (var entry in context.ChangeTracker.Entries<IAuditable>())
        {
            switch (entry.State)
            {
                case EntityState.Added:
                    entry.Entity.CreatedAt = now;
                    entry.Entity.CreatedBy = user;
                    break;

                case EntityState.Modified:
                    entry.Entity.UpdatedAt = now;
                    entry.Entity.UpdatedBy = user;
                    break;
            }
        }

        return base.SavingChangesAsync(eventData, result, cancellationToken);
    }
}
\`\`\`

### DbCommandInterceptor — Slow Query Logger

\`\`\`csharp
public class SlowQueryInterceptor : DbCommandInterceptor
{
    private readonly ILogger<SlowQueryInterceptor> _logger;
    private const int SlowThresholdMs = 500;

    public SlowQueryInterceptor(ILogger<SlowQueryInterceptor> logger)
    {
        _logger = logger;
    }

    public override ValueTask<DbDataReader> ReaderExecutedAsync(
        DbCommand command,
        CommandExecutedEventData eventData,
        DbDataReader result,
        CancellationToken cancellationToken = default)
    {
        if (eventData.Duration.TotalMilliseconds > SlowThresholdMs)
        {
            _logger.LogWarning(
                "🐢 SLOW QUERY ({Duration}ms): {Sql}",
                eventData.Duration.TotalMilliseconds,
                command.CommandText);
        }

        return new ValueTask<DbDataReader>(result);
    }
}
\`\`\`

### Kayıt (Registration)

\`\`\`csharp
// Program.cs
builder.Services.AddDbContext<AppDbContext>((sp, options) =>
{
    options.UseSqlServer(connectionString)
           .AddInterceptors(
               sp.GetRequiredService<AuditInterceptor>(),
               sp.GetRequiredService<SlowQueryInterceptor>());
});

// DI kaydı
builder.Services.AddScoped<AuditInterceptor>();
builder.Services.AddSingleton<SlowQueryInterceptor>();
\`\`\`

> ⚠️ **Dikkat:** \`SaveChangesInterceptor\` → Scoped (user bilgisi gerekir).  
> \`DbCommandInterceptor\` → Singleton olabilir (stateless ise).

## 31. Temporal Tables — Zamansal Tablolar 🔴🔶

SQL Server'ın built-in özelliği — her satırın tüm geçmiş versiyonlarını otomatik saklar. "Bu müşterinin adresi 3 ay önce neydi?" gibi sorulara cevap verir. EF Core 6+ ile LINQ'tan doğrudan zaman yolculuğu sorguları yapabilirsin.  
> "Bu müşterinin adresi 3 ay önce neydi?" gibi sorulara doğrudan cevap verebilirsiniz.

### Yapılandırma

\`\`\`csharp
// Entity
public class Customer
{
    public int Id { get; set; }
    public string Name { get; set; } = null!;
    public string Email { get; set; } = null!;
    public string Address { get; set; } = null!;

    // EF Core bunları otomatik ekler (opsiyonel — görmek istersen tanımla)
    public DateTime PeriodStart { get; set; }
    public DateTime PeriodEnd { get; set; }
}

// Configuration
public class CustomerConfiguration : IEntityTypeConfiguration<Customer>
{
    public void Configure(EntityTypeBuilder<Customer> builder)
    {
        builder.ToTable("Customers", t => t.IsTemporal(temporal =>
        {
            temporal.HasPeriodStart("PeriodStart");
            temporal.HasPeriodEnd("PeriodEnd");
            temporal.UseHistoryTable("CustomersHistory", "audit");
        }));
    }
}
\`\`\`

### SQL Çıktısı

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
CREATE TABLE [dbo].[Customers] (
    [Id]          INT            IDENTITY(1,1) NOT NULL,
    [Name]        NVARCHAR(MAX)  NOT NULL,
    [Email]       NVARCHAR(MAX)  NOT NULL,
    [Address]     NVARCHAR(MAX)  NOT NULL,
    [PeriodStart] DATETIME2      GENERATED ALWAYS AS ROW START NOT NULL,
    [PeriodEnd]   DATETIME2      GENERATED ALWAYS AS ROW END NOT NULL,
    PERIOD FOR SYSTEM_TIME ([PeriodStart], [PeriodEnd]),
    CONSTRAINT [PK_Customers] PRIMARY KEY ([Id])
) WITH (SYSTEM_VERSIONING = ON (HISTORY_TABLE = [audit].[CustomersHistory]));
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
-- PostgreSQL'de SQL Server'ın SYSTEM_VERSIONING özelliği YOKTUR.
-- Alternatif: Trigger-based history table

CREATE TABLE customers (
    id       INTEGER GENERATED ALWAYS AS IDENTITY,
    name     TEXT NOT NULL,
    email    TEXT NOT NULL,
    address  TEXT NOT NULL,
    CONSTRAINT pk_customers PRIMARY KEY (id)
);

CREATE TABLE customers_history (
    history_id   SERIAL PRIMARY KEY,
    customer_id  INTEGER NOT NULL,
    name         TEXT,
    email        TEXT,
    address      TEXT,
    valid_from   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    valid_to     TIMESTAMPTZ NOT NULL DEFAULT 'infinity',
    operation    TEXT NOT NULL  -- 'INSERT','UPDATE','DELETE'
);

-- Trigger fonksiyonu ile otomatik history tracking:
CREATE OR REPLACE FUNCTION track_customer_changes()
RETURNS TRIGGER AS $$
BEGIN
    IF TG_OP = 'UPDATE' THEN
        UPDATE customers_history SET valid_to = NOW()
        WHERE customer_id = OLD.id AND valid_to = 'infinity';
        INSERT INTO customers_history (customer_id, name, email, address, operation)
        VALUES (NEW.id, NEW.name, NEW.email, NEW.address, 'UPDATE');
    ELSIF TG_OP = 'INSERT' THEN
        INSERT INTO customers_history (customer_id, name, email, address, operation)
        VALUES (NEW.id, NEW.name, NEW.email, NEW.address, 'INSERT');
    END IF;
    RETURN NEW;
END;
$$ LANGUAGE plpgsql;

CREATE TRIGGER trg_customer_history
    AFTER INSERT OR UPDATE OR DELETE ON customers
    FOR EACH ROW EXECUTE FUNCTION track_customer_changes();
\`\`\`

</details>

### Zaman Yolculuğu Sorguları

\`\`\`csharp
// Belirli bir andaki hali
var customerInPast = await context.Customers
    .TemporalAsOf(new DateTime(2024, 1, 15, 0, 0, 0, DateTimeKind.Utc))
    .FirstOrDefaultAsync(c => c.Id == 42);

// Tüm değişiklik geçmişi
var history = await context.Customers
    .TemporalAll()
    .Where(c => c.Id == 42)
    .OrderBy(c => EF.Property<DateTime>(c, "PeriodStart"))
    .Select(c => new
    {
        c.Name,
        c.Address,
        ValidFrom = EF.Property<DateTime>(c, "PeriodStart"),
        ValidTo = EF.Property<DateTime>(c, "PeriodEnd")
    })
    .ToListAsync();

// Belirli tarih aralığındaki versiyonlar
var changes = await context.Customers
    .TemporalBetween(startDate, endDate)
    .Where(c => c.Id == 42)
    .ToListAsync();

// İki tarih arasında aktif olan kayıtlar
var overlapping = await context.Customers
    .TemporalFromTo(startDate, endDate)
    .ToListAsync();
\`\`\`

### Oluşan SQL (TemporalAll)

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
SELECT [c].[Id], [c].[Name], [c].[Address], [c].[PeriodStart], [c].[PeriodEnd]
FROM [dbo].[Customers] FOR SYSTEM_TIME ALL AS [c]
WHERE [c].[Id] = 42
ORDER BY [c].[PeriodStart]
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

> ⚠️ PostgreSQL'de \`FOR SYSTEM_TIME\` **yoktur**. Aşağıdaki trigger-based history tablosu ile benzer sonuç elde edilir:

\`\`\`sql
SELECT c.id, c.name, c.address, c.valid_from, c.valid_to
FROM customers_history AS c
WHERE c.id = 42
ORDER BY c.valid_from;
\`\`\`

</details>

### Örnek Geçmiş Verisi

| Id | Name | Address | PeriodStart | PeriodEnd |
|----|------|---------|-------------|-----------|
| 42 | Ahmet Yılmaz | Kadıköy, İstanbul | 2024-01-01 | 2024-03-15 |
| 42 | Ahmet Yılmaz | Beşiktaş, İstanbul | 2024-03-15 | 2024-06-20 |
| 42 | Ahmet Yılmaz | Sarıyer, İstanbul | 2024-06-20 | 9999-12-31 |

>  **PostgreSQL'de Temporal Tables:**
> - PostgreSQL'de SQL Server'ın \`SYSTEM_VERSIONING\` özelliği **yoktur**
> - \`IsTemporal()\` API'si PostgreSQL'de **çalışmaz** — bu tamamen SQL Server'a özgü
> - Alternatif çözümler:

\`\`\`csharp
// PostgreSQL Alternatif 1: Trigger-based history table
// History tablosu ayrı entity olarak tanımlanır:
public class CustomerHistory
{
    public int HistoryId { get; set; }
    public int CustomerId { get; set; }
    public string Name { get; set; }
    public string Address { get; set; }
    public DateTime ValidFrom { get; set; }
    public DateTime ValidTo { get; set; }
    public string Operation { get; set; }  // INSERT, UPDATE, DELETE
}
\`\`\`

\`\`\`sql
-- PostgreSQL: Trigger ile otomatik history
CREATE TABLE customers_history (
    history_id   SERIAL PRIMARY KEY,
    customer_id  INT NOT NULL,
    name         TEXT,
    address      TEXT,
    valid_from   TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    valid_to     TIMESTAMPTZ NOT NULL DEFAULT 'infinity',
    operation    TEXT NOT NULL  -- 'INSERT','UPDATE','DELETE'
);

-- Trigger fonksiyonu:
CREATE OR REPLACE FUNCTION track_customer_changes()
RETURNS TRIGGER AS $$
BEGIN
    IF TG_OP = 'UPDATE' THEN
        -- Eski kaydı kapat
        UPDATE customers_history
        SET valid_to = NOW()
        WHERE customer_id = OLD.id AND valid_to = 'infinity';
        -- Yeni kayıt ekle
        INSERT INTO customers_history (customer_id, name, address, operation)
        VALUES (NEW.id, NEW.name, NEW.address, 'UPDATE');
    ELSIF TG_OP = 'INSERT' THEN
        INSERT INTO customers_history (customer_id, name, address, operation)
        VALUES (NEW.id, NEW.name, NEW.address, 'INSERT');
    ELSIF TG_OP = 'DELETE' THEN
        UPDATE customers_history
        SET valid_to = NOW()
        WHERE customer_id = OLD.id AND valid_to = 'infinity';
    END IF;
    RETURN NEW;
END;
$$ LANGUAGE plpgsql;

CREATE TRIGGER trg_customer_history
    AFTER INSERT OR UPDATE OR DELETE ON customers
    FOR EACH ROW EXECUTE FUNCTION track_customer_changes();

-- Sorgulama (SQL Server'ın FOR SYSTEM_TIME ALL karşılığı):
SELECT * FROM customers_history
WHERE customer_id = 42
ORDER BY valid_from;
\`\`\`

> 💡 **PostgreSQL alternatifleri özet:**
> | Yöntem | Avantaj | Dezavantaj |
> |--------|---------|-----------|
> | Trigger + history table | Tam kontrol, özelleştirilebilir | Manuel kurulum |
> | \`pgAudit\` extension | DML/DDL seviyesinde log | Sütun bazlı geçmiş yok |
> | EF Interceptor (Bölüm 30) | Provider bağımsız | Uygulama seviyesinde |
> | \`temporal_tables\` extension | SQL Server benzeri syntax | Community, resmi değil |

## 32. Keyless Entities — View & SP Mapping 🔴

Primary key'i olmayan sonuç setlerini (View'lar, Stored Procedure sonuçları, Raw SQL DTO'ları) EF Core modeline map eder. \`HasNoKey()\` ile tanımlanır, Change Tracking yapılmaz, salt okunurdur.

### View Mapping

\`\`\`csharp
// DTO (keyless)
public class ProductSummary
{
    public int CategoryId { get; set; }
    public string CategoryName { get; set; } = null!;
    public int ProductCount { get; set; }
    public decimal AvgPrice { get; set; }
    public decimal MaxPrice { get; set; }
}

// Configuration
public class ProductSummaryConfiguration : IEntityTypeConfiguration<ProductSummary>
{
    public void Configure(EntityTypeBuilder<ProductSummary> builder)
    {
        builder.HasNoKey();
        builder.ToView("vw_ProductSummary", "catalog");
    }
}

// DbContext'e ekle
public DbSet<ProductSummary> ProductSummaries { get; set; }
\`\`\`

### SQL View

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
CREATE VIEW [catalog].[vw_ProductSummary] AS
SELECT 
    c.Id AS CategoryId,
    c.Name AS CategoryName,
    COUNT(p.Id) AS ProductCount,
    AVG(p.Price) AS AvgPrice,
    MAX(p.Price) AS MaxPrice
FROM catalog.Categories c
LEFT JOIN catalog.Products p ON p.CategoryId = c.Id
WHERE p.IsDeleted = 0
GROUP BY c.Id, c.Name;
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
CREATE VIEW catalog.vw_product_summary AS
SELECT 
    c.id AS category_id,
    c.name AS category_name,
    COUNT(p.id) AS product_count,
    AVG(p.price) AS avg_price,
    MAX(p.price) AS max_price
FROM catalog.categories c
LEFT JOIN catalog.products p ON p.category_id = c.id
WHERE p.is_deleted = FALSE
GROUP BY c.id, c.name;
\`\`\`

</details>

### Kullanım

\`\`\`csharp
// View üzerinden sorgulama (sadece okuma — insert/update/delete yapılamaz!)
var summaries = await context.ProductSummaries
    .Where(s => s.ProductCount > 5)
    .OrderByDescending(s => s.AvgPrice)
    .ToListAsync();
\`\`\`

### Stored Procedure Sonucu

## 33. Connection Resiliency & DbContext Pooling 🔴

Bulut ortamlarında geçici ağ hataları kaçınılmaz. Retry mekanizması yoksa uygulama ilk geçici hatada çöker. Connection Resiliency otomatik yeniden deneme sağlar; DbContext Pooling ise context nesne oluşturma maliyetini azaltarak throughput artırır.

### Connection Resiliency (Bağlantı Dayanıklılığı)

\`\`\`csharp
// Program.cs — retry stratejisi
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseSqlServer(connectionString, sqlOptions =>
    {
        sqlOptions.EnableRetryOnFailure(
            maxRetryCount: 5,                         // Maks deneme
            maxRetryDelay: TimeSpan.FromSeconds(30),  // Denemeler arası maks bekleme
            errorNumbersToAdd: null);                 // Ek SQL error code'ları
    }));
\`\`\`

### Özel Retry Stratejisi

\`\`\`csharp
// Kendi execution strategy'nizi yazabilirsiniz
public class CustomRetryStrategy : SqlServerRetryingExecutionStrategy
{
    public CustomRetryStrategy(DbContext context)
        : base(context, maxRetryCount: 3, maxRetryDelay: TimeSpan.FromSeconds(10),
               errorNumbersToAdd: new[] { 4060, 4221 }) // Login failed, timeout
    { }

    protected override bool ShouldRetryOn(Exception exception)
    {
        // Özel logic: sadece belirli hatalarda retry yap
        if (exception is SqlException sqlEx)
        {
            // Deadlock (1205) ve Timeout (-2)
            return sqlEx.Number is 1205 or -2;
        }
        return base.ShouldRetryOn(exception);
    }
}

// Kullanım
options.UseSqlServer(connectionString, sql =>
    sql.ExecutionStrategy(ctx => new CustomRetryStrategy(ctx)));
\`\`\`

### Manual Transaction ile Retry

\`\`\`csharp
// ⚠️ Retry etkin ise, transaction'lar özel handling gerektirir!
var strategy = context.Database.CreateExecutionStrategy();

await strategy.ExecuteAsync(async () =>
{
    await using var transaction = await context.Database.BeginTransactionAsync();
    try
    {
        // İşlemler...
        context.Orders.Add(order);
        await context.SaveChangesAsync();

        context.Inventory.Update(stock);
        await context.SaveChangesAsync();

        await transaction.CommitAsync();
    }
    catch
    {
        await transaction.RollbackAsync();
        throw;
    }
});
\`\`\`

### İdempotency Kuralları

Retry mekanizması aynı işlemi tekrar çalıştırabileceği için işlemlerin idempotent olması gerekir:

| Kural | Neden |
|-------|-------|
| Unique constraint + upsert | Retry aynı INSERT'i tekrar çalıştırabilir |
| Idempotency key (request ID) | Aynı işlemin 2 kez uygulanmasını engeller |
| SELECT before INSERT | Retry'da "zaten var" kontrolü |

\`\`\`csharp
// İdempotent kayıt oluşturma
var strategy = context.Database.CreateExecutionStrategy();

await strategy.ExecuteAsync(async () =>
{
    var exists = await context.Payments
        .AnyAsync(p => p.IdempotencyKey == request.RequestId);

    if (!exists)
    {
        context.Payments.Add(new Payment
        {
            IdempotencyKey = request.RequestId,
            Amount = request.Amount,
            OrderId = request.OrderId
        });
        await context.SaveChangesAsync();
    }
});
\`\`\`

### Retry Davranışı (Exponential Backoff)

\`\`\`
Deneme 1 → Hata (transient) → Bekle ~1s
Deneme 2 → Hata (transient) → Bekle ~3s  (exponential backoff + jitter)
Deneme 3 → Hata (transient) → Bekle ~7s
Deneme 4 → Başarılı ✓
\`\`\`

> 💡 EF retry **sadece transient** hatalar için çalışır. Constraint violation, syntax error gibi kalıcı hatalar anında fırlatılır.

### Advanced: Built-in vs Polly Karşılaştırması

| Özellik | EF Core Built-in | Microsoft.Extensions.Resilience (Polly v8) |
|---------|:----------------:|:-------------------------------------------:|
| Retry | ✅ | ✅ |
| Circuit Breaker | ❌ | ✅ |
| Timeout | ❌ | ✅ |
| Fallback | ❌ | ✅ |
| Hedging (parallel request) | ❌ | ✅ |
| Bulkhead (concurrency limit) | ❌ | ✅ |
| Telemetry entegrasyonu | Temel | ✅ OpenTelemetry native |

**Ne zaman Polly gerekir?**
- Circuit breaker lazımsa (DB sürekli down → fast-fail, cascade engelle)
- Timeout kontrolü istiyorsan (EF retry sonsuza kadar bekleyebilir)
- Fallback stratejisi (read-replica'ya düş, cache'den oku)
- Multi-service senaryosu (HTTP + DB + Redis hepsi aynı pipeline'da)

\`\`\`csharp
// NuGet: Microsoft.Extensions.Resilience (>= 8.0.0)
// Gereksinim: .NET 8+ ve Polly v8

// EF Core execution strategy'yi KAPAT, Polly'ye devret:
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseSqlServer(connectionString, sql =>
        sql.ExecutionStrategy(deps => new NonRetryingExecutionStrategy(deps))));

// Polly pipeline tanımla:
builder.Services.AddResiliencePipeline("db-pipeline", pipeline =>
{
    pipeline
        .AddRetry(new RetryStrategyOptions
        {
            MaxRetryAttempts = 5,
            BackoffType = DelayBackoffType.Exponential,
            ShouldHandle = new PredicateBuilder().Handle<SqlException>(ex => ex.IsTransient)
        })
        .AddCircuitBreaker(new CircuitBreakerStrategyOptions
        {
            FailureRatio = 0.5,
            SamplingDuration = TimeSpan.FromSeconds(10),
            MinimumThroughput = 8,
            BreakDuration = TimeSpan.FromSeconds(30)
        })
        .AddTimeout(TimeSpan.FromSeconds(15));
});

// Kullanım:
public class OrderService
{
    private readonly ResiliencePipeline _pipeline;
    private readonly AppDbContext _context;

    public OrderService(
        [FromKeyedServices("db-pipeline")] ResiliencePipeline pipeline,
        AppDbContext context)
    {
        _pipeline = pipeline;
        _context = context;
    }

    public async Task<Order?> GetOrderAsync(int id)
    {
        return await _pipeline.ExecuteAsync(async ct =>
            await _context.Orders.FindAsync([id], ct),
            CancellationToken.None);
    }
}
\`\`\`

> 💡 **Tavsiye:** Çoğu proje için EF Core'un built-in retry'ı yeterlidir. Polly'ye geçiş sadece circuit breaker veya multi-strategy ihtiyacı olduğunda değer yaratır.

### DbContext Pooling

\`\`\`csharp
// ❌ Normal — her request'te yeni DbContext oluşturulur
builder.Services.AddDbContext<AppDbContext>(options => ...);

// ✅ Pooling — DbContext instance'ları yeniden kullanılır
builder.Services.AddDbContextPool<AppDbContext>(options =>
    options.UseSqlServer(connectionString),
    poolSize: 1024);  // Varsayılan: 1024
\`\`\`

### Pooling Farkı

| Yöntem | Davranış | Bellek |
|--------|----------|--------|
| \`AddDbContext\` | Her request'te yeni instance oluşturur | Her seferinde allocation + GC baskısı |
| \`AddDbContextPool\` | Havuzdan hazır instance alır, işi bitince geri koyar | Sabit havuz, GC yükü minimal |

> ⚠️ **Pooling kısıtlamaları:**
> - Constructor'da DI kullanamazsın (singleton gibi davranır)
> - DbContext'te state tutma (her kullanımda sıfırlanır)
> - \`OnConfiguring\` override etme

<details>
<summary><b>🐘 PostgreSQL Connection & PgBouncer</b></summary>

> ⚠️ **Connection & Pooling Limitleri:**
>
> | Limit | PostgreSQL | SQL Server |
> |-------|:---:|:---:|
> | Max eş zamanlı bağlantı (varsayılan) | **100** | **32.767** |
> | Max bağlantı (artırılabilir) | ~500-1000 (RAM'e bağlı) | 32.767 |
> | Connection string \`Max Pool Size\` (varsayılan) | **100** (Npgsql) | **100** |
> | DbContext Pool Size (varsayılan) | **1024** | **1024** |
>
> 💡 **PostgreSQL connection limiti neden düşük?**
> - PG her connection için **ayrı bir process** fork eder (~5-10 MB RAM/connection)
> - 100 bağlantı = ~1 GB RAM sadece connection'lar için
> - SQL Server thread-based → binlerce bağlantı daha ucuz
>
> **Çözüm: Connection Pooler (PgBouncer / Supavisor)**
> \`\`\`
> Uygulama (1000 request) → PgBouncer (50 connection) → PostgreSQL (50 backend)
> \`\`\`

\`\`\`csharp
// Connection string'de pool ayarları:
"Host=localhost;Database=mydb;Username=app;Password=***;"
+ "Maximum Pool Size=50;"     // Npgsql iç pool: max 50 bağlantı
+ "Minimum Pool Size=5;"      // Başlangıçta 5 bağlantı hazır tut
+ "Connection Idle Lifetime=60;"  // 60 sn boş kalan bağlantıyı kapat
+ "Timeout=30;"               // Havuzda boş connection yoksa 30 sn bekle

// PgBouncer kullanılıyorsa:
// - Npgsql pool size = PgBouncer'daki pool size ile eşleş
// - "No Reset On Close=true" ekle (PgBouncer session modda)
// - Prepared statements devre dışı: "Max Auto Prepare=0"
\`\`\`

> ⚠️ **Yaygın hata:** "Npgsql.NpgsqlException: The connection pool has been exhausted"
> - Sebep: Bağlantılar geri verilmiyor (DbContext Dispose edilmemiş veya long-running transaction)
> - Çözüm: \`using\` kullan, DI lifetime doğru ayarla (Scoped), pool size artır

</details>

## 34. Table Splitting & Entity Splitting 🔴

Tek tabloyu birden fazla entity olarak okumak (Table Splitting — büyük BLOB sütunlarını lazy load etmek için) veya tek entity'yi birden fazla tabloya yaymak (Entity Splitting — sık/nadir okunan alanları ayırmak için) imkanı verir.

### Table Splitting — Büyük Tabloları Parçala

\`\`\`csharp
// Senaryo: Products tablosunda büyük bir Description NVARCHAR(MAX) var.
// Listede lazım değil ama detayda lazım → ayrı entity'ye çıkar.

public class Product
{
    public int Id { get; set; }
    public string Name { get; set; } = null!;
    public decimal Price { get; set; }
    
    // Navigation — aynı tablodaki "detay" kısmı
    public ProductDetail Detail { get; set; } = null!;
}

public class ProductDetail
{
    public int Id { get; set; }             // Aynı PK
    public string Description { get; set; } = null!;
    public string Specifications { get; set; } = null!;
    public byte[]? MainImage { get; set; }
    
    public Product Product { get; set; } = null!;
}

// Configuration
public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.ToTable("Products");
        builder.HasOne(p => p.Detail)
               .WithOne(d => d.Product)
               .HasForeignKey<ProductDetail>(d => d.Id);
    }
}

public class ProductDetailConfiguration : IEntityTypeConfiguration<ProductDetail>
{
    public void Configure(EntityTypeBuilder<ProductDetail> builder)
    {
        // Aynı tabloya map!
        builder.ToTable("Products");
    }
}
\`\`\`

### SQL (Table Splitting — Tek Tablo)

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql

    [Id]             INT            IDENTITY(1,1) NOT NULL,
    [Name]           NVARCHAR(200)  NOT NULL,
    [Price]          DECIMAL(18,2)  NOT NULL,
    [Description]    NVARCHAR(MAX)  NOT NULL,      -- ProductDetail
    [Specifications] NVARCHAR(MAX)  NOT NULL,      -- ProductDetail
    [MainImage]      VARBINARY(MAX) NULL,          -- ProductDetail
    CONSTRAINT [PK_Products] PRIMARY KEY ([Id])
);
\`\`\`

</details>

<summary>🐘 PostgreSQL</summary>

    id             INTEGER GENERATED ALWAYS AS IDENTITY,
    name           VARCHAR(200) NOT NULL,
    price          NUMERIC(18,2) NOT NULL,

    .Select(p => new { p.Id, p.Name, p.Price })
    .ToListAsync();
// SQL: SELECT Id, Name, Price FROM Products (Description yüklenmez!)

    .Include(p => p.Detail)

### Entity Splitting (EF Core 7+) — Bir Entity Birden Fazla Tabloda

\`\`\`csharp
// Tek entity ama veriler farklı tablolarda
public class Customer
{
    public int Id { get; set; }
    public string Name { get; set; } = null!;
    
    // Bunlar ayrı tabloda olacak
    public string Phone { get; set; } = null!;
    public string Email { get; set; } = null!;
    public string Address { get; set; } = null!;
}

// Configuration
public class CustomerConfiguration : IEntityTypeConfiguration<Customer>
{
    public void Configure(EntityTypeBuilder<Customer> builder)
    {
        builder.ToTable("Customers");
        
        builder.SplitToTable("CustomerContacts", split =>
        {
            split.Property(c => c.Id);       // PK her tabloda
            split.Property(c => c.Phone);
            split.Property(c => c.Email);
            split.Property(c => c.Address);
        });
    }
}
\`\`\`

> 🐘 **PostgreSQL Table Partitioning**
>
> SQL Server'da table splitting uygulama seviyesinde yapılır. PostgreSQL'de ise **veritabanı seviyesinde native partitioning** vardır — milyonlarca satırlı tablolarda büyük performans kazanımı sağlar.

### PostgreSQL Partitioning Nedir?

Tek bir mantıksal tabloyu, fiziksel olarak birden fazla alt tabloya (**partition**) böler.
Uygulama ve EF Core tek tablo görür — PostgreSQL arka planda doğru partition'a yönlendirir.

### Partitioning Stratejileri

| Strateji | Kullanım | Örnek |
|----------|----------|-------|
| **RANGE** | Zaman serisi, tarih bazlı | Siparişler yıl/ay bazlı |
| **LIST** | Kategorik veri, sabit değerler | Ülke, bölge, tenant |
| **HASH** | Eşit dağılım, belirli bir kolon yok | User ID hash'ine göre |

### 1. Range Partitioning (Tarih Bazlı) — En Yaygın

\`\`\`sql
-- Parent tablo (partitioned):
CREATE TABLE orders (
    id           BIGINT GENERATED ALWAYS AS IDENTITY,
    customer_id  INT NOT NULL,
    order_date   DATE NOT NULL,
    total_amount NUMERIC(18,2) NOT NULL,
    status       TEXT NOT NULL,
    CONSTRAINT pk_orders PRIMARY KEY (id, order_date)  -- ⚠️ Partition key PK'da olmalı!
) PARTITION BY RANGE (order_date);

-- Partition'lar:
CREATE TABLE orders_2024 PARTITION OF orders
    FOR VALUES FROM ('2024-01-01') TO ('2025-01-01');

CREATE TABLE orders_2025 PARTITION OF orders
    FOR VALUES FROM ('2025-01-01') TO ('2026-01-01');

CREATE TABLE orders_2026 PARTITION OF orders
    FOR VALUES FROM ('2026-01-01') TO ('2027-01-01');

-- Her partition'a ayrı index:
CREATE INDEX ix_orders_2024_customer ON orders_2024 (customer_id);
CREATE INDEX ix_orders_2025_customer ON orders_2025 (customer_id);
CREATE INDEX ix_orders_2026_customer ON orders_2026 (customer_id);
\`\`\`

### 2. List Partitioning (Kategorik)

\`\`\`sql
-- Multi-tenant senaryo:
CREATE TABLE invoices (
    id         BIGINT GENERATED ALWAYS AS IDENTITY,
    tenant_id  TEXT NOT NULL,
    amount     NUMERIC(18,2) NOT NULL,
    issued_at  TIMESTAMPTZ NOT NULL,
    CONSTRAINT pk_invoices PRIMARY KEY (id, tenant_id)
) PARTITION BY LIST (tenant_id);

CREATE TABLE invoices_acme    PARTITION OF invoices FOR VALUES IN ('acme');
CREATE TABLE invoices_globex  PARTITION OF invoices FOR VALUES IN ('globex');
CREATE TABLE invoices_initech PARTITION OF invoices FOR VALUES IN ('initech');

-- Yeni tenant geldiğinde:
CREATE TABLE invoices_newcorp PARTITION OF invoices FOR VALUES IN ('newcorp');
\`\`\`

### 3. Hash Partitioning (Eşit Dağılım)

\`\`\`sql
-- Çok büyük tablo, belirli bir range/list yok:
CREATE TABLE events (
    id         BIGINT GENERATED ALWAYS AS IDENTITY,
    user_id    INT NOT NULL,
    event_type TEXT NOT NULL,
    payload    JSONB,
    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
    CONSTRAINT pk_events PRIMARY KEY (id, user_id)
) PARTITION BY HASH (user_id);

-- 4 eşit partition:
CREATE TABLE events_p0 PARTITION OF events FOR VALUES WITH (MODULUS 4, REMAINDER 0);
CREATE TABLE events_p1 PARTITION OF events FOR VALUES WITH (MODULUS 4, REMAINDER 1);
CREATE TABLE events_p2 PARTITION OF events FOR VALUES WITH (MODULUS 4, REMAINDER 2);
CREATE TABLE events_p3 PARTITION OF events FOR VALUES WITH (MODULUS 4, REMAINDER 3);
\`\`\`

### EF Core ile Partitioned Table Kullanımı

EF Core partitioning'den **habersizdir** — tek tablo olarak görür. Ancak bazı önemli konfigürasyon gereksinimleri vardır:

\`\`\`csharp
// Entity — normal tanımlanır:
public class Order
{
    public long Id { get; set; }
    public int CustomerId { get; set; }
    public DateOnly OrderDate { get; set; }    // Partition key!
    public decimal TotalAmount { get; set; }
    public string Status { get; set; }
}

// Configuration:
public class OrderConfiguration : IEntityTypeConfiguration<Order>
{
    public void Configure(EntityTypeBuilder<Order> builder)
    {
        builder.ToTable("orders");

        // ⚠️ KRİTİK: Partition key composite PK'da olmalı!
        // PostgreSQL kısıtı: UNIQUE ve PK constraint'ler partition key'i İÇERMELİ
        builder.HasKey(o => new { o.Id, o.OrderDate });

        builder.Property(o => o.Id)
               .UseIdentityAlwaysColumn();

        builder.Property(o => o.TotalAmount)
               .HasPrecision(18, 2);
    }
}
\`\`\`

> ⚠️ **En Önemli Kural:** PostgreSQL'de partitioned tablolarda \`PRIMARY KEY\` ve \`UNIQUE\` constraint'ler **partition key'i içermek zorundadır**. Bu yüzden \`Id\` tek başına PK olamaz → \`(Id, OrderDate)\` composite PK gerekir.

### Migration'da Partitioning (Raw SQL ile)

EF Core migration'ları partitioned tablo oluşturamaz — raw SQL ile kendin yazarsın.

\`\`\`csharp
public partial class CreatePartitionedOrders : Migration
{
    protected override void Up(MigrationBuilder migrationBuilder)
    {
        // EF'in normal CreateTable'ını KULLANMA — raw SQL yaz:
        migrationBuilder.Sql(@"
            CREATE TABLE orders (
                id           BIGINT GENERATED ALWAYS AS IDENTITY,
                customer_id  INT NOT NULL,
                order_date   DATE NOT NULL,
                total_amount NUMERIC(18,2) NOT NULL,
                status       TEXT NOT NULL DEFAULT 'pending',
                CONSTRAINT pk_orders PRIMARY KEY (id, order_date)
            ) PARTITION BY RANGE (order_date);

            -- 2024-2026 partition'ları
            CREATE TABLE orders_2024 PARTITION OF orders
                FOR VALUES FROM ('2024-01-01') TO ('2025-01-01');
            CREATE TABLE orders_2025 PARTITION OF orders
                FOR VALUES FROM ('2025-01-01') TO ('2026-01-01');
            CREATE TABLE orders_2026 PARTITION OF orders
                FOR VALUES FROM ('2026-01-01') TO ('2027-01-01');

            -- Index'ler (her partition'da ayrı oluşur):
            CREATE INDEX ix_orders_customer ON orders (customer_id);
            CREATE INDEX ix_orders_status ON orders (status);
        ");
    }

    protected override void Down(MigrationBuilder migrationBuilder)
    {
        migrationBuilder.Sql("DROP TABLE orders CASCADE;");
    }
}
\`\`\`

### Partition Bakımı — Yeni Partition Ekleme

\`\`\`sql
-- Her yıl başında (veya cron job ile) yeni partition ekle:
CREATE TABLE orders_2027 PARTITION OF orders
    FOR VALUES FROM ('2027-01-01') TO ('2028-01-01');

-- Eski partition'ı arşivle (detach → ayrı tablo olur, sorgularda görünmez):
ALTER TABLE orders DETACH PARTITION orders_2022;
-- Artık orders_2022 bağımsız bir tablo — arşive taşınabilir veya silinebilir
-- ✅ Partition sayısından DÜŞER → planning overhead azalır
-- ✅ SELECT * FROM orders_2022 WHERE ... ile hâlâ sorgulanabilir (bağımsız tablo)

-- Default partition (aralık dışı veriler için güvenlik ağı):
CREATE TABLE orders_default PARTITION OF orders DEFAULT;
-- Hiçbir partition'a uymayan veri buraya düşer
\`\`\`

### EF Core Sorguları ve Partition Pruning

\`\`\`csharp
// ✅ Partition key WHERE'de → PG sadece ilgili partition'ı tarar:
var orders2026 = await context.Orders
    .Where(o => o.OrderDate >= new DateOnly(2026, 1, 1)
             && o.OrderDate < new DateOnly(2027, 1, 1))
    .ToListAsync();
// SQL: SELECT ... FROM orders WHERE order_date >= '2026-01-01' AND order_date < '2027-01-01'
// → Sadece orders_2026 taranır! (Partition Pruning ✅)

// ✅ Birden fazla partition'a yayılan sorgu — PG otomatik birleştirir:
var lastTwoYears = await context.Orders
    .Where(o => o.OrderDate >= new DateOnly(2025, 1, 1)
             && o.OrderDate < new DateOnly(2027, 1, 1))
    .ToListAsync();
// → orders_2025 + orders_2026 taranır (2 partition), diğerleri atlanır

// ✅ Yıl sınırını geçen sorgular da sorunsuz:
var last6Months = await context.Orders
    .Where(o => o.OrderDate >= DateOnly.FromDateTime(DateTime.UtcNow.AddMonths(-6)))
    .ToListAsync();
// → PG: Gerekli partition'ları otomatik saptar (ör. orders_2025 + orders_2026)
// Developer partition sınırlarını bilmek ZORUNDA DEĞİL — normal sorgu yaz, PG halleder.

// ⚠️ Partition key olmadan sorgu → TÜM partition'lar taranır:
var expensive = await context.Orders
    .Where(o => o.TotalAmount > 10000)
    .ToListAsync();
// → orders_2024 + orders_2025 + orders_2026 hepsi taranır (Sequential Scan)
\`\`\`

> 💡 **Partition Pruning nasıl çalışır?**
> \`\`\`
> WHERE order_date >= '2025-06-01' AND order_date < '2026-03-01'
>
> PG kontrol eder:
>   orders_2024 → range: [2024-01-01, 2025-01-01) → EŞLEŞMEZ → atla ✅
>   orders_2025 → range: [2025-01-01, 2026-01-01) → KISMİ EŞLEŞME → tara
>   orders_2026 → range: [2026-01-01, 2027-01-01) → KISMİ EŞLEŞME → tara
>   orders_2027 → range: [2027-01-01, 2028-01-01) → EŞLEŞMEZ → atla ✅
> \`\`\`
> Sonuç: 2/4 partition taranır. Tablo büyüdükçe (yüzlerce partition) kazanım katlanır.

### Performans Karşılaştırma

| Senaryo | Partitioned Değil | Partitioned (Range by Year) |
|---------|:-:|:-:|
| 50M satırlık orders tablosu | Full scan: ~5 sn | Tek partition scan: ~0.3 sn |
| Yıllık arşivleme | \`DELETE\` milyonlarca satır (yavaş, WAL şişer) | \`DETACH PARTITION\` (anında) |
| Index boyutu | 50M satırlık dev index | 3-4 küçük index (yıl başına ~15M) |
| VACUUM | Tüm tablo (uzun lock) | Partition başına (kısa) |
| Yeni yıl ekleme | Tablo büyümeye devam | \`CREATE PARTITION\` (anında) |

### Ne Zaman Partitioning Kullanılmalı?

| Durum | Partition? | Neden |
|-------|:---:|--------|
| < 1M satır | ❌ | Overhead'ı haketmez, normal index yeterli |
| 1M - 10M satır | 🟡 | Sorgu pattern'ine bağlı (tarih filtreleme varsa evet) |
| > 10M satır + tarih bazlı sorgular | ✅ | Partition pruning dramatik fark yaratır |
| Arşivleme gereksinimi | ✅ | \`DETACH\` ile anında arşive taşıma |
| Multi-tenant (fiziksel izolasyon) | ✅ | LIST partition ile tenant bazlı ayırma |
| Eşit dağılımlı yazma yükü | ✅ | HASH partition ile paralel I/O |

### Partition Limitleri — Ne Kadar Partition Oluşturulabilir?

| Provider | Teorik Limit | Pratik Önerilen Sınır | Aşılırsa Ne Olur? |
|----------|:---:|:---:|---|
| **PostgreSQL** | Sınır yok (binlerce mümkün) | **< 1000** partition | Planlama süresi artar, VACUUM yavaşlar |
| **SQL Server** | **15.000** partition/tablo | **< 1000** | Hard limit — hata verir |
| **MySQL (InnoDB)** | **8192** partition/tablo | **< 200** | Açık dosya limiti, metadata overhead |

**PostgreSQL'de aşırı partition'ın etkileri:**

\`\`\`
Partition Sayısı     Planlama Süresi    Pratik Durum
──────────────────   ───────────────    ─────────────────────
< 100                ~1 ms              ✅ İdeal
100 - 500            ~5-10 ms           ✅ Sorunsuz
500 - 1000           ~20-50 ms          🟡 Kabul edilebilir
1000 - 5000          ~100-500 ms        ⚠️ Query planning yavaşlar
> 5000               > 1 sn             ❌ Ciddi overhead, yeniden tasarla
\`\`\`

> ⚠️ **Neden fazla partition sorun olur?**
> - PostgreSQL her sorgu için **tüm partition metadata'sını** tarar (hangileri relevant diye karar vermek için)
> - Partition sayısı arttıkça \`EXPLAIN ANALYZE\` planning time şişer
> - \`pg_catalog\` metadata tabloları büyür → \`autovacuum\`, DDL operasyonları yavaşlar
> - Her partition bir **dosya** (8KB page'ler) → OS seviyesinde açık dosya limiti (\`ulimit -n\`)

**Pratik öneriler:**

\`\`\`sql
-- ❌ YANLIŞ: Günlük partition (365 × yıl sayısı = binlerce)
CREATE TABLE logs_20260101 PARTITION OF logs FOR VALUES FROM ('2026-01-01') TO ('2026-01-02');
CREATE TABLE logs_20260102 PARTITION OF logs FOR VALUES FROM ('2026-01-02') TO ('2026-01-03');
-- 5 yıl = 1825 partition → planning overhead!

-- ✅ DOĞRU: Aylık partition (12 × yıl sayısı = yönetilebilir)
CREATE TABLE logs_2026_01 PARTITION OF logs FOR VALUES FROM ('2026-01-01') TO ('2026-02-01');
CREATE TABLE logs_2026_02 PARTITION OF logs FOR VALUES FROM ('2026-02-01') TO ('2026-03-01');
-- 5 yıl = 60 partition → ideal

-- ✅ ALTERNATİF: Sub-partitioning (çok büyük veri setleri)
-- Önce yıla göre böl, sonra her yılı aya göre:
CREATE TABLE logs (
    id BIGINT, created_at DATE, message TEXT
) PARTITION BY RANGE (created_at);

CREATE TABLE logs_2026 PARTITION OF logs
    FOR VALUES FROM ('2026-01-01') TO ('2027-01-01')
    PARTITION BY RANGE (created_at);  -- Sub-partition!

CREATE TABLE logs_2026_q1 PARTITION OF logs_2026
    FOR VALUES FROM ('2026-01-01') TO ('2026-04-01');
CREATE TABLE logs_2026_q2 PARTITION OF logs_2026
    FOR VALUES FROM ('2026-04-01') TO ('2026-07-01');
\`\`\`

> 💡 **Altın kural:** Partition granularity'yi sorgu pattern'ine göre belirle:
> - Genelde **aylık/haftalık** sorgular → aylık partition
> - Genelde **yıllık** raporlama → yıllık partition
> - Gerçek zamanlı log → çeyrek veya aylık + eski partition'ları \`DETACH\`

### Sık Yapılan Hatalar

| Hata | Sonuç | Çözüm |
|------|-------|-------|
| PK'da partition key yok | \`ERROR: unique constraint must include partition key\` | Composite PK: \`(Id, PartitionKey)\` |
| FK referansı partitioned tabloya | PostgreSQL izin vermez (PG 11'de) | PG 12+: FK destekler, veya uygulama seviyesinde kontrol |
| Partition key olmadan sorgu | Tüm partition'lar taranır | WHERE'de partition key kolonunu filtrele |
| Default partition unutmak | Aralık dışı INSERT hata verir | \`CREATE ... DEFAULT\` ile fallback ekle |
| EF migration'da \`CreateTable\` kullanmak | Normal (non-partitioned) tablo oluşur | Raw SQL migration kullan |

### ❓ "WHERE'de partition key olmalı" Ne Demek?

Bu ifade bazı geliştiricileri yanıltıyor. Açıklayalım:

**"Partition key" = tabloyu partition'lamak için seçtiğin kolon.** Örneğin \`PARTITION BY RANGE (order_date)\` dediysen, partition key = \`order_date\` kolonu.

"WHERE'de partition key olmalı" demek:
- ❌ LINQ'e özel bir \`.WithPartition()\` veya \`PARTITION\` keyword'ü eklemek DEĞİL
- ❌ Connection string'e veya DbContext'e bir şey eklemek DEĞİL
- ✅ Sadece **sorgunun WHERE koşulunda o kolonu filtrelemen** demek

\`\`\`csharp
// Tablo: PARTITION BY RANGE (order_date)
// Partition key = order_date kolonu

// ✅ DOĞRU — order_date WHERE'de var → PG sadece ilgili partition'ı tarar
var orders = await context.Orders
    .Where(o => o.OrderDate >= new DateOnly(2026, 1, 1))  // ← partition key filtresi
    .Where(o => o.Status == "Pending")
    .ToListAsync();
// PG: "order_date 2026 aralığında → sadece orders_2026'ya bak" (Partition Pruning)

// ⚠️ YANLIŞ — order_date hiç yok → PG hangi partition'a bakacağını bilemez
var expensive = await context.Orders
    .Where(o => o.TotalAmount > 10000)  // ← partition key yok!
    .ToListAsync();
// PG: "Tüm partition'ları tara, order_date koşulu yok" → Full Scan
// Partition'ın hiçbir faydası yok, sanki normal tabloymuş gibi çalışır
\`\`\`

**Özetle:**

\`\`\`
Sen:  .Where(o => o.OrderDate >= start)     ← normal LINQ, özel bir şey yok
       ↓
EF:   WHERE order_date >= '2026-01-01'      ← normal SQL
       ↓
PG:   "order_date kolonu benim partition    ← PostgreSQL kendi karar verir
       key'im, hangi partition'lara bakmalıyım?"
       → orders_2024? Hayır (range dışı)
       → orders_2025? Hayır (range dışı)
       → orders_2026? EVET → sadece bunu tara ✅
\`\`\`

> 💡 **Özet:** EF Core ve LINQ tarafında partition ile ilgili **hiçbir özel kod yazmazsın**. Normal \`.Where()\` yazarsın. Tek kuralın: o \`.Where()\` içinde partition key kolonunu (\`order_date\`, \`tenant_id\` vb.) filtrele. Gerisini PostgreSQL otomatik halleder.
>
> Bu, tasarım kararıdır: Partition key'i seçerken **"sorgularımda en çok hangi kolonu filtreliyorum?"** sorusunu sor. Cevap ne ise, partition key o olsun.

### Gerçek Dünya Senaryosu: E-Fatura Uygulaması

**Durum:** Multi-tenant e-dönüşüm sistemi. Müşteri A günde 10.000 fatura, Müşteri B günde 10 fatura kesiyor. Nasıl partition'lanmalı?

**❌ Yaklaşım 1: LIST by tenant_id (Her müşteriye özel partition)**

\`\`\`sql
CREATE TABLE invoices (...) PARTITION BY LIST (tenant_id);
CREATE TABLE invoices_customer_a PARTITION OF invoices FOR VALUES IN ('cust-a');
CREATE TABLE invoices_customer_b PARTITION OF invoices FOR VALUES IN ('cust-b');
-- ... 500 müşteri = 500 partition
\`\`\`

Sorunlar:
- 500 müşteri = 500 partition → planning overhead
- Partition boyutları **aşırı dengesiz** (biri 3.6M/yıl, biri 3.600/yıl)
- Yeni müşteri geldiğinde DDL gerekli (partition oluşturma)
- Tarih bazlı sorgular ("bu ayın faturaları") **tüm partition'ları** tarar

**❌ Yaklaşım 2: Hacim bazlı tier kolonu**

\`\`\`sql
-- tenant'ları tier'a göre grupla (high_volume, low_volume)
ALTER TABLE invoices ADD COLUMN volume_tier TEXT;
CREATE TABLE invoices (...) PARTITION BY LIST (volume_tier);
\`\`\`

Sorunlar:
- Müşteri büyüyünce tier değişir → **veri taşımak** gerekir (DELETE + INSERT)
- Partition key değiştirilemez (satır taşımak = silip yeniden eklemek)
- Yapay bir kolon eklemiş olursun, iş mantığını kirletir

**✅ Yaklaşım 3: RANGE by date (Önerilen)**

\`\`\`sql
CREATE TABLE invoices (
    id            BIGINT GENERATED ALWAYS AS IDENTITY,
    tenant_id     UUID NOT NULL,
    invoice_no    TEXT NOT NULL,
    amount        NUMERIC(18,2) NOT NULL,
    issued_at     DATE NOT NULL,
    status        TEXT NOT NULL DEFAULT 'draft',
    payload       JSONB,         -- e-fatura XML/UBL içeriği
    CONSTRAINT pk_invoices PRIMARY KEY (id, issued_at)
) PARTITION BY RANGE (issued_at);

-- Aylık partition:
CREATE TABLE invoices_2026_01 PARTITION OF invoices
    FOR VALUES FROM ('2026-01-01') TO ('2026-02-01');
CREATE TABLE invoices_2026_02 PARTITION OF invoices
    FOR VALUES FROM ('2026-02-01') TO ('2026-03-01');
-- ... (12 partition/yıl, 5 yıl = 60 partition → ideal)

-- tenant_id üzerine INDEX (partition pruning + index birlikte çalışır):
CREATE INDEX ix_invoices_tenant ON invoices (tenant_id, issued_at);
\`\`\`

Neden doğru:
- Sorgu pattern'i: "Müşteri X'in Ocak 2026 faturaları" → partition pruning (ay) + index (tenant)
- Tüm müşteriler aynı partition'da → dengesizlik yok
- Yeni müşteri = sadece INSERT, DDL gerekmez
- Arşivleme: \`DETACH PARTITION invoices_2024_01\` (eski ayı ayır)
- 60 partition (5 yıl aylık) → planning overhead minimal

**Sorgu örnekleri:**

\`\`\`csharp
// "Müşteri A'nın bu ayki faturaları" — çok hızlı:
var invoices = await context.Invoices
    .Where(i => i.TenantId == tenantId
             && i.IssuedAt >= new DateOnly(2026, 5, 1)
             && i.IssuedAt < new DateOnly(2026, 6, 1))
    .OrderByDescending(i => i.IssuedAt)
    .ToListAsync();
// → Sadece invoices_2026_05 partition'ı taranır
// → tenant_id index ile filtrelenir (10K faturalık müşteri bile hızlı)

// "Tüm müşterilerin bu ayki toplam fatura sayısı" — raporlama:
var summary = await context.Invoices
    .Where(i => i.IssuedAt >= new DateOnly(2026, 5, 1)
             && i.IssuedAt < new DateOnly(2026, 6, 1))
    .GroupBy(i => i.TenantId)
    .Select(g => new { TenantId = g.Key, Count = g.Count(), Total = g.Sum(i => i.Amount) })
    .ToListAsync();
// → Sadece invoices_2026_05 taranır (tek partition)
\`\`\`

\`\`\`sql
-- EXPLAIN ANALYZE çıktısı:
-- Seq Scan on invoices_2026_05    (actual rows=312000)
--   Filter: (tenant_id = 'cust-a')
--   Rows Removed by Filter: 288000
--   → Index Scan kullanılırsa: (actual rows=10000, ~2ms)
\`\`\`

**Çok büyük müşteriler için (günde 100K+ fatura): Sub-partitioning**

\`\`\`sql
-- Yıl → Ay sub-partition (extreme hacim):
CREATE TABLE invoices_2026 PARTITION OF invoices
    FOR VALUES FROM ('2026-01-01') TO ('2027-01-01')
    PARTITION BY RANGE (issued_at);

CREATE TABLE invoices_2026_w01 PARTITION OF invoices_2026
    FOR VALUES FROM ('2026-01-01') TO ('2026-01-08');  -- Haftalık
-- Toplam: 52 sub-partition/yıl × yıl sayısı (çok büyük hacimler için)
\`\`\`

**📌 Karar ağacı:**

\`\`\`
E-fatura partition stratejisi:
│
├── Sorgu pattern nedir?
│   ├── Genelde tarih bazlı (ay/yıl) → ✅ RANGE by date
│   ├── Genelde tenant bazlı         → 🟡 LIST by tenant (az müşteri ise)
│   └── Her ikisi de eşit           → ✅ RANGE by date + tenant index
│
├── Kaç müşteri var?
│   ├── < 20 büyük müşteri          → LIST by tenant düşünülebilir
│   ├── 20-1000 müşteri             → ✅ RANGE by date + index
│   └── > 1000 müşteri              → ✅ Kesinlikle RANGE by date
│
└── Arşivleme gerekli mi?
    ├── Evet (yasal saklama süresi)  → ✅ RANGE by date (DETACH ile arşiv)
    └── Hayır                        → Index yeterli olabilir, partition şart değil
\`\`\`

## 35. Soft Delete Pattern (Tam Implementasyon) 🔴

Veriyi fiziksel olarak silmek yerine \`IsDeleted = true\` flag'i ile gizleme. Yasal saklama zorunlulukları, geri alma (undo) ihtiyacı ve veri kaybı riskini ortadan kaldırır. Global Filter + Interceptor + Cascade logic ile tam implementasyon.

### Temel Interface & Base Entity

\`\`\`csharp
public interface ISoftDeletable
{
    bool IsDeleted { get; set; }
    DateTime? DeletedAt { get; set; }
    string? DeletedBy { get; set; }
}

public abstract class BaseEntity : ISoftDeletable
{
    public int Id { get; set; }
    public bool IsDeleted { get; set; }
    public DateTime? DeletedAt { get; set; }
    public string? DeletedBy { get; set; }
}
\`\`\`

### Interceptor ile Otomatik Soft Delete

\`\`\`csharp
public class SoftDeleteInterceptor : SaveChangesInterceptor
{
    private readonly ICurrentUserService _currentUser;

    public SoftDeleteInterceptor(ICurrentUserService currentUser)
    {
        _currentUser = currentUser;
    }

    public override ValueTask<InterceptionResult<int>> SavingChangesAsync(
        DbContextEventData eventData,
        InterceptionResult<int> result,
        CancellationToken cancellationToken = default)
    {
        var context = eventData.Context!;

        foreach (var entry in context.ChangeTracker.Entries<ISoftDeletable>())
        {
            if (entry.State == EntityState.Deleted)
            {
                // Fiziksel silmeyi engelle → soft delete yap
                entry.State = EntityState.Modified;
                entry.Entity.IsDeleted = true;
                entry.Entity.DeletedAt = DateTime.UtcNow;
                entry.Entity.DeletedBy = _currentUser.UserId;
            }
        }

        return base.SavingChangesAsync(eventData, result, cancellationToken);
    }
}
\`\`\`

### Global Filter ile Otomatik Filtreleme

\`\`\`csharp
// OnModelCreating'de tüm ISoftDeletable entity'lere otomatik filter
protected override void OnModelCreating(ModelBuilder modelBuilder)
{
    foreach (var entityType in modelBuilder.Model.GetEntityTypes())
    {
        if (typeof(ISoftDeletable).IsAssignableFrom(entityType.ClrType))
        {
            var parameter = Expression.Parameter(entityType.ClrType, "e");
            var property = Expression.Property(parameter, nameof(ISoftDeletable.IsDeleted));
            var condition = Expression.Equal(property, Expression.Constant(false));
            var lambda = Expression.Lambda(condition, parameter);

            modelBuilder.Entity(entityType.ClrType).HasQueryFilter(lambda);
        }
    }
}
\`\`\`

### Silinen Verilere Erişim

\`\`\`csharp
// Normal sorgu — silinenleri GÖRMEZ
var activeProducts = await context.Products.ToListAsync();

// Admin paneli — silinenleri de GÖR
var allProducts = await context.Products
    .IgnoreQueryFilters()
    .ToListAsync();

// Sadece silinenleri getir (recycle bin)
var deletedProducts = await context.Products
    .IgnoreQueryFilters()
    .Where(p => p.IsDeleted)
    .ToListAsync();

// Geri yükleme (undelete)
var product = await context.Products
    .IgnoreQueryFilters()
    .FirstAsync(p => p.Id == 42);

product.IsDeleted = false;
product.DeletedAt = null;
product.DeletedBy = null;
await context.SaveChangesAsync();
\`\`\`

### Cascade Soft Delete (İlişkili Kayıtlar)

\`\`\`csharp
// Sipariş silinince, sipariş kalemleri de soft-delete olsun
public class CascadeSoftDeleteInterceptor : SaveChangesInterceptor
{
    public override ValueTask<InterceptionResult<int>> SavingChangesAsync(
        DbContextEventData eventData,
        InterceptionResult<int> result,
        CancellationToken cancellationToken = default)
    {
        var context = eventData.Context!;

        foreach (var entry in context.ChangeTracker.Entries<ISoftDeletable>()
            .Where(e => e.State == EntityState.Modified && e.Entity.IsDeleted))
        {
            // İlişkili navigation'ları da soft-delete yap
            foreach (var navigation in entry.Navigations
                .Where(n => n.CurrentValue is not null))
            {
                if (navigation.CurrentValue is IEnumerable<ISoftDeletable> children)
                {
                    foreach (var child in children)
                    {
                        child.IsDeleted = true;
                        child.DeletedAt = DateTime.UtcNow;
                    }
                }
                else if (navigation.CurrentValue is ISoftDeletable child)
                {
                    child.IsDeleted = true;
                    child.DeletedAt = DateTime.UtcNow;
                }
            }
        }

        return base.SavingChangesAsync(eventData, result, cancellationToken);
    }
}
\`\`\`

### SQL — Normal vs Soft Delete Karşılaştırma

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- context.Products.Remove(product) → Interceptor araya girer:
-- ❌ Fiziksel: DELETE FROM Products WHERE Id = 42
-- ✅ Soft:    UPDATE Products SET IsDeleted = 1, DeletedAt = '2024-...', DeletedBy = 'user1' WHERE Id = 42

-- Normal sorgular otomatik filtrelenir:
-- SELECT * FROM Products WHERE IsDeleted = 0  (filter otomatik eklenir)
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- context.Products.Remove(product) → Interceptor araya girer:
-- ❌ Fiziksel: DELETE FROM products WHERE id = 42
-- ✅ Soft:    UPDATE products SET is_deleted = TRUE, deleted_at = '2024-...', deleted_by = 'user1' WHERE id = 42

-- Normal sorgular otomatik filtrelenir:
-- SELECT * FROM products WHERE NOT is_deleted  (filter otomatik eklenir)
\`\`\`

</details>

> 🐘 **PostgreSQL'de Soft Delete İpuçları:**
> - **Partial Index** büyük avantaj: Silinmiş kayıtları index'ten **tamamen çıkar** → index küçülür, sorgular hızlanır
> - \`BIT\` yok → \`BOOLEAN\` kullanılır, filtre syntax'ı: \`WHERE NOT is_deleted\` (koşul direkt boolean)
> - \`DeletedAt\` için \`TIMESTAMPTZ\` kullanılır (timezone-aware)

\`\`\`sql
-- PostgreSQL partial index (soft delete performansı):
-- Sadece aktif kayıtları indexle → silinmişler index boyutunu şişirmez
CREATE UNIQUE INDEX ix_users_email_active
ON users (email)
WHERE NOT is_deleted;  -- Sadece is_deleted = false olanlar index'te!

-- Tarih bazlı: Sadece son 90 günde silinenler index'te (arşiv yönetimi)
CREATE INDEX ix_products_deleted_recent
ON products (deleted_at)
WHERE is_deleted AND deleted_at > NOW() - INTERVAL '90 days';
\`\`\`

\`\`\`csharp
// EF Fluent API ile aynı partial index:
builder.HasIndex(u => u.Email)
       .IsUnique()
       .HasFilter("NOT is_deleted");  // PostgreSQL boolean syntax

// HasDefaultValue — PostgreSQL BOOLEAN doğrudan destekler:
builder.Property(p => p.IsDeleted)
       .HasDefaultValue(false);  // DEFAULT FALSE (BIT değil!)
\`\`\`

> 💡 **Neden partial index önemli?** Bir tabloda 10M kayıt var, 9M'ı soft-deleted. Full index 10M satır tarar. Partial index sadece 1M aktif kaydı tutar → **10x daha küçük, 10x daha hızlı.**

## 36. EF.Functions — Provider-Specific Fonksiyonlar 🔴🔶

LINQ'ta doğrudan yazılamayan veritabanı-özel fonksiyonları (LIKE, DATEPART, Full-Text Search, Vector Search) kullanmak için \`EF.Functions\` namespace'ini kullanırsın. Provider'a göre farklı fonksiyonlar mevcuttur.

> ⚠️ **Önemli:** SQL Server ve PostgreSQL'in \`EF.Functions\` setleri **tamamen farklıdır**. SQL Server'ın \`DateDiffDay()\`, \`Contains()\`, \`IsNumeric()\` gibi fonksiyonları PostgreSQL'de çalışmaz — Npgsql kendi setini sunar.

### 36.1 String Fonksiyonları

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`csharp
// LIKE — wildcard arama
var products = await context.Products
    .Where(p => EF.Functions.Like(p.Name, "%telefon%"))
    .ToListAsync();
// SQL: WHERE [p].[Name] LIKE N'%telefon%'

// CONTAINS (Full-Text Search — FTS index gerekir)
var results = await context.Products
    .Where(p => EF.Functions.Contains(p.Name, "akıllı AND telefon"))
    .ToListAsync();
// SQL: WHERE CONTAINS([p].[Name], N'akıllı AND telefon')

// FREETEXT (doğal dil araması)
var results = await context.Products
    .Where(p => EF.Functions.FreeText(p.Description, "ucuz kaliteli telefon"))
    .ToListAsync();
// SQL: WHERE FREETEXT([p].[Description], N'ucuz kaliteli telefon')

// Collation — case-sensitive karşılaştırma
var exact = await context.Users
    .Where(u => EF.Functions.Collate(u.Username, "SQL_Latin1_General_CP1_CS_AS") == "Admin")
    .ToListAsync();
// SQL: WHERE [u].[Username] COLLATE SQL_Latin1_General_CP1_CS_AS = N'Admin'
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`csharp
// ILIKE — Case-insensitive LIKE (SQL Server'da varsayılan CI, PG'de explicit gerekir)
var products = await context.Products
    .Where(p => EF.Functions.ILike(p.Name, "%telefon%"))
    .ToListAsync();
// SQL: WHERE p.name ILIKE '%telefon%'

// Full-Text Search — tsvector/tsquery (Türkçe dil desteği dahil!)
var results = await context.Products
    .Where(p => EF.Functions.ToTsVector("turkish", p.Name)
                    .Matches(EF.Functions.ToTsQuery("turkish", "akıllı & telefon")))
    .ToListAsync();
// SQL: WHERE to_tsvector('turkish', name) @@ to_tsquery('turkish', 'akıllı & telefon')

// Trigram benzerlik araması — typo-tolerant! (pg_trgm extension gerekir)
var similar = await context.Products
    .Where(p => EF.Functions.TrigramsAreSimilar(p.Name, "iphne"))
    .OrderBy(p => EF.Functions.TrigramsSimilarityDistance(p.Name, "iphne"))
    .ToListAsync();
// SQL: WHERE name % 'iphne' ORDER BY name <-> 'iphne'
// → "iPhone" bulur! Fuzzy search.

// Collation — case-sensitive (PG varsayılan case-sensitive, CI istersen collate ekle)
var exact = await context.Users
    .Where(u => EF.Functions.Collate(u.Username, "tr-x-icu") == "Admin")
    .ToListAsync();
// SQL: WHERE username COLLATE "tr-x-icu" = 'Admin'
\`\`\`

</details>

> 💡 **Full-Text Search farkı:** SQL Server'da FTS Index + \`CONTAINS\` gerekir. PostgreSQL'de \`tsvector\` + \`GIN index\` ile çok daha esnek FTS yapılır — Türkçe stemming, ranking, highlight özellikleri built-in gelir.

### 36.2 Tarih Fonksiyonları

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`csharp
// DateDiffDay — gün farkı
var recentOrders = await context.Orders
    .Where(o => EF.Functions.DateDiffDay(o.OrderDate, DateTime.UtcNow) <= 30)
    .ToListAsync();
// SQL: WHERE DATEDIFF(DAY, [o].[OrderDate], GETUTCDATE()) <= 30

// DateDiffMonth
var thisYear = await context.Orders
    .Where(o => EF.Functions.DateDiffMonth(o.OrderDate, DateTime.UtcNow) < 12)
    .ToListAsync();

// DateDiffHour — son 24 saat
var recent = await context.Logs
    .Where(l => EF.Functions.DateDiffHour(l.Timestamp, DateTime.UtcNow) <= 24)
    .ToListAsync();

// DateFromParts
var date = EF.Functions.DateFromParts(2024, 6, 15);
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`csharp
// PostgreSQL'de DateDiff YOK — doğrudan aritmetik kullan:
var recentOrders = await context.Orders
    .Where(o => DateTime.UtcNow - o.OrderDate < TimeSpan.FromDays(30))
    .ToListAsync();
// SQL: WHERE NOW() - order_date < INTERVAL '30 days'

// Son 12 ay
var thisYear = await context.Orders
    .Where(o => o.OrderDate >= DateTime.UtcNow.AddMonths(-12))
    .ToListAsync();
// SQL: WHERE order_date >= NOW() - INTERVAL '12 months'

// Son 24 saat
var recent = await context.Logs
    .Where(l => l.Timestamp >= DateTime.UtcNow.AddHours(-24))
    .ToListAsync();
// SQL: WHERE timestamp >= NOW() - INTERVAL '24 hours'

// Tarih oluşturma
var specific = await context.Orders
    .Where(o => o.OrderDate == new DateOnly(2024, 6, 15))
    .ToListAsync();
// SQL: WHERE order_date = '2024-06-15'
\`\`\`

</details>

> 💡 **Neden PostgreSQL'de \`DateDiff\` yok?** PG tarih aritmetiğini native destekler (\`date - date = integer\`, \`timestamp - timestamp = interval\`). EF Core bu C# ifadelerini doğrudan SQL'e çevirir — özel fonksiyon gereksiz.

## 37. Compiled Queries 🔴

Aynı LINQ sorgusu her çağrıda expression tree'den SQL'e yeniden derlenir. Yoğun endpoint'lerde (saniyede binlerce istek) bu derleme maliyeti birikir. Compiled Query, derlemeyi bir kere yapıp cache'ler — sonraki çağrılarda sadece parametre değişir.

### Temel Compiled Query

\`\`\`csharp
// Static field olarak tanımla — uygulama ömrü boyunca derleme 1 kere yapılır
public static class ProductQueries
{
    // Tek parametre
    public static readonly Func<AppDbContext, int, Task<Product?>> GetById =
        EF.CompileAsyncQuery(
            (AppDbContext ctx, int id) =>
                ctx.Products.FirstOrDefault(p => p.Id == id));

    // Birden fazla parametre
    public static readonly Func<AppDbContext, int, decimal, IAsyncEnumerable<Product>> 
        GetByCategoryAndMinPrice =
        EF.CompileAsyncQuery(
            (AppDbContext ctx, int categoryId, decimal minPrice) =>
                ctx.Products
                    .Where(p => p.CategoryId == categoryId && p.Price >= minPrice)
                    .OrderBy(p => p.Price));

    // Include ile
    public static readonly Func<AppDbContext, int, Task<Product?>> GetWithCategory =
        EF.CompileAsyncQuery(
            (AppDbContext ctx, int id) =>
                ctx.Products
                    .Include(p => p.Category)
                    .FirstOrDefault(p => p.Id == id));
}
\`\`\`

### Kullanım

\`\`\`csharp
// Controller/Service'de
public class ProductService
{
    private readonly AppDbContext _context;

    public async Task<Product?> GetByIdAsync(int id)
    {
        // ✅ Her çağrıda expression tree parse edilmez
        return await ProductQueries.GetById(_context, id);
    }

    public async Task<List<Product>> GetExpensiveInCategoryAsync(int catId, decimal min)
    {
        var results = new List<Product>();
        await foreach (var product in ProductQueries.GetByCategoryAndMinPrice(_context, catId, min))
        {
            results.Add(product);
        }
        return results;
    }
}
\`\`\`

### Ne Zaman Compiled Query Kullan?

| Durum | Compiled Query? | Neden |
|-------|:---:|--------|
| Saniyede yüzlerce kez çalışan endpoint | ✅ | Expression tree her seferinde parse edilmez, doğrudan cache'ten çalışır |
| Nadir çalışan rapor sorgusu | ❌ | Fark hissedilmez, kod karmaşıklaşır |
| Dinamik filtre/sıralama gereken sayfa | ❌ | Dynamic where/orderby desteklenmez |

> ⚠️ **Kısıtlamalar:**
> - Dynamic where/orderby **kullanılamaz**
> - \`Skip/Take\` parametrik yapılamaz (EF Core 8+: kısıtlı destek)
> - Global Query Filter'lar otomatik uygulanır

## 38. Multi-Tenancy Patterns 🔴

Tek uygulama ile birden fazla kiracıya (müşteri/organizasyon) hizmet vermek. Üç yaklaşım: aynı tabloda discriminator sütunu (basit), kiracı başına ayrı schema (orta), kiracı başına ayrı veritabanı (tam izolasyon). Güvenlik, performans ve maliyet dengesine göre seçilir.

### Pattern 1: Discriminator (Aynı Tablo — Global Filter)

\`\`\`csharp
// Tenant bilgisi
public interface ITenantEntity
{
    string TenantId { get; set; }
}

// Entities
public class Product : ITenantEntity
{
    public int Id { get; set; }
    public string Name { get; set; } = null!;
    public string TenantId { get; set; } = null!;  // Her satırda tenant bilgisi
}

// Tenant servis
public interface ITenantService
{
    string GetCurrentTenantId();
}

// DbContext
public class MultiTenantDbContext : DbContext
{
    private readonly string _tenantId;

    public MultiTenantDbContext(
        DbContextOptions options,
        ITenantService tenantService) : base(options)
    {
        _tenantId = tenantService.GetCurrentTenantId();
    }

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // Tüm tenant entity'lerine global filter
        modelBuilder.Entity<Product>()
            .HasQueryFilter(p => p.TenantId == _tenantId);

        modelBuilder.Entity<Order>()
            .HasQueryFilter(o => o.TenantId == _tenantId);
    }

    public override async Task<int> SaveChangesAsync(CancellationToken ct = default)
    {
        // Yeni kayıtlara otomatik tenant ata
        foreach (var entry in ChangeTracker.Entries<ITenantEntity>()
            .Where(e => e.State == EntityState.Added))
        {
            entry.Entity.TenantId = _tenantId;
        }
        return await base.SaveChangesAsync(ct);
    }
}
\`\`\`

### Pattern 2: Ayrı Veritabanı (Database per Tenant)

\`\`\`csharp
// Her tenant'ın kendi connection string'i var
public class TenantDbContextFactory
{
    private readonly ITenantService _tenantService;
    private readonly IConfiguration _config;

    public AppDbContext CreateContext()
    {
        var tenantId = _tenantService.GetCurrentTenantId();
        var connectionString = _config.GetConnectionString($"Tenant_{tenantId}");
        
        var options = new DbContextOptionsBuilder<AppDbContext>()
            .UseSqlServer(connectionString)
            .Options;

        return new AppDbContext(options);
    }
}

// Program.cs
builder.Services.AddDbContext<AppDbContext>((sp, options) =>
{
    var tenantService = sp.GetRequiredService<ITenantService>();
    var tenantId = tenantService.GetCurrentTenantId();
    var connectionString = configuration.GetConnectionString($"Tenant_{tenantId}");
    options.UseSqlServer(connectionString);
});
\`\`\`

{

}

### 3. SaveChanges Override (Basit Audit)

\`\`\`csharp
public class AppDbContext : DbContext
{
    private readonly ICurrentUserService _currentUser;

    public AppDbContext(DbContextOptions<AppDbContext> options, ICurrentUserService currentUser)
        : base(options) => _currentUser = currentUser;

    public override async Task<int> SaveChangesAsync(CancellationToken ct = default)
    {
        var now = DateTime.UtcNow;
        var user = _currentUser.UserName ?? "System";

        foreach (var entry in ChangeTracker.Entries<IAuditable>())
        {
            switch (entry.State)
            {
                case EntityState.Added:
                    entry.Entity.CreatedAt = now;
                    entry.Entity.CreatedBy = user;
                    break;

                case EntityState.Modified:
                    entry.Entity.UpdatedAt = now;
                    entry.Entity.UpdatedBy = user;
                    // CreatedAt/By değiştirilemesin
                    entry.Property(e => e.CreatedAt).IsModified = false;
                    entry.Property(e => e.CreatedBy).IsModified = false;
                    break;
            }
        }

        return await base.SaveChangesAsync(ct);
    }
}
\`\`\`

### 4. Detaylı Audit Log (Değişiklik Geçmişi)

\`\`\`csharp
// Audit log entity — her değişiklik bir kayıt
public class AuditLog
{
    public long Id { get; set; }
    public string EntityName { get; set; } = null!;
    public string EntityId { get; set; } = null!;
    public string Action { get; set; } = null!;       // Insert, Update, Delete
    public string? Changes { get; set; }               // JSON: eski→yeni değerler
    public string UserId { get; set; } = null!;
    public DateTime Timestamp { get; set; }
}

// SaveChanges'ta audit log oluşturma
private List<AuditLog> CreateAuditLogs()
{
    var logs = new List<AuditLog>();
    var user = _currentUser.UserId ?? "System";

    foreach (var entry in ChangeTracker.Entries()
        .Where(e => e.State is EntityState.Added or EntityState.Modified or EntityState.Deleted))
    {
        var log = new AuditLog
        {
            EntityName = entry.Entity.GetType().Name,
            EntityId = entry.Properties.FirstOrDefault(p => p.Metadata.IsPrimaryKey())
                            ?.CurrentValue?.ToString() ?? "",
            Action = entry.State.ToString(),
            UserId = user,
            Timestamp = DateTime.UtcNow
        };

        if (entry.State == EntityState.Modified)
        {
            var changes = new Dictionary<string, object?>();
            foreach (var prop in entry.Properties.Where(p => p.IsModified))
            {
                changes[prop.Metadata.Name] = new
                {
                    Old = prop.OriginalValue,
                    New = prop.CurrentValue
                };
            }
            log.Changes = JsonSerializer.Serialize(changes);
        }

        logs.Add(log);
    }

    return logs;
}

## 40. Veri Koruma — Encryption, Hashing & Masking 🔴

Production'da hassas veri (TC kimlik, kart no, şifre) saklama kaçınılmaz. Üç farklı strateji: Encrypt (şifrele/çöz — geri dönüşümlü), Hash (tek yönlü özetle — şifreler için), Mask (görünümü gizle — loglama/raporlama için). Her birinin kullanım yeri ve EF Core entegrasyonu farklı.

---

### Strateji Karşılaştırması

| Strateji | Geri Dönüşüm | Kullanım Alanı | Performans |
|----------|:---:|---|:---:|
| **Encryption** | ✅ Decrypt edilebilir | Kart no, TC kimlik, adres | 🟡 Orta |
| **Hashing** | ❌ Tek yönlü | Şifre, PIN, güvenlik sorusu | ✅ Hızlı |
| **Masking** | ✅ Orijinal saklanır | Loglama, API response, raporlama | ✅ Hızlı |

---

### 1. Application-Level Encryption (Value Converter ile)

> ⚠️ **GÜVENLİK:** AES-CBC modu (varsayılan) **padding oracle** saldırısına açıktır. Production'da **AES-GCM** kullanın — hem şifreleme hem authentication sağlar.

\`\`\`csharp
// Encrypt/Decrypt servisi — AES-GCM (Authenticated Encryption)
public interface IEncryptionService
{
    string Encrypt(string plainText);
    string Decrypt(string cipherText);
}

public class AesGcmEncryptionService : IEncryptionService
{
    private readonly byte[] _key;
    
    public AesGcmEncryptionService(IConfiguration config)
    {
        _key = Convert.FromBase64String(config["Encryption:Key"]!);
        if (_key.Length != 32)
            throw new ArgumentException("Encryption key must be 256 bits (32 bytes).");
    }

    public string Encrypt(string plainText)
    {
        var plainBytes = Encoding.UTF8.GetBytes(plainText);
        var nonce = new byte[AesGcm.NonceByteSizes.MaxSize];  // 12 bytes
        RandomNumberGenerator.Fill(nonce);
        
        var cipherBytes = new byte[plainBytes.Length];
        var tag = new byte[AesGcm.TagByteSizes.MaxSize];      // 16 bytes

        using var aes = new AesGcm(_key, AesGcm.TagByteSizes.MaxSize);
        aes.Encrypt(nonce, plainBytes, cipherBytes, tag);

        // Nonce (12) + Tag (16) + CipherText birlikte saklanır
        var result = new byte[nonce.Length + tag.Length + cipherBytes.Length];
        Buffer.BlockCopy(nonce, 0, result, 0, nonce.Length);
        Buffer.BlockCopy(tag, 0, result, nonce.Length, tag.Length);
        Buffer.BlockCopy(cipherBytes, 0, result, nonce.Length + tag.Length, cipherBytes.Length);
        return Convert.ToBase64String(result);
    }

    public string Decrypt(string cipherText)
    {
        var fullBytes = Convert.FromBase64String(cipherText);
        if (fullBytes.Length < 29)  // Nonce(12) + Tag(16) + en az 1 byte
            throw new CryptographicException("Invalid cipher text.");

        var nonce = fullBytes[..12];
        var tag = fullBytes[12..28];
        var cipherBytes = fullBytes[28..];
        var plainBytes = new byte[cipherBytes.Length];

        using var aes = new AesGcm(_key, AesGcm.TagByteSizes.MaxSize);
        aes.Decrypt(nonce, cipherBytes, tag, plainBytes);
        // Tampered veri → CryptographicException otomatik fırlatılır (GCM avantajı)
        
        return Encoding.UTF8.GetString(plainBytes);
    }
}
// ⚠️ Production'da key yönetimi için Azure Key Vault veya AWS KMS kullanın.
// Hardcoded key veya appsettings.json'da açık key ASLA production'a gitmesin.
// 💡 .NET 8+: AesGcm(key, tagSizeInBytes) constructor'ı kullanılmalı (eski overload deprecated).
\`\`\`

\`\`\`csharp
// Entity Configuration — Value Converter olarak uygula
public class CustomerConfiguration : IEntityTypeConfiguration<Customer>
{
    private readonly IEncryptionService _encryption;
    
    public CustomerConfiguration(IEncryptionService encryption)
        => _encryption = encryption;

    public void Configure(EntityTypeBuilder<Customer> builder)
    {
        builder.Property(c => c.NationalId)
            .HasMaxLength(500)  // Şifreli metin daha uzun olur!
            .HasConversion(
                v => _encryption.Encrypt(v),     // DB'ye yazarken şifrele
                v => _encryption.Decrypt(v));     // DB'den okurken çöz

        builder.Property(c => c.CreditCardNumber)
            .HasMaxLength(500)
            .HasConversion(
                v => _encryption.Encrypt(v),
                v => _encryption.Decrypt(v));
    }
}

\`\`\`csharp
// Key Rotation — mevcut verileri yeni anahtarla yeniden şifrele
public async Task RotateEncryptionKey(
    IEncryptionService oldService,
    IEncryptionService newService)
{
    var customers = await context.Customers.ToListAsync();
    // Value Converter eski key ile decrypt etti → plain-text elimizde

    // Yeni key'li converter'a geçiş yapıldıktan sonra SaveChanges
    // yeni key ile encrypt eder
    foreach (var c in customers)
    {
        // Property'yi "dirty" işaretle (değer aynı olsa bile yeniden yazılsın)
        context.Entry(c).Property(x => x.NationalId).IsModified = true;
        context.Entry(c).Property(x => x.CreditCardNumber).IsModified = true;
    }

    await context.SaveChangesAsync(); // Yeni converter ile re-encrypt
}
\`\`\`

> ⚠️ **Partial Update dikkat:**  
> - Eğer sadece \`customer.Name\` değiştirirseniz, EF şifreli sütunlara dokunmaz (zaten \`IsModified = false\`)  
> - \`ExecuteUpdateAsync()\` kullanıyorsanız Value Converter **çalışmaz** — ham SQL üretilir, şifrelemeyi kendiniz yapmalısınız:

\`\`\`csharp
// ❌ YANLIŞ — Value Converter ExecuteUpdate'te çalışmaz!
await context.Customers
    .Where(c => c.Id == 1)
    .ExecuteUpdateAsync(s => s.SetProperty(c => c.NationalId, "98765432101"));
// DB'ye plain-text "98765432101" yazılır!

// ✅ DOĞRU — Manuel şifrele
var encrypted = encryptionService.Encrypt("98765432101");
await context.Customers
    .Where(c => c.Id == 1)
    .ExecuteUpdateAsync(s => s.SetProperty(c => c.NationalId, encrypted));
\`\`\`
