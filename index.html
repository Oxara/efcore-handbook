<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EF Core Geliştirici El Kitabı</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23512BD4'/><text x='16' y='23' font-family='Arial,sans-serif' font-size='14' font-weight='bold' fill='white' text-anchor='middle'>EF</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark-dimmed.min.css">
    <style>
        :root {
            --bg: #0f1117;
            --bg-elevated: #161921;
            --surface: #1c1f2b;
            --surface2: #242837;
            --surface3: #2c3044;
            --text: #e2e4e9;
            --text-secondary: #9ca3b4;
            --text-muted: #6b7280;
            --accent: #7c8fb8;
            --accent-hover: #8da6ff;
            --accent-subtle: rgba(107, 138, 253, 0.08);
            --green: #34d399;
            --green-subtle: rgba(52, 211, 153, 0.08);
            --orange: #fb923c;
            --orange-subtle: rgba(251, 146, 60, 0.08);
            --red: #c76a6a;
            --red-subtle: rgba(248, 113, 113, 0.08);
            --yellow: #c4a44e;
            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.1);
            --tab-sql: #7c9cbf;
            --tab-pg: #6b9e7a;
            --code-bg: #12141d;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
            --radius-sm: 6px;
            --radius-md: 10px;
            --radius-lg: 14px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.75;
            font-size: 15px;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .layout {
            display: flex;
            min-height: calc(100vh - var(--header-height));
            margin-top: var(--header-height);
        }
        /* Top Header */
        :root { --header-height: 52px; }
        .top-header {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: var(--header-height);
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 1.25rem;
            gap: 1rem;
            z-index: 200;
        }
        .top-header .home-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 0.3rem;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
            line-height: 1;
        }
        .top-header .home-btn:hover {
            color: var(--accent);
            background: var(--accent-subtle);
        }
        .top-header .header-brand {
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .top-header .header-brand h1 {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text);
            margin: 0;
            line-height: 1.2;
        }
        .top-header .header-brand span {
            font-size: 0.65rem;
            color: var(--text-muted);
        }
        .top-header .header-spacer { flex: 1; }
        .top-header .global-switch {
            margin: 0;
        }
        .top-header .search-box {
            margin: 0;
            width: 380px;
        }
        /* Sidebar */
        .sidebar {
            position: fixed;
            left: 0; top: var(--header-height);
            width: 300px;
            height: calc(100vh - var(--header-height));
            overflow-y: auto;
            background: var(--bg-elevated);
            border-right: 1px solid var(--border);
            padding: 0.75rem 0 2rem;
            z-index: 100;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .sidebar-resize-handle {
            position: absolute;
            top: 0;
            right: -3px;
            width: 6px;
            height: 100%;
            cursor: col-resize;
            z-index: 101;
            background: transparent;
            transition: background 0.2s;
        }
        .sidebar-resize-handle:hover,
        .sidebar-resize-handle.active {
            background: var(--accent);
            opacity: 0.5;
        }
        .sidebar-brand {
            display: none;
        }
        .sidebar-brand span {
            font-size: 0.72rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-top: 2px;
            display: block;
        }
        .sidebar h2 {
            padding: 0.75rem 1.25rem 0.4rem;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            font-weight: 600;
        }
        .sidebar a {
            display: block;
            padding: 0.25rem 1rem 0.25rem 2.2rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 400;
            border-left: 2px solid transparent;
            transition: all 0.15s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .sidebar a:hover {
            color: var(--text);
            background: var(--accent-subtle);
        }
        .sidebar a.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: var(--accent-subtle);
            font-weight: 500;
        }
        /* Tree group styles */
        .toc-group {
            margin-bottom: 0.25rem;
        }
        .toc-group-header {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            padding: 0.4rem 1rem;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.04em;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
            border-radius: 4px;
            transition: all 0.15s ease;
        }
        .toc-group-header:hover {
            color: var(--text);
            background: var(--accent-subtle);
        }
        .toc-group-header .toc-chevron {
            font-size: 0.6rem;
            transition: transform 0.2s ease;
            opacity: 0.6;
        }
        .toc-group-header.collapsed .toc-chevron {
            transform: rotate(-90deg);
        }
        .toc-group-header .toc-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .toc-group-header .toc-count {
            margin-left: auto;
            font-size: 0.6rem;
            font-weight: 400;
            opacity: 0.5;
        }
        .toc-group-items {
            overflow: hidden;
            transition: max-height 0.25s ease;
        }
        .toc-group-items.collapsed {
            max-height: 0 !important;
        }
        .sidebar a.toc-sub-item {
            padding-left: 3rem;
            font-size: 0.7rem;
            color: var(--text-muted);
            opacity: 0.85;
        }
        .sidebar a.toc-sub-item:hover {
            color: var(--text);
            opacity: 1;
        }
        .sidebar a.toc-sub-item.active {
            color: var(--accent);
            border-left-color: var(--accent);
            background: var(--accent-subtle);
            font-weight: 500;
            opacity: 1;
        }
        .toc-sub-container {
            overflow: hidden;
        }
        /* Main content */
        .content {
            margin-left: 300px;
            max-width: 100%;
            padding: 3rem 4rem 6rem;
            width: calc(100% - 300px);
        }
        /* Typography */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--text);
            letter-spacing: -0.02em;
        }
        h2 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-top: 4rem;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            letter-spacing: -0.01em;
        }
        h3 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-top: 2rem;
            margin-bottom: 0.75rem;
            color: var(--text);
        }
        h4 {
            font-size: 0.92rem;
            font-weight: 600;
            margin-top: 1.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            letter-spacing: 0.02em;
        }
        p { margin-bottom: 1rem; color: var(--text-secondary); }
        a { color: var(--accent); text-decoration: none; transition: color 0.15s; }
        a:hover { color: var(--accent-hover); }
        strong { color: var(--text); font-weight: 600; }
        em { color: var(--text-secondary); }
        /* Code */
        code {
            background: var(--surface2);
            padding: 0.2em 0.45em;
            border-radius: 4px;
            font-size: 0.82em;
            font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', monospace;
            color: var(--accent-hover);
            border: 1px solid var(--border);
        }
        pre {
            background: var(--code-bg);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            padding: 1.25rem 1.5rem;
            overflow-x: auto;
            margin: 1rem 0 1.25rem;
            position: relative;
        }
        pre code {
            background: none;
            padding: 0;
            border: none;
            font-size: 0.8rem;
            line-height: 1.65;
            color: var(--text);
        }
        /* Tables */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 1rem 0 1.25rem;
            font-size: 0.84rem;
            border-radius: var(--radius-md);
            overflow: hidden;
            border: 1px solid var(--border-strong);
        }
        th, td {
            padding: 0.6rem 0.9rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            background: var(--surface2);
            color: var(--text);
            font-weight: 600;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        td { color: var(--text-secondary); background: var(--surface); }
        blockquote td, .callout td { background: var(--surface2); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--accent-subtle); }
        /* Blockquotes */
        blockquote {
            border-left: 3px solid var(--border-strong);
            background: var(--surface);
            padding: 1rem 1.25rem;
            margin: 1.25rem 0;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            color: var(--text-secondary);
        }
        blockquote p:last-child { margin-bottom: 0; }
        blockquote blockquote {
            border-left-color: var(--orange);
            background: var(--orange-subtle);
        }
        /* Tabbed Panels */
        .tabbed-panel {
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-lg);
            margin: 1.25rem 0;
            overflow: hidden;
            background: var(--surface);
            box-shadow: var(--shadow-sm);
        }
        .tab-header {
            display: flex;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 0 0.5rem;
        }
        .tab-btn {
            padding: 0.65rem 1.1rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.2s;
            position: relative;
            font-family: inherit;
            letter-spacing: 0.01em;
        }
        .tab-btn:hover {
            color: var(--text-secondary);
        }
        .tab-btn.active {
            color: var(--text);
        }
        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0.5rem; right: 0.5rem;
            height: 2px;
            border-radius: 2px 2px 0 0;
        }
        .tab-btn[data-provider="sqlserver"].active { color: var(--tab-sql); }
        .tab-btn[data-provider="sqlserver"].active::after { background: var(--tab-sql); }
        .tab-btn[data-provider="postgresql"].active { color: var(--tab-pg); }
        .tab-btn[data-provider="postgresql"].active::after { background: var(--tab-pg); }
        .tab-content {
            display: none;
            padding: 1rem 1.25rem;
        }
        .tab-content.active { display: block; }
        .tab-content pre { margin: 0.5rem 0; border: none; background: var(--code-bg); }
        /* Global provider switch — inside sidebar */
        .global-switch {
            display: flex;
            margin: 0 1.25rem 1rem;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            overflow: hidden;
        }
        .global-switch button {
            flex: 1;
            padding: 0.5rem 0.75rem;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 500;
            transition: all 0.2s;
            font-family: inherit;
        }
        .global-switch button:first-child { border-right: 1px solid var(--border); }
        .global-switch button.active-sql {
            background: rgba(96, 165, 250, 0.15);
            color: var(--tab-sql);
        }
        .global-switch button.active-pg {
            background: rgba(74, 222, 128, 0.15);
            color: var(--tab-pg);
        }
        /* Content flow — tighten gaps between adjacent blocks for visual cohesion */
        pre + blockquote,
        pre + .callout,
        blockquote + pre,
        .callout + pre,
        pre + .tabbed-panel,
        .tabbed-panel + blockquote,
        .tabbed-panel + .callout,
        blockquote + .tabbed-panel,
        .callout + .tabbed-panel,
        pre + table,
        table + blockquote,
        table + .callout,
        blockquote + table,
        .callout + table,
        table + pre,
        .tabbed-panel + pre {
            margin-top: 0.35rem;
        }
        /* When a blockquote/callout directly follows a pre, connect them visually */
        pre + blockquote,
        pre + .callout {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            margin-top: -1px;
            border-top: 1px solid var(--border);
        }
        /* When a pre directly follows a blockquote/callout, connect them as one piece */
        blockquote + pre,
        .callout + pre {
            border-top-left-radius: 0;
            border-top-right-radius: 0;
            border-bottom-left-radius: 0;
            margin-top: -1px;
            border-left: 3px solid var(--border-strong);
        }
        /* When a pre follows immediately after another pre */
        pre + pre {
            margin-top: -1px;
            border-top-left-radius: 0;
            border-top-right-radius: 0;
        }
        /* Soften bottom radius when followed by adjacent block */
        pre:has(+ blockquote),
        pre:has(+ .callout) {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
        }
        blockquote:has(+ pre),
        .callout:has(+ pre) {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
        }
        pre:has(+ pre) {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
        }
        /* tabbed-panel to blockquote connection */
        .tabbed-panel:has(+ blockquote),
        .tabbed-panel:has(+ .callout) {
            border-bottom-left-radius: 0;
            border-bottom-right-radius: 0;
            margin-bottom: 0;
        }
        .tabbed-panel + blockquote,
        .tabbed-panel + .callout {
            border-top-right-radius: 0;
            margin-top: -1px;
            border-top: 1px solid var(--border);
        }
        /* Callouts */
        .callout {
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            margin: 1.25rem 0;
            border-left: 3px solid;
            background: var(--surface);
        }
        .callout-tip { border-color: var(--green); background: var(--green-subtle); }
        .callout-warn { border-color: var(--orange); background: var(--orange-subtle); }
        .callout-danger { border-color: var(--red); background: var(--red-subtle); }
        .callout-info { border-color: var(--accent); background: var(--accent-subtle); }
        /* Responsive */
        .sidebar-toggle {
            display: none;
            position: fixed;
            top: 1rem; left: 1rem;
            z-index: 150;
            background: var(--surface);
            border: 1px solid var(--border-strong);
            color: var(--text);
            width: 40px; height: 40px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-size: 1.1rem;
            box-shadow: var(--shadow-md);
            display: none;
            align-items: center;
            justify-content: center;
        }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
            .sidebar-toggle { display: flex; }
            .content { margin-left: 0; padding: 3rem 2rem 6rem; max-width: 100%; width: 100%; }
        }
        @media (max-width: 600px) {
            .content { padding: 2rem 1.25rem 4rem; }
            h1 { font-size: 1.6rem; }
            h2 { font-size: 1.2rem; margin-top: 3rem; }
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
        .sidebar::-webkit-scrollbar { width: 4px; }
        /* Details */
        details {
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-md);
            margin: 0.75rem 0;
            padding: 0.75rem 1.25rem;
            background: var(--surface);
        }
        details summary {
            cursor: pointer;
            font-weight: 500;
            padding: 0.3rem 0;
            color: var(--text);
            font-size: 0.88rem;
        }
        details summary:hover { color: var(--accent); }
        /* HR */
        hr {
            border: none;
            border-top: 1px solid var(--border);
            margin: 3rem 0;
        }
        /* Lists */
        ul, ol { padding-left: 1.5rem; margin: 0.75rem 0; }
        li { margin: 0.35rem 0; color: var(--text-secondary); }
        li strong { color: var(--text); }
        /* Search */
        .search-box {
            padding: 0.5rem 1.25rem;
            margin-bottom: 0.75rem;
        }
        .search-box input {
            width: 100%;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-strong);
            border-radius: var(--radius-sm);
            background: var(--surface);
            color: var(--text);
            font-size: 0.8rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-box input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(107, 138, 253, 0.1);
        }
        .search-box input::placeholder { color: var(--text-muted); }
        /* Section level indicators */
        .level-badge {
            display: inline-block;
            font-size: 0.65rem;
            font-weight: 600;
            padding: 0.15em 0.5em;
            border-radius: 3px;
            margin-left: 0.5rem;
            vertical-align: middle;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .level-basic { background: rgba(52, 211, 153, 0.15); color: var(--green); }
        .level-mid { background: rgba(251, 191, 36, 0.15); color: var(--yellow); }
        .level-advanced { background: rgba(251, 146, 60, 0.15); color: var(--orange); }
        .level-expert { background: rgba(248, 113, 113, 0.15); color: var(--red); }
        .level-ref { background: rgba(107, 138, 253, 0.12); color: var(--accent); }
        /* Mermaid — removed, no longer used */
        /* Section dividers (h1 used as group headers) */
        .content h1:not(:first-child) {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--text-muted);
            margin-top: 6rem;
            margin-bottom: 3rem;
            padding: 0;
            border: none;
            background: none;
            display: flex;
            align-items: center;
            gap: 1.25rem;
            position: relative;
            box-shadow: none;
        }
        .content h1:not(:first-child)::before,
        .content h1:not(:first-child)::after {
            content: '';
            flex: 1;
            height: 1px;
        }
        .content h1:not(:first-child)::before {
            background: linear-gradient(to right, transparent, var(--border-strong));
        }
        .content h1:not(:first-child)::after {
            background: linear-gradient(to left, transparent, var(--border-strong));
        }
        .content h1.level-divider-basic { color: var(--green); }
        .content h1.level-divider-basic::before { background: linear-gradient(to right, transparent, var(--green)); }
        .content h1.level-divider-basic::after { background: linear-gradient(to left, transparent, var(--green)); }
        .content h1.level-divider-mid { color: var(--yellow); }
        .content h1.level-divider-mid::before { background: linear-gradient(to right, transparent, var(--yellow)); }
        .content h1.level-divider-mid::after { background: linear-gradient(to left, transparent, var(--yellow)); }
        .content h1.level-divider-advanced { color: var(--orange); }
        .content h1.level-divider-advanced::before { background: linear-gradient(to right, transparent, var(--orange)); }
        .content h1.level-divider-advanced::after { background: linear-gradient(to left, transparent, var(--orange)); }
        .content h1.level-divider-expert { color: var(--red); }
        .content h1.level-divider-expert::before { background: linear-gradient(to right, transparent, var(--red)); }
        .content h1.level-divider-expert::after { background: linear-gradient(to left, transparent, var(--red)); }
        .content h1.level-divider-ref { color: var(--accent); }
        .content h1.level-divider-ref::before { background: linear-gradient(to right, transparent, var(--accent)); }
        .content h1.level-divider-ref::after { background: linear-gradient(to left, transparent, var(--accent)); }
        /* Progress indicator on scroll */
        .scroll-progress {
            position: fixed;
            top: 0; left: 280px; right: 0;
            height: 2px;
            background: var(--accent);
            transform-origin: left;
            transform: scaleX(0);
            z-index: 200;
            transition: none;
        }
        @media (max-width: 1024px) {
            .scroll-progress { left: 0; }
        }
        /* Back to top */
        .back-to-top {
            position: fixed;

## Giriş

Bu doküman, **Entity Framework Core** ile çalışan .NET geliştiricileri için kapsamlı bir başvuru kaynağıdır. Başlangıç seviyesinden uzman konulara kadar kademeli bir öğrenme yolu sunar.

**Nasıl kullanılır?**
- 🟢 **Temel** — EF Core'a yeni başlıyorsan buradan başla. DbContext, property, index temelleri.
- 🟡 **Orta** — İlişkiler, migration, change tracking gibi günlük geliştirmede sürekli kullanacağın konular.
- 🟠 **İleri** — Owned entities, inheritance, concurrency, testing gibi mimari kararları etkileyen konular.
- 🔴 **Uzman** — Interceptors, multi-tenancy, audit trail gibi production-grade pattern'lar.
- 📋 **Referans** — Hızlı bakış tabloları, annotations özeti, provider karşılaştırması.

**Her bölümde:** Fluent API kodu → üretilen SQL → açıklayıcı diyagram → pratik ipuçları → sık yapılan hatalar.

> 💡 Örnekler **SQL Server** ve **PostgreSQL** üzerinden verilmiştir. Provider'a özgü farklar için → [Bölüm 41](#41-provider-uyumluluğu--sql-server-postgresql-oracle-sqlite)

### EF Core Ne Zaman Kullanmalı, Ne Zaman Kullanmamalı?

**✅ EF Core iyi bir tercih:**
- Tipik web API / MVC uygulamaları (CRUD işlemleri)
- İş kuralları olan domain modelleri (ilişkiler, validasyonlar)
- Migration ile veritabanı şemasını kod olarak yönetmek istiyorsan
- Transaction yönetimi gereken işlemler

**⚠️ Bu durumlarda EF Core'un doğru özelliğini seç:**

| Durum | Sorun (basitçe) | EF Core Çözümü |
|-------|-----------------|----------------|
| Çok büyük veri aktarımı (100K+ satır) | Her satırı ayrı ayrı izler → yavaş | \`ExecuteUpdate\` / \`ExecuteDelete\` + \`SqlBulkCopy\` (ADO.NET) |
| Sadece veri okuma (raporlama) | Her satır için C# nesnesi oluşturur, ağır | \`.AsNoTracking()\` + projeksiyon (\`Select\`) |
| Zaten stored procedure kullanıyorsun | SP zaten işi yapıyor | \`FromSqlInterpolated\` ile SP çağır |
| Çok basit 2-3 tabloluk uygulama | Konfigürasyon yükü fazla gelebilir | Minimal API + \`DbContext\` (tek dosyada bile çalışır) |

> 💡 **EF Core tek başına yeterli:** Change tracking gereksizse \`AsNoTracking()\`, toplu işlem gerekiyorsa \`ExecuteUpdate/Delete\`, ham SQL gerekiyorsa \`FromSqlInterpolated\` kullan. İlerledikçe her birini detaylı göreceksin.

# 🟢 TEMEL (BAŞLANGIÇ)

## 1. DbContext & DbSet Kurulumu 🟢

DbContext, uygulama ile veritabanı arasındaki köprüdür. Her sorgu, her kayıt bu köprüden geçer.

### Temel Kurulum

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`csharp
// NuGet: dotnet add package Microsoft.EntityFrameworkCore.SqlServer

// appsettings.json
{
  "ConnectionStrings": {
    "Default": "Server=.;Database=MyDb;Trusted_Connection=True;TrustServerCertificate=True;"
  }
}

// Program.cs
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseSqlServer(builder.Configuration.GetConnectionString("Default")));
\`\`\`

💡 **Connection String parametreleri (SQL Server):**
| Parametre | Varsayılan | Açıklama |
|-----------|:---:|---|
| \`Server\` | — | Sunucu adı (\`.\` = localhost, \`.\\SQLEXPRESS\`) |
| \`Database\` | — | Veritabanı adı |
| \`Trusted_Connection\` | false | \`True\` → Windows Auth |
| \`User Id\` / \`Password\` | — | SQL Auth (Trusted_Connection=False ise) |
| \`TrustServerCertificate\` | false | Dev'de \`True\` (self-signed cert) |
| \`MultipleActiveResultSets\` | false | Nested reader'lar için (EF Core'da genelde gereksiz) |
| \`Encrypt\` | true (.NET 7+) | Bağlantı şifreleme |
| \`Connection Timeout\` | 15 | Bağlantı zaman aşımı (sn) |
| \`Max Pool Size\` | 100 | Connection pool boyutu |

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`csharp
// NuGet: dotnet add package Npgsql.EntityFrameworkCore.PostgreSQL
// NuGet: dotnet add package EFCore.NamingConventions  (opsiyonel, şiddetle önerilen)

// appsettings.json
{
  "ConnectionStrings": {
    "Default": "Host=localhost;Port=5432;Database=mydb;Username=app;Password=***;"
  }
}

// Program.cs
builder.Services.AddDbContext<AppDbContext>(options =>
    options.UseNpgsql(builder.Configuration.GetConnectionString("Default"))
           .UseSnakeCaseNamingConvention());  // Products → products, OrderDate → order_date
\`\`\`

💡 **Connection String parametreleri (Npgsql):**
| Parametre | Varsayılan | Açıklama |
|-----------|:---:|---|
| \`Host\` | localhost | Sunucu adresi |
| \`Port\` | 5432 | PostgreSQL portu |
| \`Database\` | — | Veritabanı adı |
| \`Username\` | — | Kullanıcı |
| \`Password\` | — | Şifre |
| \`SSL Mode\` | Prefer | \`Require\` → production'da zorunlu |
| \`Maximum Pool Size\` | 100 | İç havuz boyutu |
| \`Connection Idle Lifetime\` | 300 | Boş bağlantı ömrü (sn) |
| \`Include Error Detail\` | false | Dev'de \`true\` yap (detaylı hata) |
| \`Command Timeout\` | 30 | Sorgu zaman aşımı (sn) |

> ⚠️ **Naming Convention:**  
> PostgreSQL dünyasında standart \`snake_case\`'dir. \`UseSnakeCaseNamingConvention()\` olmadan EF Core, C#'taki \`PascalCase\` isimleri doğrudan kullanır → \`"Products"\` (tırnaklı). Bu, \`psql\`'de her seferinde çift tırnak yazmak zorunda bırakır.

</details>

> 🚨 **Güvenlik — Connection String Yönetimi:**  
> Yukarıdaki örneklerde şifreler doğrudan \`appsettings.json\` içinde gösterilmiştir — bu sadece **geliştirme ortamı** içindir. Production'da connection string'leri **asla** kaynak kodda veya config dosyasında saklamayın:
> - **Development:** \`dotnet user-secrets set "ConnectionStrings:Default" "..."\`
> - **Production:** Environment variable, Azure Key Vault veya AWS Secrets Manager kullanın
> - \`appsettings.Development.json\` dosyasını \`.gitignore\`'a ekleyin

### DbContext Sınıfı

\`\`\`csharp
public class AppDbContext : DbContext
{
    public AppDbContext(DbContextOptions<AppDbContext> options) : base(options) { }

    public DbSet<Product> Products { get; set; }
    public DbSet<Category> Categories { get; set; }

    protected override void OnModelCreating(ModelBuilder modelBuilder)
    {
        // Tüm config sınıflarını assembly'den otomatik yükle
        modelBuilder.ApplyConfigurationsFromAssembly(typeof(AppDbContext).Assembly);
    }
}
\`\`\`

> 💡 \`DbSet<Product>\` = SQL'deki \`Products\` tablosu.  
> \`context.Products.Where(...)\` yazıldığında arka planda \`SELECT ... FROM Products WHERE ...\` oluşur.

> ⚠️ **Lifetime:** \`AddDbContext\` varsayılan olarak **Scoped** kayıt yapar — her HTTP request'te bir instance oluşur ve request sonunda dispose edilir.

### DbContext Yaşam Döngüsü & IDbContextFactory

DbContext'in ne zaman oluşup ne zaman yok edildiğini anlamak, memory leak ve thread-safety hatalarından korunmanın temelidir. \`AddDbContext\` varsayılan olarak **Scoped** kayıt yapar — her HTTP request'te bir instance oluşur, request bitince dispose edilir.

| \`AddDbContext\` | Controller, API endpoint | Her request'te otomatik oluşur/yok olur |

| \`AddPooledDbContextFactory\` | Yüksek throughput | Context nesnesi havuzlanır, allocation azalır |

           .UseSnakeCaseNamingConvention());

// Pooled Factory (yüksek throughput için)
builder.Services.AddPooledDbContextFactory<AppDbContext>(options =>
    options.UseNpgsql(connectionString)
           .UseSnakeCaseNamingConvention());
\`\`\`

> 💡 Npgsql'in \`Maximum Pool Size\` → TCP bağlantılarını havuzlar. EF Core'un Pool'u → DbContext **nesnesini** havuzlar. İkisi birlikte çalışır.

</details>

#### IDbContextFactory Kullanımı

Request dışı senaryolarda (Background Service, Blazor Server, gRPC) context'i kendin oluşturup kendin dispose etmelisin:

\`\`\`csharp
public class OrderProcessingService : BackgroundService
{
    private readonly IDbContextFactory<AppDbContext> _factory;

    public OrderProcessingService(IDbContextFactory<AppDbContext> factory)
        => _factory = factory;

    protected override async Task ExecuteAsync(CancellationToken stoppingToken)
    {
        while (!stoppingToken.IsCancellationRequested)
        {
            await using var context = await _factory.CreateDbContextAsync(stoppingToken);
            
            var pending = await context.Orders
                .Where(o => o.Status == OrderStatus.Pending)
                .ToListAsync(stoppingToken);

            foreach (var order in pending)
                order.Status = OrderStatus.Processing;

            await context.SaveChangesAsync(stoppingToken);
            await Task.Delay(TimeSpan.FromSeconds(30), stoppingToken);
        }
    }
}
\`\`\`

#### Dikkat Edilmesi Gerekenler

\`\`\`csharp
// ❌ DbContext'i Singleton olarak kaydetme — thread-safe DEĞİL
builder.Services.AddSingleton<AppDbContext>();

// ❌ Aynı DbContext ile paralel sorgu — ÇÖKER
var task1 = context.Products.ToListAsync();
var task2 = context.Orders.ToListAsync();
await Task.WhenAll(task1, task2);  // DbContext thread-safe değil!

// ✅ Paralel iş gerekiyorsa her biri için ayrı context
await using var ctx1 = await factory.CreateDbContextAsync();
await using var ctx2 = await factory.CreateDbContextAsync();
await Task.WhenAll(ctx1.Products.ToListAsync(), ctx2.Orders.ToListAsync());
\`\`\`

## 2. IEntityTypeConfiguration — Ayrı Config Sınıfları 🟢

Entity konfigürasyonlarını ayrı sınıflara ayırmak, DbContext'in \`OnModelCreating\` metodunu şişirmeden her entity'nin kurallarını kendi dosyasında yönetmeni sağlar. Proje büyüdükçe bakım kolaylığı için şart.

#### Kullanım

\`\`\`csharp
// Ayrı config sınıfı
public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.ToTable("Products", "catalog");
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Name).IsRequired().HasMaxLength(200);
    }
}

// DbContext'te otomatik kayıt
modelBuilder.ApplyConfigurationsFromAssembly(Assembly.GetExecutingAssembly());

// Ya da tek tek
modelBuilder.ApplyConfiguration(new ProductConfiguration());
\`\`\`

    └── Persistence/
        ├── AppDbContext.cs
        └── Configurations/
            ├── ProductConfiguration.cs
            ├── CategoryConfiguration.cs
            └── UserConfiguration.cs

## 3. Entity Type Configuration — Tablo / Şema 🟢

Entity'nin hangi tabloya, hangi schema'ya map edileceğini belirler. Varsayılan olarak EF Core, DbSet adını tablo adı olarak kullanır. Farklı bir tablo adı, schema veya view'a yönlendirmek istediğinde bu ayarları kullanırsın.

#### Fluent API

\`\`\`csharp
// Tablo adı belirleme
builder.ToTable("Products");
builder.ToTable("Products", schema: "catalog");

// View'a mapping (salt okunur)
builder.ToView("ProductsView");
builder.ToView("ProductsView", schema: "catalog");

// SQL Server: Memory-Optimized Table
builder.ToTable("Products", t => t.IsMemoryOptimized());

// Tabloya yorum ekleme
builder.ToTable("Products", t => t.HasComment("Ürün kataloğu tablosu"));

// Discriminator (TPH için — bkz. bölüm 16)
builder.HasDiscriminator<string>("Type")
       .HasValue<Product>("product")
       .HasValue<DigitalProduct>("digital");
\`\`\`

**📌 SQL çıktıları:**

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Schema oluşturma
CREATE SCHEMA [catalog];
GO

-- Tablo oluşturma (schema ile)
CREATE TABLE [catalog].[Products] (
    -- ... sütunlar
) ;
GO

-- Tabloya yorum ekleme
EXEC sp_addextendedproperty 
    @name = N'MS_Description', 
    @value = N'Ürün kataloğu tablosu',
    @level0type = N'SCHEMA', @level0name = 'catalog',
    @level1type = N'TABLE',  @level1name = 'Products';
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
CREATE SCHEMA catalog;

CREATE TABLE catalog.products (
    -- snake_case sütunlar...
);

COMMENT ON TABLE catalog.products IS 'Ürün kataloğu tablosu';
\`\`\`

> ⚠️ **PostgreSQL Case-Sensitivity Tuzağı:**
> PostgreSQL'de tırnak (\`""\`) olmadan yazılan her identifier otomatik **lowercase'e** dönüştürülür.
> EF Core varsayılanda C# isimleriyle (PascalCase) tablo oluşturur → her sorguda \`""\` zorunlu olur:
>
> \`\`\`sql
> -- EF varsayılan (NamingConvention OLMADAN):
> CREATE TABLE "Products" ("Id" INT, "OrderDate" TIMESTAMPTZ);
>
> SELECT * FROM Products;     -- ❌ HATA! PG bunu "products" olarak arar, bulamaz
> SELECT * FROM "Products";   -- ✅ Çalışır ama her yerde "" yazmak zorunda kalırsın
>
> -- snake_case convention İLE:
> CREATE TABLE products (id INT, order_date TIMESTAMPTZ);
>
> SELECT * FROM products;     -- ✅ Doğrudan çalışır, "" gerekmez!
> SELECT id, order_date FROM products WHERE id = 1;  -- ✅ Temiz, okunabilir
> \`\`\`
>
> **Kural:** PostgreSQL projelerinde **her zaman** \`UseSnakeCaseNamingConvention()\` kullan.
> Aksi halde psql, pgAdmin, Dbeaver veya raw SQL'de sürekli \`""\` yazmak zorunda kalırsın.

\`\`\`csharp
// PostgreSQL snake_case convention (NuGet: EFCore.NamingConventions)
options.UseNpgsql(connectionString)
       .UseSnakeCaseNamingConvention();  // Products → products, CreatedAt → created_at

// ⚠️ Bu paketi projenin BAŞINDA ekle! Mevcut migration'larla sonradan eklemek
// tüm tablo/sütun adlarını değiştirir → büyük migration oluşur.
// NuGet: dotnet add package EFCore.NamingConventions

// Schema belirtme (PostgreSQL)
builder.ToTable("products", schema: "catalog");
\`\`\`

</details>

## 4. Primary Key Yapılandırması 🟢

Her tablonun bir primary key'i olmalıdır. EF Core, \`Id\` veya \`<EntityName>Id\` adlı property'yi otomatik PK olarak algılar. Farklı bir yapı istiyorsan (composite key, GUID, identity kontrolü) Fluent API ile belirtirsin.

#### Fluent API

\`\`\`csharp
// Tek kolon PK
builder.HasKey(p => p.Id);

// Composite (bileşik) PK
builder.HasKey(p => new { p.OrderId, p.ProductId });

// Alternatif anahtar (Unique Constraint)
builder.HasAlternateKey(p => p.Sku);
builder.HasAlternateKey(p => new { p.TenantId, p.Code });

// Identity / Key generation
builder.Property(p => p.Id)
       .ValueGeneratedOnAdd();           // IDENTITY (varsayılan int/long için)

builder.Property(p => p.Id)
       .ValueGeneratedNever();           // Uygulama atar

builder.Property(p => p.UpdatedAt)
       .ValueGeneratedOnAddOrUpdate();   // Genelde rowversion / timestamp ile

// GUID — EF Core 8: UUID v7 (sıralı, index dostu)
builder.Property(p => p.Id)
       .HasDefaultValueSql("NEWSEQUENTIALID()");   // SQL Server
\`\`\`

**📌 SQL Karşılığı:**

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Tek kolon PK + IDENTITY
CREATE TABLE [Products] (
    [Id] INT IDENTITY(1,1) NOT NULL,
    CONSTRAINT [PK_Products] PRIMARY KEY CLUSTERED ([Id])
);

-- Composite PK (IDENTITY yok — uygulama atar)
CREATE TABLE [OrderProducts] (
    [OrderId]   INT NOT NULL,
    [ProductId] INT NOT NULL,
    CONSTRAINT [PK_OrderProducts] PRIMARY KEY CLUSTERED ([OrderId], [ProductId])
);

-- Alternate Key = UNIQUE CONSTRAINT
ALTER TABLE [Products]
ADD CONSTRAINT [AK_Products_Sku] UNIQUE ([Sku]);

-- GUID ile NEWSEQUENTIALID
CREATE TABLE [Products] (
    [Id] UNIQUEIDENTIFIER NOT NULL DEFAULT NEWSEQUENTIALID(),
    CONSTRAINT [PK_Products] PRIMARY KEY NONCLUSTERED ([Id])
);
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Tek kolon PK + IDENTITY
CREATE TABLE products (
    id   INT GENERATED ALWAYS AS IDENTITY,
    CONSTRAINT pk_products PRIMARY KEY (id)
);

-- Composite PK
CREATE TABLE order_products (
    order_id   INT NOT NULL,
    product_id INT NOT NULL,
    CONSTRAINT pk_order_products PRIMARY KEY (order_id, product_id)
);

-- Alternate Key = UNIQUE CONSTRAINT
ALTER TABLE products
ADD CONSTRAINT ak_products_sku UNIQUE (sku);

-- UUID
CREATE TABLE products (
    id   UUID NOT NULL DEFAULT gen_random_uuid(),
    CONSTRAINT pk_products PRIMARY KEY (id)
);
\`\`\`

\`\`\`csharp
// PostgreSQL PK stratejileri
builder.Property(p => p.Id)
       .UseIdentityAlwaysColumn();              // GENERATED ALWAYS AS IDENTITY

builder.Property(p => p.Id)
       .UseIdentityByDefaultColumn();           // GENERATED BY DEFAULT AS IDENTITY (override edilebilir)

// UUID kullanımı (PostgreSQL native uuid tipi)
builder.Property(p => p.Id)
       .HasColumnType("uuid")
       .HasDefaultValueSql("gen_random_uuid()"); // PG 13+
\`\`\`

</details>

💡 **Ne zaman ne kullanılır?**
| Senaryo | Key Tipi |
|---------|----------|
| Genel CRUD uygulaması | \`int\` + IDENTITY |
| Dağıtık sistem / Microservice | \`Guid\` / \`UUID\` |
| Dışarıdan gelen veri (import) | \`ValueGeneratedNever\` |
| Ara tablo (join entity) | Composite PK |

> ⚠️ **PostgreSQL UUID notu:** \`gen_random_uuid()\` sıralı değildir → B-tree index fragmentation'a dikkat. Alternatif: UUIDv7 (uygulama tarafında üretilen sıralı UUID, EF Core 8+ ile \`NewGuid()\` override).

## 5. Property (Sütun) Yapılandırması 🟢

C# property'lerinin veritabanındaki sütunlara nasıl dönüşeceğini kontrol eder: veri tipi, uzunluk, null olup olmayacağı, varsayılan değer, computed column gibi. Konfigüre etmezsen EF Core convention'lara göre tahmin eder — ama production'da bunu şansa bırakma.

#### Fluent API

\`\`\`csharp
// Zorunluluk
builder.Property(p => p.Name).IsRequired();
builder.Property(p => p.Description).IsRequired(false);  // nullable

// Maksimum uzunluk
builder.Property(p => p.Name).HasMaxLength(200);

// Sütun adı
builder.Property(p => p.Name).HasColumnName("ProductName");

// Sütun tipi
builder.Property(p => p.Price).HasColumnType("decimal(18,2)");
builder.Property(p => p.Description).HasColumnType("nvarchar(max)");

// Varsayılan değer
builder.Property(p => p.IsActive).HasDefaultValue(true);
builder.Property(p => p.CreatedAt).HasDefaultValueSql("GETUTCDATE()");

// Computed column (hesaplanmış sütun) — Virtual: diskte saklanmaz, her SELECT'te hesaplanır
builder.Property(p => p.FullName)
       .HasComputedColumnSql("[FirstName] + ' ' + [LastName]");

// Stored (Persisted) computed column — Diskte saklanır, INDEX konulabilir, sadece INSERT/UPDATE'te hesaplanır
builder.Property(p => p.FullName)
       .HasComputedColumnSql("[FirstName] + ' ' + [LastName]", stored: true);
// stored: false (varsayılan) → SQL: AS ([FirstName] + ' ' + [LastName])
// stored: true             → SQL: AS ([FirstName] + ' ' + [LastName]) PERSISTED
// 💡 Sık WHERE/ORDER BY'da kullanılacaksa → stored: true + index oluştur

// Unicode
builder.Property(p => p.Name).IsUnicode(true);   // nvarchar
builder.Property(p => p.Code).IsUnicode(false);  // varchar

// Sütun sırası (EF Core 7+)
builder.Property(p => p.Name).HasColumnOrder(1);

// Sütun yorum (comment)
builder.Property(p => p.Price).HasComment("KDV dahil fiyat");

// Ignore — property'yi veritabanına MAP ETME (sütun oluşmaz)
builder.Ignore(p => p.DisplayPrice);      // Sadece UI'da kullanılan hesaplanmış alan
builder.Ignore(p => p.IsInStock);         // Başka servisten gelen runtime değer
// Ne zaman kullanılır?
// - Property sadece uygulama katmanında anlam taşıyorsa (NotMapped alternatifi)
// - Backing field olmayan computed property'ler
// - Serializasyon/DTO amaçlı property'ler (ör: FullAddress = City + " " + District)
// [NotMapped] attribute ile aynı iş — ama Fluent API'de yapılır

// Precision & Scale (decimal için kısayol)
builder.Property(p => p.Price).HasPrecision(18, 2);

// 🆕 EF Core 10 (GA — .NET 10): Custom Default Constraint adları
builder.Property(p => p.CreatedAt)
       .HasDefaultValueSql("GETUTCDATE()", "DF_Products_CreatedAt");  // İkinci parametre: constraint adı

// Tüm default constraint'lere otomatik isim ver:
modelBuilder.UseNamedDefaultConstraints();  // SQL Server
// ⚠️ Mevcut migration'larınız varsa, bir sonraki migration TÜM constraint'leri rename eder!
\`\`\`

**📌 Tam bir örnek — C# entity'si ve karşılık gelen SQL:**

\`\`\`csharp
public class Product
{
    public int Id { get; set; }
    public string Name { get; set; }
    public string FirstName { get; set; }
    public string LastName { get; set; }
    public string Code { get; set; }
    public decimal Price { get; set; }
    public string Description { get; set; }
    public bool IsActive { get; set; }
    public DateTime CreatedAt { get; set; }
    public string FullName { get; set; }  // computed: FirstName + ' ' + LastName
}

## 6. Index Yapılandırması 🟢

Index, sorgu performansını doğrudan etkiler. \`WHERE\`, \`ORDER BY\` veya \`JOIN\` sık kullandığın sütunlara index koymak sorguyu tablonun tamamını taramaktan kurtarır. Ama her sütuna index koymak INSERT/UPDATE'i yavaşlatır — dengeli kullan.

#### Fluent API

\`\`\`csharp
// Tek kolon index
builder.HasIndex(p => p.Email);

// Unique index
builder.HasIndex(p => p.Email).IsUnique();

// Bileşik index
builder.HasIndex(p => new { p.LastName, p.FirstName });

// Kümeleli (Clustered) index — SQL Server
builder.HasIndex(p => p.CreatedAt).IsClustered();

// Non-clustered unique — SQL Server
builder.HasKey(p => p.Id).IsClustered(false);

// Index adı
builder.HasIndex(p => p.Email).HasDatabaseName("IX_Users_Email");

// Filtrelenmiş index (partial index)
builder.HasIndex(p => p.Email)
       .IsUnique()
       .HasFilter("[DeletedAt] IS NULL");

// Include columns (SQL Server — covering index)
builder.HasIndex(p => p.LastName)
       .IncludeProperties(p => new { p.FirstName, p.Email });

// Index yorum
builder.HasIndex(p => p.Sku)
       .HasDatabaseName("IX_Products_Sku")
       .HasComment("Stok kodu için benzersiz index");
\`\`\`

**📌 SQL Karşılıkları:**

<details>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- Tek kolon index
CREATE NONCLUSTERED INDEX [IX_Users_Email] 
ON [Users] ([Email]);

-- Unique index
CREATE UNIQUE NONCLUSTERED INDEX [IX_Users_Email] 
ON [Users] ([Email]);

-- Bileşik index
CREATE NONCLUSTERED INDEX [IX_Users_LastName_FirstName] 
ON [Users] ([LastName], [FirstName]);

-- Filtrelenmiş index (soft delete senaryosu)
CREATE UNIQUE NONCLUSTERED INDEX [IX_Users_Email] 
ON [Users] ([Email]) 
WHERE [DeletedAt] IS NULL;

-- Covering index (Include)
CREATE NONCLUSTERED INDEX [IX_Users_LastName] 
ON [Users] ([LastName]) 
INCLUDE ([FirstName], [Email]);
\`\`\`

</details>

<details open>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- Tek kolon index (btree varsayılan)
CREATE INDEX ix_users_email ON users (email);

-- Unique index
CREATE UNIQUE INDEX ix_users_email ON users (email);

-- Bileşik index
CREATE INDEX ix_users_lastname_firstname ON users (last_name, first_name);

-- Partial index (filtered — soft delete)
CREATE UNIQUE INDEX ix_users_email ON users (email) WHERE deleted_at IS NULL;

-- Covering index (PG 11+)
CREATE INDEX ix_users_lastname ON users (last_name) INCLUDE (first_name, email);

-- PostgreSQL'e özgü index türleri:
CREATE INDEX ix_products_tags ON products USING gin (tags);           -- GIN: Array/JSONB/FTS
CREATE INDEX ix_products_search ON products USING gin (search_vector); -- Full-text
CREATE INDEX ix_products_location ON products USING gist (location);   -- GiST: Spatial
CREATE INDEX ix_products_created ON products USING brin (created_at);   -- BRIN: Büyük tablo, sıralı veri
\`\`\`

\`\`\`csharp
// PostgreSQL'e özgü index türleri (Fluent API)
builder.HasIndex(p => p.Tags)
       .HasMethod("gin");                    // GIN: Array, JSONB, Full-text için

builder.HasIndex(p => p.SearchVector)
       .HasMethod("gin");                    // Full-text search vector

builder.HasIndex(p => p.Location)
       .HasMethod("gist");                   // GiST: Geometric/range types için

builder.HasIndex(p => p.CreatedAt)
       .HasMethod("brin");                   // BRIN: Büyük tablolarda tarih/sıralı veri (çok küçük index)

// Partial index (filtrelenmiş) — PostgreSQL syntax:
builder.HasIndex(p => p.Email)
       .IsUnique()
       .HasFilter("deleted_at IS NULL");     // Köşeli parantez yok (PG syntax)

// Collation-aware index (case-insensitive aramalar için)
builder.HasIndex(p => p.Email)
       .UseCollation("und-x-icu");           // ICU collation
\`\`\`

💡 **PostgreSQL index seçim rehberi:**
| Index Metodu | Ne Zaman | Boyut | Performans |
|---|---|---|---|
| \`btree\` | Eşitlik + sıralama (varsayılan) | Orta | ✅ Genel amaç |
| \`hash\` | Sadece eşitlik (\`=\`) | Küçük | ✅ Hızlı ama kısıtlı |
| \`gin\` | Array \`@>\`, JSONB, Full-text \`@@\` | Büyük | ✅ Çok değerli aramalar |
| \`gist\` | Range, geometric, nearest-neighbor | Orta | ✅ Spatial/Range |
| \`brin\` | Büyük tabloda sıralı kolon (tarih) | Çok küçük | 🟡 Yaklaşık |

> ⚠️ **Index Limitleri (PostgreSQL):**
>
> | Limit | Değer |
> |-------|:---:|
> | Max sütun/index (btree) | **32** |
> | Max index boyutu (satır) | **2.712 byte** |
> | Max index/tablo | **Sınır yok** (pratik: <50) |
> | Max index adı | **63 karakter** |
>
> 💡 **Pratik öneriler:**
> - Kullanılmayan index'leri tespit et: \`pg_stat_user_indexes\` → \`idx_scan = 0\` olanları kaldır
> - GIN index büyük olabilir (tablo boyutunun 2-3 katı) — sadece gerçekten gerektiğinde ekle

</details>

💡 **Index ne zaman gerekir?**
| Durum | Index Tipi |
|-------|-----------|
| \`WHERE Email = ?\` sorgularında | Tek kolon index |
| Benzersiz olması gereken alan | Unique index |
| \`WHERE LastName = ? AND FirstName = ?\` | Bileşik index |
| Soft delete + unique | Filtered / Partial index |
| SELECT'te FK join sonrası extra sütun lazım | Covering index (INCLUDE) |
| Array/JSONB içinde arama | GIN index (PostgreSQL) |
| Büyük tabloda tarih filtresi | BRIN index (PostgreSQL) |

> ⚠️ **Index Limitleri (SQL Server):**
>
> | Limit | Değer |
> |-------|:---:|
> | Max sütun/index | **16** (include hariç) |
> | Max index boyutu (satır) | **1.700 byte** |
> | Max index/tablo | **Sınır yok** (pratik: <50) |
> | Max index adı | **128 karakter** |

# 🟡 ORTA SEVİYE

## 7. İlişki Yapılandırması (Relationships) 🟡

Entity'ler arası bağlantıları (One-to-One, One-to-Many, Many-to-Many) Fluent API ile tanımlar. Temel kural: ilişki her zaman FK'nın bulunduğu entity'nin config'inde yazılır. EF Core, JOIN ve Include sorgularını bu konfigürasyona göre üretir.

> 📌 **Önemli:** EF Core ilişki çözümlemesi için **sadece kendi model konfigürasyonuna** bakar. Veritabanında fiziksel FK constraint olup olmaması sorgu üretimini etkilemez.

| Durum | EF JOIN/Include çalışır mı? | Veri bütünlüğü garantisi |
|---|:---:|:---:|
| EF config ✅ + DB FK ✅ | ✅ | ✅ DB engeller |
| EF config ✅ + DB FK ❌ | ✅ | ❌ Orphan kayıt olabilir |
| EF config ❌ + DB FK ✅ | ❌ Navigation yok | ✅ DB engeller |

// --- Entity'ler ---

public class User
{
    public int Id { get; set; }
    public string Name { get; set; }

    public UserProfile Profile { get; set; }   // navigation
}

public class UserProfile
{
    public int Id { get; set; }
    public string Bio { get; set; }

    public int UserId { get; set; }            // ← FK burada, o yüzden ilişkiyi
    public User User { get; set; }             //   UserProfileConfiguration yazar
}

// --- UserConfiguration: sadece User'ın kendi alanları, ilişki YOK ---

public class UserConfiguration : IEntityTypeConfiguration<User>
{
    public void Configure(EntityTypeBuilder<User> builder)
    {
        builder.ToTable("Users");
        builder.HasKey(u => u.Id);
        builder.Property(u => u.Name).IsRequired().HasMaxLength(100);
        // ilişkiyi buraya YAZMA — FK bu tabloda değil
    }
}

// --- UserProfileConfiguration: FK burada → ilişkiyi bu config yazar ---

public class UserProfileConfiguration : IEntityTypeConfiguration<UserProfile>
{
    public void Configure(EntityTypeBuilder<UserProfile> builder)
    {
        builder.ToTable("UserProfiles");
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Bio).HasMaxLength(500);

        builder.HasOne(p => p.User)            // UserProfile'ın bir User'ı var
               .WithOne(u => u.Profile)        // User'ın bir Profile'ı var
               .HasForeignKey<UserProfile>     // FK bu tabloda (UserProfile)
                   (p => p.UserId)
               .OnDelete(DeleteBehavior.Cascade);
        //
        // ⚠️ 1-1'de HasForeignKey<T> generic ZORUNLU:
        //    EF iki taraftan hangisinin FK taşıdığını bilemez.
        //    FK zaten bu sınıfta (UserProfile) olduğu için <UserProfile> yazıyoruz.
    }
}

// --- Entity'ler ---

public class Category
{
    public int Id { get; set; }
    public string Name { get; set; }

    public ICollection<Product> Products { get; set; }  // navigation
}

public class Product
{
    public int Id { get; set; }
    public string Name { get; set; }

    public int CategoryId { get; set; }        // ← FK burada, o yüzden ilişkiyi
    public Category Category { get; set; }     //   ProductConfiguration yazar
}

// --- CategoryConfiguration: sadece Category'nin kendi alanları, ilişki YOK ---

public class CategoryConfiguration : IEntityTypeConfiguration<Category>
{
    public void Configure(EntityTypeBuilder<Category> builder)
    {
        builder.ToTable("Categories");
        builder.HasKey(c => c.Id);
        builder.Property(c => c.Name).IsRequired().HasMaxLength(100);
        // ilişkiyi buraya YAZMA — FK bu tabloda değil
    }
}

// --- ProductConfiguration: FK burada → ilişkiyi bu config yazar ---

public class ProductConfiguration : IEntityTypeConfiguration<Product>
{
    public void Configure(EntityTypeBuilder<Product> builder)
    {
        builder.ToTable("Products");
        builder.HasKey(p => p.Id);
        builder.Property(p => p.Name).IsRequired().HasMaxLength(200);

        builder.HasOne(p => p.Category)        // Product'ın bir Category'si var
               .WithMany(c => c.Products)      // Category'nin çok Product'ı var
               .HasForeignKey(p => p.CategoryId)    // FK bu tabloda (Product)
               .OnDelete(DeleteBehavior.Restrict);
        //
        // ✅ 1-N'de generic gerek yok:
        //    builder zaten FK'nın bulunduğu taraf (Product), EF bilir.
    }
}

// --- Entity'ler ---

public class Student
{
    public int Id { get; set; }
    public string Name { get; set; }

    public ICollection<Course> Courses { get; set; }   // navigation
}

public class Course
{
    public int Id { get; set; }
    public string Title { get; set; }

    public ICollection<Student> Students { get; set; } // navigation
}

// --- StudentConfiguration / CourseConfiguration: kendi alanları ---

public class StudentConfiguration : IEntityTypeConfiguration<Student>
{
    public void Configure(EntityTypeBuilder<Student> builder)
    {
        builder.ToTable("Students");
        builder.HasKey(s => s.Id);
        builder.Property(s => s.Name).IsRequired().HasMaxLength(100);
        // ilişkiyi YAZMA — join tablo EF tarafından yönetilir
    }
}

public class CourseConfiguration : IEntityTypeConfiguration<Course>
{
    public void Configure(EntityTypeBuilder<Course> builder)
    {
        builder.ToTable("Courses");
        builder.HasKey(c => c.Id);
        builder.Property(c => c.Title).IsRequired().HasMaxLength(200);

        // FK'lar EF'in otomatik oluşturduğu join tabloda olduğu için
        // ilişkiyi bu iki config'den birinde, bir kez tanımlarız.
        // Hangisinde olduğu fark etmez — burada Course'da tanımladık.
        builder.HasMany(c => c.Students)       // Course'un çok Student'ı var
               .WithMany(s => s.Courses);      // Student'ın da çok Course'u var
        //
        // EF otomatik join tablo oluşturur: "CourseStudent"
        // İki config'e de YAZMA — bir kez yeterli, çakışır.
    }
}

// --- Entity'ler ---

public class Student
{
    public int Id { get; set; }
    public string Name { get; set; }

    public ICollection<StudentCourse> StudentCourses { get; set; }
}

public class Course
{
    public int Id { get; set; }
    public string Title { get; set; }

    public ICollection<StudentCourse> StudentCourses { get; set; }
}

public class StudentCourse
{
    public int StudentId { get; set; }         // ← FK
    public int CourseId { get; set; }          // ← FK
    public DateTime EnrolledAt { get; set; }   // ekstra alan

    public Student Student { get; set; }
    public Course Course { get; set; }
}

// --- StudentConfiguration / CourseConfiguration: kendi alanları, ilişki YOK ---

public class StudentConfiguration : IEntityTypeConfiguration<Student>
{
    public void Configure(EntityTypeBuilder<Student> builder)
    {
        builder.ToTable("Students");
        builder.HasKey(s => s.Id);
        builder.Property(s => s.Name).IsRequired().HasMaxLength(100);
        // ilişkiyi buraya YAZMA — FK'lar StudentCourse'da
    }
}

public class CourseConfiguration : IEntityTypeConfiguration<Course>
{
    public void Configure(EntityTypeBuilder<Course> builder)
    {
        builder.ToTable("Courses");
        builder.HasKey(c => c.Id);
        builder.Property(c => c.Title).IsRequired().HasMaxLength(200);
        // ilişkiyi buraya YAZMA — FK'lar StudentCourse'da
    }
}

// --- StudentCourseConfiguration: her iki FK burada → ilişkileri bu config yazar ---

public class StudentCourseConfiguration : IEntityTypeConfiguration<StudentCourse>
{
    public void Configure(EntityTypeBuilder<StudentCourse> builder)
    {
        builder.ToTable("StudentCourses");
        builder.HasKey(sc => new { sc.StudentId, sc.CourseId });  // composite PK

        builder.HasOne(sc => sc.Student)        // bu kayıt bir Student'a ait
               .WithMany(s => s.StudentCourses) // Student'ın çok StudentCourse'u var
               .HasForeignKey(sc => sc.StudentId);

        builder.HasOne(sc => sc.Course)         // bu kayıt bir Course'a ait
               .WithMany(c => c.StudentCourses) // Course'un çok StudentCourse'u var
               .HasForeignKey(sc => sc.CourseId);

        builder.Property(sc => sc.EnrolledAt)
               .HasDefaultValueSql("GETUTCDATE()");
    }
}

### DeleteBehavior Seçenekleri

| Değer | Açıklama | SQL Karşılığı |
| --- | --- | --- |
| \`Cascade\` | Sahip silinince bağlı kayıtlar da silinir (varsayılan required) | \`ON DELETE CASCADE\` |
| \`SetNull\` | FK null yapılır (varsayılan optional) | \`ON DELETE SET NULL\` |
| \`Restrict\` | Silme engellenir | \`ON DELETE NO ACTION\` |
| \`NoAction\` | DB'ye bırakılır | \`ON DELETE NO ACTION\` |
| \`ClientCascade\` | Sadece takip edilen (tracked) nesnelerde cascade | — |
| \`ClientSetNull\` | Sadece tracked nesnelerde null (varsayılan optional, client) | — |
| \`ClientNoAction\` | EF hiçbir şey yapmaz | — |

> 💡 **Pratikte en çok kullanılan:**
> - \`Cascade\` → Sipariş silinince sipariş kalemleri de silinsin
> - \`Restrict\` → Kategori silinemesin eğer altında ürün varsa
> - \`SetNull\` → Yazar silinince kitaptaki AuthorId NULL olsun

<details>
<summary><b>💾 SQL Server</b></summary>

> 💡 **SQL Server'da FK davranışları:**
> - FK constraint syntax: \`REFERENCES\`, \`ON DELETE CASCADE\` — EF Fluent API aynı
> - SQL Server'da \`ON DELETE RESTRICT\` ile \`NO ACTION\` pratikte **aynı** davranır (her ikisi de anında kontrol eder)
> - **Deferrable FK desteklenmez** — circular insert senaryolarında sıra önemlidir

\`\`\`sql
-- SQL Server: FK her zaman anında kontrol eder (deferred yok)
-- Circular insert yapılamaz, sıralama zorunludur:
INSERT INTO Orders (Id) VALUES (1);                          -- Önce parent
INSERT INTO OrderItems (Id, OrderId) VALUES (10, 1);         -- Sonra child

-- FK violation örneği:
INSERT INTO OrderItems (Id, OrderId) VALUES (20, 999);       -- ❌ FK hata (Order 999 yok)
\`\`\`

</details>

<details>
<summary><b>🐘 PostgreSQL</b></summary>

> 🐘 **PostgreSQL İlişki Farkları:**
> - FK constraint syntax aynıdır (\`REFERENCES\`, \`ON DELETE CASCADE\`) — EF Fluent API fark etmez
> - PostgreSQL'de \`ON DELETE RESTRICT\` vs \`NO ACTION\` farkı var:
>   - \`RESTRICT\` → kontrol **anında** yapılır (deferred olamaz)
>   - \`NO ACTION\` → transaction sonunda kontrol edilir (deferrable)
> - **Deferrable FK** → constraint kontrolünü transaction sonuna erteleyebilme özelliği

**Deferrable FK Nedir?**
Normal FK constraint, INSERT/UPDATE anında **hemen** kontrol edilir. Deferrable FK ise kontrolü transaction'ın **COMMIT** anına erteler.

**Ne işe yarar?**
- **Circular reference** senaryolarında: A tablosu B'ye, B tablosu A'ya referans veriyorsa → hangi kaydı önce eklersin? Normal FK'da imkansız!
- **Bulk data loading:** Binlerce ilişkili kaydı sıra dert etmeden tek transaction'da ekle, COMMIT'te hepsi kontrol edilsin
- **Data migration:** Eski sistemden veri taşırken FK sırasını düşünmene gerek kalmaz

**Modları:**
| Mod | Açıklama |
|-----|----------|
| \`NOT DEFERRABLE\` | Varsayılan — her satır anında kontrol edilir |
| \`DEFERRABLE INITIALLY IMMEDIATE\` | Varsayılan olarak anında, ama \`SET CONSTRAINTS ... DEFERRED\` ile ertelenebilir |
| \`DEFERRABLE INITIALLY DEFERRED\` | Varsayılan olarak transaction COMMIT'te kontrol eder |

⚠️ **Dezavantaj:** Hata geç fark edilir — COMMIT anında FK violation alırsın, hangi INSERT'in soruna yol açtığını bulmak zorlaşır.

\`\`\`sql
-- PostgreSQL: Deferrable FK (SQL Server'da yok!)
ALTER TABLE order_items
    ADD CONSTRAINT fk_order
    FOREIGN KEY (order_id) REFERENCES orders(id)
    ON DELETE CASCADE
    DEFERRABLE INITIALLY DEFERRED;  -- Transaction COMMIT'te kontrol eder

-- Bu, circular insert'lere izin verir:
BEGIN;
    INSERT INTO orders (id, first_item_id) VALUES (1, 10);  -- first_item_id henüz yok
    INSERT INTO order_items (id, order_id) VALUES (10, 1);   -- şimdi var
COMMIT;  -- Her iki FK burada kontrol edilir → ✅

-- Geçici olarak deferrable yapma (INITIALLY IMMEDIATE olanlar için):
BEGIN;
    SET CONSTRAINTS fk_order DEFERRED;   -- Bu transaction için ertele
    -- ... sırasız INSERT'ler ...
COMMIT;  -- Burada kontrol edilir
\`\`\`

\`\`\`csharp
// EF Core'da deferrable FK için Raw SQL migration gerekir:
migrationBuilder.Sql(@"
    ALTER TABLE order_items
    DROP CONSTRAINT fk_order_items_orders_order_id;

    ALTER TABLE order_items
    ADD CONSTRAINT fk_order_items_orders_order_id
    FOREIGN KEY (order_id) REFERENCES orders(id)
    ON DELETE CASCADE
    DEFERRABLE INITIALLY DEFERRED;
");
\`\`\`

## 8. Migrations (Göçler) 🟡

C# modelinde yaptığın her değişikliği (yeni tablo, sütun ekleme, tip değiştirme) veritabanına taşıyan versiyonlama sistemidir. Git commit'leri gibi düşün — her migration bir "DB commit". Geri alabilir, script üretebilir, CI/CD'ye entegre edebilirsin.

---

### Temel Komutlar

\`\`\`bash
# İlk migration'ı oluştur
dotnet ef migrations add InitialCreate

# Veritabanına uygula
dotnet ef database update

# Yeni migration (ör. tablo ekleme)
dotnet ef migrations add AddOrdersTable

# Belirli bir migration'a geri dön (rollback)
dotnet ef database update AddOrdersTable

# Son migration'ı sil (henüz uygulanmamışsa)
dotnet ef migrations remove

# SQL script üret (production deploy için)
dotnet ef migrations script --idempotent -o migrate.sql

# Tüm migration'ların listesi
dotnet ef migrations list
\`\`\`

> ⚠️ Package Manager Console kullanıyorsan:
> \`\`\`powershell
> Add-Migration InitialCreate
> Update-Database

### Migration Bundle (EF Core 6+) — Production Deploy

\`\`\`bash
# Bundle = tek çalıştırılabilir dosya. dotnet ef tool'u production'a kurulmaz.
dotnet ef migrations bundle --self-contained -o efbundle.exe

# Production'da çalıştır
./efbundle.exe --connection "Server=prod;Database=MyDb;..."
\`\`\`

### CI/CD Pipeline'da Migration

\`\`\`yaml
# Azure DevOps / GitHub Actions örneği
steps:
  # 1. Migration bekleyen değişiklik var mı kontrolü
  - run: dotnet ef migrations has-pending-model-changes --no-build
  
  # 2. Idempotent script üret (her zaman güvenli — zaten uygulanmış olanları atlar)
  - run: dotnet ef migrations script --idempotent --no-build -o $(Build.ArtifactStagingDirectory)/migrate.sql
  
  # 3. Veya bundle üret
  - run: dotnet ef migrations bundle --no-build -o $(Build.ArtifactStagingDirectory)/efbundle
\`\`\`

### Production'da Migration Stratejileri

| Strateji | Ne Zaman | Risk |
|----------|----------|------|
| \`dotnet ef database update\` | Development | 🔴 Production'da **kullanma** |
| \`--idempotent\` SQL script | Küçük-orta proje | 🟢 DBA review edebilir |
| Migration Bundle (\`efbundle\`) | Otomatik deploy | 🟡 Hızlı ama review yok |
| Manual SQL + MigrationHistory insert | Enterprise / DBA kontrolü | 🟢 Tam kontrol |
| Expand-Contract (Zero-downtime) | Büyük production sistemi | 🟢 Downtime sıfır |

> ⚠️ **Data Loss Uyarısı:** Sütun kaldırma/tip değiştirme migration'larında EF uyarı verir ama engellemez. Production'da her migration'ı **önce test ortamında** çalıştırılmalı.

### Zero-Downtime Migration (Expand-Contract Pattern)

Sütun rename veya kaldırma gibi breaking change'leri downtime olmadan yapmak için 2 adımlı deploy:

\`\`\`
Deploy 1 (Expand):
  ─ Yeni sütunu EKLE (nullable, default ile)
  ─ Kod hem eski hem yeni sütuna yazar (dual-write)
  ─ Background job: eski veriyi yeni sütuna kopyalar

Deploy 2 (Contract):
  ─ Kod artık sadece yeni sütunu kullanır
  ─ Eski sütunu DROP et (artık referans yok)
\`\`\`

\`\`\`csharp
// Adım 1: Expand — yeni sütun ekle, eski duruyor
migrationBuilder.AddColumn<string>("FullName", "Users", nullable: true);
migrationBuilder.Sql("UPDATE Users SET FullName = FirstName + ' ' + LastName");

// Adım 2: Contract (ayrı migration, ayrı deploy!)
migrationBuilder.DropColumn("FirstName", "Users");
migrationBuilder.DropColumn("LastName", "Users");
\`\`\`

> 💡 **Kural:** Bir migration'da hem ADD hem DROP yapma. Her biri ayrı deploy olmalı — arada kodun her iki sütunu da desteklediğinden emin ol.

### Migration Geri Alma (Rollback)

\`\`\`bash
# Son migration'ı geri al (development)
dotnet ef database update PreviousMigrationName

# Migration dosyasını sil (henüz apply edilmemişse)
dotnet ef migrations remove

# Production'da rollback — Down() metodu çalışır:
dotnet ef migrations script CurrentMigration PreviousMigration --idempotent -o rollback.sql
# DBA bu script'i review edip çalıştırır
\`\`\`

> ⚠️ **Down() metodu güvenilir mi?** EF otomatik Down üretir ama veri kaybı olabilir (DROP COLUMN geri gelmez). Critical migration'larda Down()'ı her zaman manual kontrol et.

\`\`\`csharp
// Migration içinde provider-specific SQL:
protected override void Up(MigrationBuilder migrationBuilder)
{
    // EF Core her iki provider için doğru SQL üretir:
    migrationBuilder.CreateTable(
        name: "products",
        columns: table => new
        {
            Id = table.Column<int>(type: "integer", nullable: false)
                      .Annotation("Npgsql:ValueGenerationStrategy",
                          NpgsqlValueGenerationStrategy.IdentityAlwaysColumn),
            Name = table.Column<string>(type: "text", nullable: false),
            Price = table.Column<decimal>(type: "numeric(18,2)", nullable: false)
        },
        constraints: table => table.PrimaryKey("pk_products", x => x.Id));

    // Provider-specific raw SQL (sadece PG'de çalışır):
    if (migrationBuilder.ActiveProvider == "Npgsql.EntityFrameworkCore.PostgreSQL")
    {
        migrationBuilder.Sql("CREATE EXTENSION IF NOT EXISTS \\"uuid-ossp\\";");
        migrationBuilder.Sql("CREATE EXTENSION IF NOT EXISTS \\"pg_trgm\\";");
    }
}
\`\`\`

> ⚠️ **PostgreSQL migration dikkat noktaları:**
> - \`HasColumnType("nvarchar(max)")\` → PG'de hata verir! Provider değiştirirsen tüm migration'ları yeniden oluştur
> - \`UseSnakeCaseNamingConvention()\` eklediysen **ilk migration'dan önce** ekle, sonradan ekleme büyük rename migration'ı üretir
> - Extension'lar (\`uuid-ossp\`, \`pg_trgm\`, \`hstore\`) ilk migration'da \`CREATE EXTENSION\` ile ekle
> - PostgreSQL **transactional DDL** destekler → migration başarısız olursa otomatik ROLLBACK (SQL Server'da bu garanti değil!)

</details>

### Production'a Migration Deploy Checklist

> 🚨 **Bu adımları atlama.** Yanlış migration production veritabanını geri dönüşümsüz bozabilir.

| # | Adım | Komut / Aksiyon |
|---|------|-----------------|
| 1 | **Backup al** | DB snapshot veya \`pg_dump\` / \`.bak\` backup |
| 2 | **SQL script üret** | \`dotnet ef migrations script --idempotent -o deploy.sql\` |
| 3 | **Script'i incele** | DROP, ALTER TYPE, data loss riski var mı? |
| 4 | **Staging'de çalıştır** | Aynı script'i staging DB'ye uygula, hata var mı? |
| 5 | **Rollback planı yaz** | Geri alma script'i hazırla: \`dotnet ef migrations script <önceki> <hedef>\` |
| 6 | **Maintenance window** | Gerekirse kısa downtime planla (rename, type change durumlarında) |
| 7 | **Deploy et** | Script'i production'a uygula (\`sqlcmd\` / \`psql\`) |
| 8 | **Doğrula** | \`SELECT * FROM __EFMigrationsHistory\` — son migration göründü mü? |

\`\`\`bash
# İdempotent script (zaten uygulanmış migration'ları atlar):
dotnet ef migrations script --idempotent -o deploy.sql

# Belirli bir migration'a kadar:
dotnet ef migrations script InitialCreate AddProductIndex -o partial.sql

# Rollback script (AddProductIndex'ten InitialCreate'e geri dön):
dotnet ef migrations script AddProductIndex InitialCreate -o rollback.sql
\`\`\`

> ⚠️ **Asla production'da \`dotnet ef database update\` çalıştırma.** Bu komut CI/CD veya local dev içindir. Production'da her zaman idempotent SQL script kullan ve DBA review'dan geçir.

## 9. Seed Data (Başlangıç Verisi) 🟡

Veritabanı ilk oluştuğunda veya test ortamında ihtiyaç duyulan başlangıç verilerini (kategoriler, roller, ülke listesi gibi) otomatik eklemek için kullanılır. İki yaklaşım var: migration-based (HasData) ve runtime-based (UseSeeding).

---

### HasData — Migration-Based Seed

> ⚠️ **Kritik:** HasData **runtime'da çalışmaz**. Migration dosyasına SQL olarak yazılır ve migration **sadece bir kez** uygulanır.  
> - Kayıt zaten varsa → tekrar eklenmez (migration bir daha çalışmaz)  
> - Veriyi silersen → geri gelmez (migration tekrar uygulanmaz)  
> - HasData'daki değeri değiştirirsen → yeni migration oluşturduğunda \`UPDATE\` üretilir
>
> 🚨 **HasData'da ASLA dinamik değer kullanma:**
> - \`DateTime.UtcNow\`, \`DateTimeOffset.Now\` → Migration derleme anındaki sabit değer yazılır (her \`migrations add\`'da farklı SQL üretir!)
> - \`Guid.NewGuid()\` → Her migration'da yeni GUID = gereksiz UPDATE SQL'leri
> - **Doğrusu:** \`new DateTime(2024, 1, 1)\` veya \`new Guid("sabit-guid-string")\` gibi deterministik değerler kullan

\`\`\`csharp
public class CategoryConfiguration : IEntityTypeConfiguration<Category>
{
    public void Configure(EntityTypeBuilder<Category> builder)
    {
        builder.ToTable("Categories");
        builder.HasKey(c => c.Id);
        builder.Property(c => c.Name).IsRequired().HasMaxLength(100);

        // Seed data — migration'a dahil edilir
        builder.HasData(
            new Category { Id = 1, Name = "Elektronik" },
            new Category { Id = 2, Name = "Giyim" },
            new Category { Id = 3, Name = "Kitap" },
            new Category { Id = 4, Name = "Ev & Yaşam" }
        );
    }
}
\`\`\`

**📌 Migration'da oluşan SQL:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`sql
-- Up metodu
INSERT INTO [Categories] ([Id], [Name]) VALUES (1, N'Elektronik');
INSERT INTO [Categories] ([Id], [Name]) VALUES (2, N'Giyim');
INSERT INTO [Categories] ([Id], [Name]) VALUES (3, N'Kitap');
INSERT INTO [Categories] ([Id], [Name]) VALUES (4, N'Ev & Yaşam');

-- IDENTITY_INSERT otomatik açılır/kapanır (Id belirttiğimiz için)
SET IDENTITY_INSERT [Categories] ON;
-- ... insert'ler ...
SET IDENTITY_INSERT [Categories] OFF;
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`sql
-- Up metodu
INSERT INTO categories (id, name) OVERRIDING SYSTEM VALUE VALUES (1, 'Elektronik');
INSERT INTO categories (id, name) OVERRIDING SYSTEM VALUE VALUES (2, 'Giyim');
INSERT INTO categories (id, name) OVERRIDING SYSTEM VALUE VALUES (3, 'Kitap');
INSERT INTO categories (id, name) OVERRIDING SYSTEM VALUE VALUES (4, 'Ev & Yaşam');

-- GENERATED ALWAYS sütununa manuel değer yazmak için OVERRIDING SYSTEM VALUE gerekir
-- Sequence değerini güncellemek için EF otomatik ekler:
SELECT setval(pg_get_serial_sequence('categories', 'id'), MAX(id)) FROM categories;
\`\`\`

</details>

> ⚠️ **Kurallar:**
> - \`HasData\` ile PK değerini **zorunlu** olarak belirtmek gerekir (Id = 1, 2, ...)
> - Navigation property kullanılamaz — FK değerini doğrudan yaz
> - Owned entity seed'lemek için anonim tip kullan

\`\`\`csharp
// İlişkili veri seed'leme — FK ile
builder.HasData(
    new Product { Id = 1, Name = "Laptop", CategoryId = 1 },
    new Product { Id = 2, Name = "T-shirt", CategoryId = 2 }
);

// Owned entity seed — anonim tip
builder.OwnsOne(c => c.Address).HasData(
    new { CustomerId = 1, Street = "Atatürk Cad.", City = "İstanbul" }
);
\`\`\`

### UseSeeding — Koşullu Seed (EF Core 9+)

| Özellik | HasData | UseSeeding (EF Core 9+) |
|---------|---------|-------------------------|
| Migration gerektir | ✅ Evet | ❌ Hayır |
| Koşullu seed ("yoksa ekle") | ❌ | ✅ |
| Async desteği | ❌ | ✅ |
| Navigation property | ❌ FK ile manuel | ✅ Normal entity gibi |
| Ne zaman çalışır | Migration uygulanırken (bir kez) | \`MigrateAsync()\` / \`EnsureCreated()\` her çağrısında |

\`\`\`csharp
builder.Services.AddDbContext<AppDbContext>((sp, options) =>
    options.UseSqlServer(connectionString)
           .UseAsyncSeeding(async (context, _, ct) =>
           {
               if (!await context.Set<Category>().AnyAsync(ct))
               {
                   context.Set<Category>().AddRange(
                       new Category { Name = "Elektronik", Slug = "elektronik" },
                       new Category { Name = "Giyim", Slug = "giyim" },
                       new Category { Name = "Kitap", Slug = "kitap" }
                   );
                   await context.SaveChangesAsync(ct);
               }
           }));

// Çalıştırma — MigrateAsync içinde otomatik tetiklenir
await context.Database.MigrateAsync();
\`\`\`

> 💡 **Hangisini ne zaman kullan:**
> - Sabit lookup tabloları (ülkeler, roller, para birimleri) → \`HasData\` (deterministik, migration'da)
> - Koşullu / dinamik seed (admin kullanıcı yoksa oluştur) → \`UseSeeding\`

> 🐘 **PostgreSQL Seed Farkları:**
> - \`HasData\` her iki provider'da aynı Fluent API ile çalışır (SQL farkını EF halleder)
> - PostgreSQL'de \`HasData\` üretilen SQL: \`INSERT INTO ... ON CONFLICT DO NOTHING\` değil, \`INSERT INTO\` düzdür (migration'da idempotent değil!)

**📌 \`HasDefaultValueSql\` provider farkları:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`csharp

builder.Property(p => p.Id).HasDefaultValueSql("NEWSEQUENTIALID()");
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`csharp

builder.Property(p => p.Id).HasDefaultValueSql("gen_random_uuid()");
\`\`\`

</details>

**📌 Upsert (varsa güncelle, yoksa ekle) — Raw SQL karşılaştırması:**

<details>
<summary>💾 SQL Server</summary>

\`\`\`csharp
// SQL Server: MERGE statement
await context.Database.ExecuteSqlRawAsync(@"
    MERGE INTO [Categories] AS target
    USING (VALUES (1, N'Elektronik', 'elektronik'), (2, N'Giyim', 'giyim'))
        AS source (Id, Name, Slug)
    ON target.Id = source.Id
    WHEN MATCHED THEN UPDATE SET Name = source.Name, Slug = source.Slug
    WHEN NOT MATCHED THEN INSERT (Id, Name, Slug) VALUES (source.Id, source.Name, source.Slug);
");
\`\`\`

</details>

<details>
<summary>🐘 PostgreSQL</summary>

\`\`\`csharp
// PostgreSQL: ON CONFLICT (çok daha temiz syntax)
await context.Database.ExecuteSqlRawAsync(@"
    INSERT INTO categories (id, name, slug)
    VALUES (1, 'Elektronik', 'elektronik'),
           (2, 'Giyim', 'giyim')
    ON CONFLICT (id) DO UPDATE SET name = EXCLUDED.name, slug = EXCLUDED.slug;
");
\`\`\`

       c.id, c.name,
       s.id, s.company_name
FROM products AS p
INNER JOIN categories AS c ON p.category_id = c.id
INNER JOIN suppliers AS s ON p.supplier_id = s.id
WHERE p.price > 100.0;

### Explicit Loading (Açık Yükleme)

**Sonradan**, ihtiyaç duyulduğunda yükle. İki ayrı sorgu üretir.

\`\`\`csharp
// 1️⃣ Tekil navigation (Reference)
var product = context.Products.First(p => p.Id == 1);
context.Entry(product)
       .Reference(p => p.Category)
       .Load();
\`\`\`

<details open>
<summary><b>💾 SQL Server</b></summary>

\`\`\`sql
-- İlk sorgu:
SELECT TOP(1) [p].[Id], [p].[Name], [p].[CategoryId]
FROM [Products] AS [p]
WHERE [p].[Id] = 1;

-- .Load() çağrıldığında (ayrı sorgu):
SELECT [c].[Id], [c].[Name]
FROM [Categories] AS [c]
WHERE [c].[Id] = @categoryId;   -- product.CategoryId değeri
\`\`\`

</details>
<details>
<summary><b>🐘 PostgreSQL</b></summary>

\`\`\`sql
-- İlk sorgu:
SELECT p.id, p.name, p.category_id
FROM products AS p
WHERE p.id = 1
LIMIT 1;

-- .Load() çağrıldığında (ayrı sorgu):
SELECT c.id, c.name
FROM categories AS c
WHERE c.id = @categoryId;
\`\`\`

</details>

\`\`\`csharp
// 2️⃣ Koleksiyon navigation (Collection) — filtreleme ile
var category = context.Categories.First(c => c.Id == 1);  // 1. sorgu: Category
context.Entry(category)
       .Collection(c => c.Products)
       .Query()                              // IQueryable döner — filtrelenebilir!
       .Where(p => p.Price > 500)
       .Load();                              // 2. sorgu: filtrelenmiş Products
\`\`\`

> ⚠️ **2 ayrı sorgu çalışır:** İlk satır Category'yi, \`.Load()\` ise Products'ı getirir. Bu Explicit Loading'in tasarımı gereğidir — avantajı ikinci sorguda \`.Where()\` ile filtreleme yapabilmenizdir (Eager Loading'de tüm ilişkili veri gelir).

FROM [Products] AS [p]
WHERE [p].[CategoryId] = @categoryId AND [p].[Price] > 500.0;
\`\`\`

### Lazy Loading (Tembel Yükleme)

**Navigation property'ye erişildiğinde** otomatik yükler. ⚠️ **N+1 sorgu tehlikesi — production'da dikkatli kullan!**

\`\`\`csharp
// 1. NuGet: Microsoft.EntityFrameworkCore.Proxies
// 2. DbContext'te aktifleştir:
options.UseLazyLoadingProxies();

// 3. Navigation property'ler virtual olmalı:
public class Product
{
    public int Id { get; set; }
    public virtual Category Category { get; set; }  // virtual!
}

// Kullanım — eriştiğinde otomatik SQL çalışır
var product = context.Products.First();
var categoryName = product.Category.Name;  // ← Burada SELECT çalışır!
\`\`\`

WHERE [c].[Id] = @categoryId;

> \`\`\`csharp
